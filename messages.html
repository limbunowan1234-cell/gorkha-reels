<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Messages - GorkhaReels</title>
  <link rel="icon" type="image/png" href="logo-suite/favicon/logo-khukuri-32x32.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding-bottom: 70px;
    }

    .header {
      background: #0f0f0f;
      border-bottom: 1px solid #2d2d2d;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .suggested-section {
      background: linear-gradient(135deg, #1a2a2a 0%, #0f1f1f 100%);
      border-bottom: 1px solid #2d2d2d;
      padding: 12px 16px;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .suggested-label {
      font-size: 12px;
      font-weight: 600;
      color: #0B5E6B;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .suggested-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-behavior: smooth;
    }

    .suggested-list::-webkit-scrollbar {
      height: 4px;
    }

    .suggested-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .suggested-list::-webkit-scrollbar-thumb {
      background: #2d2d2d;
      border-radius: 2px;
    }

    .friend-card {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
      animation: friendCardIn 0.3s ease-out;
    }

    @keyframes friendCardIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .friend-card:active {
      background: #1a1a1a;
      transform: scale(0.95);
    }

    .friend-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0B5E6B, #0d2d3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      object-fit: cover;
      border: 2px solid rgba(11, 94, 107, 0.3);
      transition: all 0.2s;
    }

    .friend-card:active .friend-avatar {
      border-color: #0B5E6B;
    }

    .friend-name {
      font-size: 12px;
      color: #fff;
      text-align: center;
      max-width: 60px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .conversations-list {
      list-style: none;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d2d;
      cursor: pointer;
      transition: all 0.2s;
      animation: conversationSlideIn 0.3s ease-out;
    }

    @keyframes conversationSlideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .conversation-item:active {
      background: #1a1a1a;
      transform: scale(0.99);
    }

    .conversation-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0B5E6B, #0d2d3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      margin-right: 12px;
      object-fit: cover;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .conversation-item:active .conversation-avatar {
      border-color: #0B5E6B;
    }

    .conversation-info {
      flex: 1;
      min-width: 0;
    }

    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .conversation-name {
      font-weight: 600;
      font-size: 15px;
    }

    .conversation-time {
      font-size: 13px;
      color: #999;
    }

    .conversation-preview {
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: #0B5E6B;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-left: 12px;
      flex-shrink: 0;
      animation: badgePulse 2s infinite;
    }

    @keyframes badgePulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(11, 94, 107, 0.7);
      }
      50% {
        box-shadow: 0 0 0 4px rgba(11, 94, 107, 0.2);
      }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #666;
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #666;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #2d2d2d;
      border-top-color: #0B5E6B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      z-index: 1000;
    }

    .nav-item {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .nav-item.active {
      color: #0B5E6B;
    }

    .nav-item-icon {
      font-size: 24px;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d2d2d;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      animation: slideUp 0.3s ease-out;
    }

    .toast.error {
      background: #c33;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Messages</h1>
  </div>

  <!-- Suggested Friends Section -->
  <div class="suggested-section" id="suggestedSection">
    <div class="suggested-label">✨ Friends</div>
    <div class="suggested-list" id="suggestedList"></div>
  </div>

  <div id="content"></div>

  <div class="nav-bar">
    <a href="index.html" class="nav-item">
      <div class="nav-item-icon">🏠</div>
      <div>Home</div>
    </a>
    <a href="index.html" class="nav-item">
      <div class="nav-item-icon">🎬</div>
      <div>Reels</div>
    </a>
    <a href="messages.html" class="nav-item active">
      <div class="nav-item-icon">💬</div>
      <div>Messages</div>
    </a>
    <a href="creator-dashboard.html" class="nav-item">
      <div class="nav-item-icon">👤</div>
      <div>Profile</div>
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>

  <script>
    let currentUserId = null;
    let allConversations = [];

    async function init() {
      await session.refresh();
      if (!session.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      currentUserId = session.getUserId();
      try {
        await loadSuggestedFriends();
      } catch (err) {
        console.warn('Friends section disabled:', err);
        document.getElementById('suggestedSection').style.display = 'none';
      }
      await loadConversations();
    }

    async function loadSuggestedFriends() {
      try {
        const followers = await db.list('followers', [
          Query.equal('followingId', currentUserId),
          Query.limit(20)
        ]);

        console.log('Followers loaded:', followers.documents.length);

        if (followers.documents.length === 0) {
          document.getElementById('suggestedList').innerHTML = '<p style="color: #666; font-size: 12px; padding: 8px;">Follow creators to message them</p>';
          return;
        }

        const creators = await Promise.all(
          followers.documents.map(async (follow) => {
            try {
              const creator = await db.get('creators', follow.followerId);
              return creator;
            } catch (err) {
              console.error('Error loading creator:', follow.followerId, err);
              return null;
            }
          })
        );

        const validCreators = creators.filter(c => c !== null);

        if (validCreators.length === 0) {
          document.getElementById('suggestedList').innerHTML = '<p style="color: #666; font-size: 12px; padding: 8px;">No creators found</p>';
          return;
        }

        const html = validCreators.map(creator => `
          <div class="friend-card" onclick="startNewConversation('${creator.$id}', '${escapeHtml(creator.name)}')">
            <img 
              src="${creator.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(creator.name)}&background=0B5E6B&color=fff`}" 
              alt="${creator.name}" 
              class="friend-avatar"
              onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(creator.name)}&background=0B5E6B&color=fff'"
            >
            <div class="friend-name">${escapeHtml(creator.name)}</div>
          </div>
        `).join('');

        document.getElementById('suggestedList').innerHTML = html;
      } catch (error) {
        console.error('Error loading suggested friends:', error);
        document.getElementById('suggestedList').innerHTML = '<p style="color: #666; font-size: 12px; padding: 8px;">Unable to load friends</p>';
      }
    }

    async function loadConversations() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        allConversations = await ConversationManager.getUserConversations(currentUserId);

        if (allConversations.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">💬</div>
              <p><strong>No conversations yet</strong></p>
              <p style="font-size: 12px; color: #555; margin-top: 8px;">Start a new message to begin chatting</p>
            </div>
          `;
          return;
        }

        const conversationsWithInfo = await Promise.all(
          allConversations.map(async (conv) => {
            const otherUserId = conv.lastMessage.senderId === currentUserId 
              ? conv.lastMessage.recipientId 
              : conv.lastMessage.senderId;
            
            try {
              const creator = await db.get('creators', otherUserId);
              return { ...conv, otherUser: creator };
            } catch {
              return { ...conv, otherUser: { name: 'Unknown', profilePic: null } };
            }
          })
        );

        renderConversations(conversationsWithInfo);
      } catch (error) {
        console.error('Error loading conversations:', error);
        content.innerHTML = `
          <div class="empty-state">
            <p>Error loading messages</p>
          </div>
        `;
      }
    }

    function renderConversations(conversations) {
      const content = document.getElementById('content');
      const html = `
        <ul class="conversations-list">
          ${conversations.map((conv, idx) => `
            <li class="conversation-item" style="animation-delay: ${idx * 0.05}s" onclick="openChat('${conv.conversationId}', '${conv.otherUser.$id}')">
              <img 
                src="${conv.otherUser.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(conv.otherUser.name)}&background=0B5E6B&color=fff`}" 
                alt="${conv.otherUser.name}" 
                class="conversation-avatar"
              >
              <div class="conversation-info">
                <div class="conversation-header">
                  <div class="conversation-name">${escapeHtml(conv.otherUser.name)}</div>
                  <div class="conversation-time">${formatTime(conv.lastMessage.createdAt)}</div>
                </div>
                <div class="conversation-preview">
                  ${conv.lastMessage.messageType === 'text' 
                    ? escapeHtml(conv.lastMessage.messageText.substring(0, 50))
                    : conv.lastMessage.messageType === 'image' 
                    ? '📷 Image'
                    : '🎥 Video'
                  }
                </div>
              </div>
              ${conv.unread ? '<div class="unread-badge">1</div>' : ''}
            </li>
          `).join('')}
        </ul>
      `;
      content.innerHTML = html;
    }

    function openChat(conversationId, userId) {
      window.location.href = `chat.html?conv=${conversationId}&user=${userId}`;
    }

    function startNewConversation(userId, userName) {
      const conversationId = ConversationManager.getConversationId(currentUserId, userId);
      window.location.href = `chat.html?conv=${conversationId}&user=${userId}`;
    }

    function formatTime(isoDate) {
      const date = new Date(isoDate);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return 'now';
      if (minutes < 60) return `${minutes}m`;
      if (hours < 24) return `${hours}h`;
      if (days < 7) return `${days}d`;
      
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    init();
  </script>
</body>
</html>
