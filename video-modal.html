<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Reel - GorkhaReels</title>
  <meta name="theme-color" content="#0B5E6B">
  <!-- ✅ FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon/logo-3-minimalist-icon-32x32.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; }
    body { display: flex; flex-direction: column; overflow: hidden; font-family: system-ui; }

    .video-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(212, 165, 116, 0.75);
      box-shadow: 0 1px 0 rgba(232, 196, 160, 0.18), 0 4px 24px rgba(11, 94, 107, 0.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .header-logo { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.15); object-fit: cover; }
    .header-text { min-width: 0; }
    .header-title { font-size: 16px; font-weight: 800; letter-spacing: 0.3px; line-height: 1.1; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.25); }
    .header-tagline { font-size: 10px; font-weight: 600; color: #D4A574; margin-top: 1px; letter-spacing: 0.3px; }
    .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .header-btn { width: 36px; height: 36px; border: none; border-radius: 50%; background: rgba(255,255,255,0.15); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .header-btn:active { background: rgba(255,255,255,0.25); }

    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
      margin-top: 60px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .watermark {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 80px;
      height: 80px;
      opacity: 0.7;
      pointer-events: none;
      z-index: 10;
    }

    .video-info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: linear-gradient(transparent, rgba(0,0,0,0.9) 40%);
      color: #fff;
      padding: 60px 16px 16px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .creator-card {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .creator-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid #D4A574;
    }

    .creator-info { flex: 1; min-width: 0; }
    .creator-name { font-size: 15px; font-weight: 700; }
    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      background: #0284c7;
      border-radius: 50%;
      color: #fff;
      font-size: 10px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .creator-stats { font-size: 12px; color: #aaa; }

    .reel-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .reel-description {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .reel-hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .hashtag {
      color: #D4A574;
      cursor: pointer;
    }

    .hashtag:active { opacity: 0.7; }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:active { background: #262626; }
    .action-btn.like.liked { background: #4b0000; border-color: #8b0000; color: #ff6b6b; }

    .follow-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0B5E6B, #0D7377);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.15s;
      box-shadow: 0 4px 12px rgba(11,94,107,.3);
    }

    .follow-btn:active { opacity: 0.8; }
    .follow-btn.following { background: #262626; color: #aaa; box-shadow: none; }

    .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .drawer-backdrop.open { display: block; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 80%; max-width: 320px; background: #161616; z-index: 160; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.5); }
    .drawer.open { transform: translateX(0); }
    .drawer-head { background: linear-gradient(135deg, #0B5E6B, #0D7377); padding: 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(212, 165, 116, 0.75); }
    .drawer-head img { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); }
    .drawer-head .dh-title { font-size: 16px; font-weight: 800; }
    .drawer-head .dh-sub { font-size: 11px; color: #D4A574; font-weight: 600; }
    .drawer-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .drawer-item { width: 100%; display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: none; border: none; color: #fff; font-size: 15px; cursor: pointer; text-align: left; }
    .drawer-item:active { background: #222; }
    .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
    .drawer-sep { height: 1px; background: #262626; margin: 6px 18px; }
    .drawer-item-danger { color: #ef4444; }

    .loading { text-align: center; padding: 20px; color: #888; }

    @media (min-width: 768px) {
      .video-container { margin-top: 0; }
      .video-info { max-height: 50%; }
    }
  </style>
</head>
<body>

  <!-- ===== TEAL HEADER WITH WORDMARK ===== -->
  <header class="video-header">
    <div class="header-left">
      <img class="header-logo" src="/icons/wordmark/logo-2-wordmark-300x300.png" alt="GorkhaReels">
      <div class="header-text">
        <div class="header-title">GorkhaReels</div>
        <div class="header-tagline">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="window.location='index.html'" aria-label="Back">‹</button>
      <button class="header-btn" id="open-drawer" aria-label="Menu">☰</button>
    </div>
  </header>

  <div class="video-container">
    <video id="main-video" controls playsinline></video>
    <!-- ✅ WATERMARK OVERLAY -->
    <img src="/icons/watermark/logo-8-minimalist-dark-80x80.png" alt="GorkhaReels" class="watermark">
  </div>

  <div class="video-info" id="video-info">
    <div class="loading">Loading video...</div>
  </div>

  <!-- ===== APP DRAWER ===== -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <img src="/icons/wordmark/logo-2-wordmark-300x300.png" alt="GorkhaReels" style="height:36px;width:auto;">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html#edit'"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    class VideoPlayer {
      constructor() {
        this.reelId = new URLSearchParams(window.location.search).get('reelId');
        this.reel = null;
        this.creator = null;
        this.isLiked = false;
        this.isFollowing = false;
        this.init();
      }

      async init() {
        if (!this.reelId) { alert('No video ID'); window.location = 'index.html'; return; }
        await session.refresh();
        this.setupDrawer();
        await this.loadVideo();
      }

      setupDrawer() {
        const open = () => { document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-backdrop').classList.add('open'); };
        const close = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-backdrop').classList.remove('open'); };
        document.getElementById('open-drawer').onclick = open;
        document.getElementById('drawer-backdrop').onclick = close;
        document.querySelectorAll('.drawer-item').forEach(btn => btn.addEventListener('click', close));
        document.getElementById('drawer-logout').onclick = async () => {
          try { await session.logout(); } catch (e) {}
          window.location = 'login.html';
        };
      }

      async loadVideo() {
        try {
          this.reel = await db.get(APPWRITE_CONFIG.COLLECTIONS.REELS, this.reelId);
          if (this.reel.isDeleted) { alert('Video deleted'); window.location = 'index.html'; return; }

          this.creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, this.reel.creatorId);

          const vid = document.getElementById('main-video');
          vid.src = this.reel.videoUrl;
          vid.addEventListener('play', () => this.recordView());

          if (session.isLoggedIn()) {
            const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [
              Query.equal('reelId', this.reelId),
              Query.equal('userId', session.getUserId()),
              Query.limit(1)
            ]);
            this.isLiked = likes.total > 0;

            const follows = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', session.getUserId()),
              Query.equal('followingId', this.creator.$id),
              Query.limit(1)
            ]);
            this.isFollowing = follows.total > 0;
          }

          this.renderInfo();
        } catch (error) {
          console.error('Video load failed:', error);
          document.getElementById('video-info').innerHTML = '<div class="loading">Failed to load video</div>';
        }
      }

      async recordView() {
        try {
          await db.update(APPWRITE_CONFIG.COLLECTIONS.REELS, this.reelId, {
            views: (this.reel.views || 0) + 1
          });
          this.reel.views = (this.reel.views || 0) + 1;
        } catch (e) { console.error('View record failed:', e); }
      }

      renderInfo() {
        const info = document.getElementById('video-info');
        const likes = this.reel.likes || 0;
        const hashtags = (this.reel.hashtags || []).map(tag => `<span class="hashtag">${escapeHtml(tag)}</span>`).join(' ');

        let html = `
          <div class="creator-card" onclick="window.location='creator-profile.html?userId=${this.creator.$id}'">
            <img class="creator-avatar" src="${this.creator.profilePic || '/icons/primary/logo-1-app-icon-180x180.png'}" onerror="this.src='/icons/primary/logo-1-app-icon-180x180.png'">
            <div class="creator-info">
              <div class="creator-name">${escapeHtml(this.creator.name || 'Creator')}${this.creator.isVerified ? '<span class="verified-badge">✓</span>' : ''}</div>
              <div class="creator-stats">${this.reel.views || 0} views</div>
            </div>
          </div>

          <div class="reel-title">${escapeHtml(this.reel.title || '')}</div>
          ${this.reel.description ? `<div class="reel-description">${escapeHtml(this.reel.description)}</div>` : ''}
          ${hashtags ? `<div class="reel-hashtags">${hashtags}</div>` : ''}

          <div class="action-buttons">
            <button class="action-btn like ${this.isLiked ? 'liked' : ''}" id="like-btn" onclick="videoPlayer.toggleLike()">
              <span>${this.isLiked ? '❤️' : '🤍'}</span>
              <span>${likes}</span>
            </button>
            <button class="action-btn" onclick="alert('Comments coming soon')">
              <span>💬</span>
              <span>0</span>
            </button>
            <button class="action-btn" onclick="alert('Share coming soon')">
              <span>📤</span>
              <span>Share</span>
            </button>
          </div>
        `;

        if (session.isLoggedIn() && session.getUserId() !== this.creator.$id) {
          html += `
            <button class="follow-btn ${this.isFollowing ? 'following' : ''}" id="follow-btn" onclick="videoPlayer.toggleFollow()">
              ${this.isFollowing ? 'Following' : 'Follow'}
            </button>
          `;
        }

        info.innerHTML = html;
      }

      async toggleLike() {
        if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
        const btn = document.getElementById('like-btn');
        if (btn.dataset.busy === '1') return;
        btn.dataset.busy = '1'; btn.disabled = true;

        try {
          if (this.isLiked) {
            const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [
              Query.equal('reelId', this.reelId),
              Query.equal('userId', session.getUserId()),
              Query.limit(1)
            ]);
            if (likes.documents.length > 0) {
              await db.remove(APPWRITE_CONFIG.COLLECTIONS.LIKES, likes.documents[0].$id);
            }
            this.isLiked = false;
            this.reel.likes = Math.max(0, (this.reel.likes || 0) - 1);
          } else {
            const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [
              Query.equal('reelId', this.reelId),
              Query.equal('userId', session.getUserId()),
              Query.limit(1)
            ]);
            if (existing.total === 0) {
              await db.create(APPWRITE_CONFIG.COLLECTIONS.LIKES, {
                likeId: ID.unique(),
                reelId: this.reelId,
                userId: session.getUserId(),
                createdAt: new Date().toISOString()
              });
            }
            this.isLiked = true;
            this.reel.likes = (this.reel.likes || 0) + 1;
          }
          this.renderInfo();
        } catch (error) {
          console.error('Like toggle failed:', error);
        } finally {
          btn.disabled = false; btn.dataset.busy = '0';
        }
      }

      async toggleFollow() {
        if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
        const btn = document.getElementById('follow-btn');
        if (btn.dataset.busy === '1') return;
        btn.data.busy = '1'; btn.disabled = true; btn.textContent = '...';

        try {
          if (this.isFollowing) {
            const follows = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', session.getUserId()),
              Query.equal('followingId', this.creator.$id),
              Query.limit(1)
            ]);
            if (follows.documents.length > 0) {
              await db.remove(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, follows.documents[0].$id);
            }
            this.isFollowing = false;
          } else {
            const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', session.getUserId()),
              Query.equal('followingId', this.creator.$id),
              Query.limit(1)
            ]);
            if (existing.total === 0) {
              await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, {
                followId: ID.unique(),
                followerId: session.getUserId(),
                followingId: this.creator.$id,
                CreatorId: this.creator.$id,
                createdAt: new Date().toISOString()
              });
            }
            this.isFollowing = true;
          }
          this.renderInfo();
        } catch (error) {
          console.error('Follow toggle failed:', error);
        } finally {
          btn.disabled = false; btn.dataset.busy = '0';
        }
      }
    }

    let videoPlayer;
    document.addEventListener('DOMContentLoaded', () => { videoPlayer = new VideoPlayer(); });
  </script>
</body>
</html>
