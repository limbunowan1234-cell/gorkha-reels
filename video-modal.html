<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: system-ui; overflow: hidden; }

    .modal-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 1000;
      display: flex;
    }

    /* Video Section */
    .video-section {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Header */
    .video-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 20px;
      padding: 8px 10px;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s;
    }

    .back-btn:active {
      background: rgba(255,255,255,0.25);
    }

    .video-title-header {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      text-align: center;
      margin: 0 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* Info Overlay */
    .video-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.95));
      padding: 24px 16px 100px;
      z-index: 10;
    }

    .creator-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .creator-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #333;
      overflow: hidden;
      flex-shrink: 0;
    }

    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .creator-details {
      flex: 1;
    }

    .creator-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .creator-username {
      font-size: 11px;
      color: #999;
    }

    .follow-btn {
      padding: 6px 14px;
      background: #dc2626;
      border: none;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .follow-btn:active {
      background: #b91c1c;
    }

    .follow-btn.following {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .video-desc {
      font-size: 12px;
      color: #e5e5e5;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    /* Actions */
    .post-actions {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }

    .action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .action-icon {
      font-size: 24px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-icon:active {
      background: rgba(255,255,255,0.2);
    }

    .action-icon.liked {
      color: #dc2626;
    }

    .action-count {
      font-size: 11px;
      color: #ccc;
    }

    /* Comments Section */
    .comments-section {
      width: 100%;
      max-width: 400px;
      background: #1a1a1a;
      border-left: 1px solid #2d2d2d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .comments-header {
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d2d;
      font-weight: 600;
      font-size: 13px;
    }

    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .comment {
      padding: 8px 16px;
      border-bottom: 1px solid #2d2d2d;
      font-size: 11px;
    }

    .comment-author {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .comment-text {
      color: #ccc;
      line-height: 1.3;
    }

    .comment-time {
      font-size: 9px;
      color: #666;
      margin-top: 2px;
    }

    .comment-input-box {
      padding: 12px 16px;
      border-top: 1px solid #2d2d2d;
      display: flex;
      gap: 8px;
    }

    .comment-input-box input {
      flex: 1;
      background: #2d2d2d;
      border: none;
      border-radius: 20px;
      padding: 8px 12px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }

    .comment-input-box input::placeholder {
      color: #666;
    }

    .comment-send {
      background: none;
      border: none;
      color: #dc2626;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .comments-section {
        display: none;
      }
    }

    .swipe-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #999;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="modal-container">
    <!-- Video Section -->
    <div class="video-section" id="videoSection">
      <video id="mainVideo" playsinline controls autoplay></video>

      <!-- Header -->
      <div class="video-header">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="video-title-header" id="videoTitle">Video</div>
        <button class="back-btn" style="visibility: hidden;">←</button>
      </div>

      <!-- Info Overlay -->
      <div class="video-info" id="videoInfo">
        <div class="creator-info">
          <div class="creator-avatar">
            <img id="creatorAvatar" src="assets/placeholder.svg" onerror="this.src='assets/placeholder.svg'">
          </div>
          <div class="creator-details">
            <div class="creator-name" id="creatorName">Creator</div>
            <div class="creator-username" id="creatorUsername">@user</div>
          </div>
          <button class="follow-btn" id="followBtn" onclick="toggleFollow()">Follow</button>
        </div>

        <div class="video-desc" id="videoDesc"></div>

        <!-- Actions -->
        <div class="post-actions">
          <div class="action-item">
            <button class="action-icon" id="likeBtn" onclick="toggleLike()">❤️</button>
            <div class="action-count" id="likeCount">0</div>
          </div>
          <div class="action-item">
            <button class="action-icon" onclick="toggleComments()">💬</button>
            <div class="action-count" id="commentCount">0</div>
          </div>
          <div class="action-item">
            <button class="action-icon" onclick="shareVideo()">↗️</button>
            <div class="action-count">Share</div>
          </div>
        </div>
      </div>

      <div class="swipe-hint">⬆️ Swipe up for more</div>
    </div>

    <!-- Comments Section -->
    <div class="comments-section" id="commentsSection" style="display: none;">
      <div class="comments-header">Comments</div>
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input-box">
        <input type="text" id="commentInput" placeholder="Add a comment...">
        <button class="comment-send" onclick="postComment()">Post</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    let currentVideo = null;
    let currentUser = null;
    let isLiked = false;
    let allReels = [];
    let currentIndex = 0;

    async function init() {
      try {
        await session.refresh();
        currentUser = session.currentUser;

        const params = new URLSearchParams(window.location.search);
        const reelId = params.get('id');

        const reels = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [Query.orderDesc('uploadedAt')]);
        allReels = reels.documents;

        if (reelId) {
          currentIndex = allReels.findIndex(r => r.$id === reelId);
        }

        loadVideo(currentIndex);
      } catch (err) {
        console.error('Init error:', err);
      }
    }

    function loadVideo(index) {
      if (index < 0 || index >= allReels.length) return;

      currentIndex = index;
      currentVideo = allReels[index];

      const video = document.getElementById('mainVideo');
      video.src = currentVideo.videoUrl;
      video.play();

      document.getElementById('videoTitle').textContent = currentVideo.title;
      document.getElementById('creatorName').textContent = currentVideo.creatorName;
      document.getElementById('creatorUsername').textContent = '@' + (currentVideo.creatorName || 'user').toLowerCase();
      document.getElementById('creatorAvatar').src = currentVideo.creatorProfilePic || 'assets/placeholder.svg';
      document.getElementById('videoDesc').textContent = currentVideo.description || '';
      document.getElementById('likeCount').textContent = (currentVideo.likes || 0) >= 1000 ? Math.floor(currentVideo.likes / 1000) + 'K' : (currentVideo.likes || 0);
      document.getElementById('commentCount').textContent = (currentVideo.comments || 0) >= 1000 ? Math.floor(currentVideo.comments / 1000) + 'K' : (currentVideo.comments || 0);

      loadComments();
      checkIfLiked();
    }

    // Swipe detection
    let touchStart = 0;
    document.getElementById('videoSection').addEventListener('touchstart', (e) => {
      touchStart = e.touches[0].clientY;
    });

    document.getElementById('videoSection').addEventListener('touchend', (e) => {
      const touchEnd = e.changedTouches[0].clientY;
      const diff = touchStart - touchEnd;

      if (diff > 50) {
        loadVideo(currentIndex + 1);
      } else if (diff < -50) {
        loadVideo(currentIndex - 1);
      }
    });

    async function toggleLike() {
      try {
        if (!currentUser) {
          alert('Login first');
          return;
        }

        const btn = document.getElementById('likeBtn');
        isLiked = !isLiked;
        btn.classList.toggle('liked');

        const newLikes = isLiked ? (currentVideo.likes || 0) + 1 : Math.max(0, (currentVideo.likes || 1) - 1);
        currentVideo.likes = newLikes;
        document.getElementById('likeCount').textContent = newLikes >= 1000 ? Math.floor(newLikes / 1000) + 'K' : newLikes;

        await db.update(APPWRITE_CONFIG.COLLECTIONS.REELS, currentVideo.$id, { likes: newLikes });
      } catch (err) {
        console.error(err);
      }
    }

    function checkIfLiked() {
      isLiked = false;
      document.getElementById('likeBtn').classList.remove('liked');
    }

    async function loadComments() {
      try {
        const comments = await db.list(APPWRITE_CONFIG.COLLECTIONS.COMMENTS, [
          Query.equal('reelId', currentVideo.$id),
          Query.orderDesc('createdAt'),
          Query.limit(10)
        ]);

        let html = '';
        comments.documents.forEach(comment => {
          html += `
            <div class="comment">
              <div class="comment-author">${comment.creatorName}</div>
              <div class="comment-text">${comment.text}</div>
              <div class="comment-time">${new Date(comment.createdAt).toLocaleDateString()}</div>
            </div>
          `;
        });

        document.getElementById('commentsList').innerHTML = html || '<div style="padding: 16px; text-align: center; color: #666;">No comments yet</div>';
      } catch (err) {
        console.error('Load comments error:', err);
      }
    }

    async function postComment() {
      try {
        if (!currentUser) {
          alert('Login first');
          return;
        }

        const text = document.getElementById('commentInput').value.trim();
        if (!text) return;

        const commentId = `${currentVideo.$id}_${Date.now()}`;
        await db.create(APPWRITE_CONFIG.COLLECTIONS.COMMENTS, {
          commentId,
          reelId: currentVideo.$id,
          creatorId: currentUser.$id,
          creatorName: currentUser.name,
          text,
          createdAt: new Date().toISOString()
        }, commentId);

        document.getElementById('commentInput').value = '';
        const newComments = (currentVideo.comments || 0) + 1;
        currentVideo.comments = newComments;
        document.getElementById('commentCount').textContent = newComments >= 1000 ? Math.floor(newComments / 1000) + 'K' : newComments;

        loadComments();
      } catch (err) {
        console.error('Post comment error:', err);
      }
    }

    function toggleComments() {
      const section = document.getElementById('commentsSection');
      section.style.display = section.style.display === 'none' ? 'flex' : 'none';
    }

    function shareVideo() {
      if (navigator.share) {
        navigator.share({
          title: currentVideo.title,
          text: currentVideo.description,
          url: window.location.href
        }).catch(err => console.error(err));
      } else {
        alert('Share: ' + currentVideo.title);
      }
    }

    function toggleFollow() {
      alert('Follow coming soon');
    }

    init();
  </script>
</body>
</html>
