<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Reels - GorkhaReels</title>
  <meta name="theme-color" content="#000">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  
  <script>
    if (window.eruda && typeof window.eruda.init !== 'function') {
      window.eruda = { init: () => {} };
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { 
      height: 100%; 
      background: #000; 
      color: #fff; 
      font-family: system-ui; 
      overflow: hidden; 
      touch-action: manipulation;
      position: fixed;
      width: 100%;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInDown { from { transform: translateY(-24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes heartPop { 0%{transform:translate(-50%,-50%) scale(0) rotate(-18deg);opacity:0;} 15%{transform:translate(-50%,-50%) scale(1.25) rotate(-18deg);opacity:1;} 35%{transform:translate(-50%,-50%) scale(1) rotate(-18deg);opacity:1;} 70%{transform:translate(-50%,-50%) scale(1.05) rotate(-18deg);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1.5) rotate(-18deg);opacity:0;} }
    @keyframes likeBounce { 0%{transform:scale(1);}40%{transform:scale(1.35);}100%{transform:scale(1);} }
    @keyframes buttonGlow { 0%{box-shadow:0 0 0 rgba(11,94,107,0.5);} 100%{box-shadow:0 0 12px rgba(11,94,107,0);} }
    @keyframes fadeStagger { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .reels-feed {
      height: 100dvh; 
      width: 100vw; 
      overflow-y: scroll; 
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch; 
      scrollbar-width: none;
      position: fixed;
      top: 0;
      left: 0;
    }
    .reels-feed::-webkit-scrollbar { display: none; }

    .reel-slide {
      height: 100dvh; 
      width: 100vw; 
      scroll-snap-align: start; 
      scroll-snap-stop: always;
      position: relative; 
      background: #000; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden;
      animation: fadeIn 0.5s ease;
      flex-shrink: 0;
    }
    .reel-slide video { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      background: #000;
      display: block;
    }

    .tap-layer { 
      position: absolute; 
      inset: 0; 
      z-index: 2; 
      touch-action: manipulation;
    }

    .pp-indicator {
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%,-50%) scale(0.8);
      font-size: 64px; 
      color: #fff; 
      opacity: 0; 
      pointer-events: none;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5); 
      transition: opacity 0.25s, transform 0.25s; 
      z-index: 3;
    }
    .pp-indicator.show { opacity: 0.9; transform: translate(-50%,-50%) scale(1); }

    .heart-pop {
      position: absolute; 
      font-size: 88px; 
      pointer-events: none; 
      z-index: 5;
      transform: translate(-50%,-50%) scale(0) rotate(-18deg);
      animation: heartPop 0.8s cubic-bezier(0.17,0.89,0.32,1.28) forwards;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .close-btn {
      position: fixed; 
      top: 14px; 
      left: 14px; 
      z-index: 20; 
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px); 
      border: none; 
      color: #fff; 
      width: 40px; 
      height: 40px;
      border-radius: 50%; 
      cursor: pointer; 
      font-size: 20px; 
      transition: all 0.2s;
      animation: slideInDown 0.4s ease;
      min-width: 40px;
      min-height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn:active { transform: scale(0.88); background: rgba(0,0,0,0.65); }

    .actions {
      position: absolute; 
      right: 10px; 
      bottom: 96px; 
      z-index: 6;
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
      align-items: center;
      animation: slideInUp 0.5s ease 0.2s both;
    }
    .action-col { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 4px; 
    }
    .a-btn {
      background: none; 
      border: none; 
      color: #fff; 
      font-size: 32px; 
      cursor: pointer;
      line-height: 1; 
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      transition: transform 0.15s;
      min-width: 44px;
      min-height: 44px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .a-btn:active { transform: scale(1.2); }
    .a-btn.liked { animation: likeBounce 0.35s ease; }
    .a-count { 
      font-size: 12px; 
      font-weight: 600; 
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      min-height: 16px;
    }

    .reel-bottom {
      position: absolute; 
      left: 14px; 
      right: 80px; 
      bottom: 28px; 
      z-index: 6;
      animation: slideInUp 0.5s ease 0.15s both;
      max-width: calc(100vw - 94px);
    }
    .reel-creator { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      margin-bottom: 8px;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .reel-creator:active {
      background: rgba(255,255,255,0.1);
    }
    .reel-avatar { 
      width: 42px; 
      height: 42px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 2px solid rgba(255,255,255,0.85); 
      background: #0B5E6B; 
      animation: fadeIn 0.4s ease;
      flex-shrink: 0;
      min-width: 42px;
    }
    .reel-creator-info {
      flex: 1;
      min-width: 0;
    }
    .reel-cname { 
      font-size: 15px; 
      font-weight: 700; 
      font-family: 'Space Grotesk', sans-serif; 
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reel-follow {
      background: #0B5E6B; 
      border: none; 
      color: #fff; 
      padding: 6px 14px;
      border-radius: 8px; 
      font-size: 12px; 
      font-weight: 700; 
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      min-width: 60px;
      min-height: 32px;
      touch-action: manipulation;
    }
    .reel-follow:active { 
      transform: scale(0.92); 
      background: #0D7377; 
      animation: buttonGlow 0.5s ease; 
    }
    .reel-follow.following { 
      background: transparent; 
      border: 1.5px solid #0B5E6B; 
    }
    .reel-title { 
      font-size: 14px; 
      text-shadow: 0 1px 8px rgba(0,0,0,0.7); 
      line-height: 1.35;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .reel-tagged {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      color: #aaa;
    }
    .reel-tagged-label {
      margin-bottom: 6px;
      font-weight: 600;
    }
    .reel-tagged-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .reel-tagged-badge {
      background: rgba(11,94,107,0.3);
      border: 1px solid rgba(11,94,107,0.5);
      color: #0B5E6B;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reel-tagged-badge:active {
      background: rgba(11,94,107,0.5);
    }

    .feed-loading { 
      position: fixed; 
      inset: 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 30; 
      background: #000; 
    }
    .spinner { 
      width: 44px; 
      height: 44px; 
      border: 3px solid #2d2d2d; 
      border-top-color: #0B5E6B; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sheet-backdrop { 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.4); 
      z-index: 40; 
      display: none; 
      animation: fadeIn 0.25s ease; 
    }
    .sheet-backdrop.open { display: block; }
    .sheet {
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      background: #1a1a1a; 
      z-index: 50;
      border-radius: 16px 16px 0 0; 
      height: 70dvh; 
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
      display: flex; 
      flex-direction: column;
      max-height: 70dvh;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-head {
      padding: 16px; 
      border-bottom: 1px solid #2d2d2d; 
      font-size: 16px; 
      font-weight: 700;
      text-align: center; 
      flex-shrink: 0; 
      animation: slideInDown 0.3s ease;
    }
    .c-list { 
      flex: 1; 
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .c-item {
      padding: 12px 16px; 
      border-bottom: 1px solid #242424; 
      display: flex; 
      gap: 10px;
      animation: fadeStagger 0.4s ease forwards;
    }
    .c-item:nth-child(1) { animation-delay: 0s; }
    .c-item:nth-child(2) { animation-delay: 0.06s; }
    .c-item:nth-child(3) { animation-delay: 0.12s; }
    .c-item:nth-child(n+4) { animation-delay: 0.18s; }
    .c-avatar { 
      width: 34px; 
      height: 34px; 
      border-radius: 50%; 
      object-fit: cover; 
      background: #0B5E6B; 
      flex-shrink: 0;
      min-width: 34px;
    }
    .c-body { 
      flex: 1; 
      min-width: 0; 
    }
    .c-author { 
      font-size: 13px; 
      font-weight: 700; 
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .c-text { 
      font-size: 14px; 
      color: #ddd; 
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .c-meta { 
      font-size: 11px; 
      color: #777; 
      margin-top: 4px; 
    }

    .c-form {
      padding: 12px 16px; 
      border-top: 1px solid #2d2d2d; 
      display: flex; 
      gap: 8px;
      flex-shrink: 0; 
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      animation: slideInUp 0.3s ease;
    }
    .c-input {
      flex: 1; 
      background: #242424; 
      border: 1px solid #2d2d2d; 
      padding: 11px 14px;
      border-radius: 22px; 
      color: #fff; 
      font-size: 14px; 
      transition: all 0.2s;
      min-height: 32px;
    }
    .c-input::placeholder { color: #777; }
    .c-input:focus { 
      outline: none; 
      border-color: #0B5E6B; 
      box-shadow: 0 0 0 2px rgba(11,94,107,0.2); 
      background: #2d2d2d; 
    }
    .c-post{
      background: #0B5E6B; 
      border: none; 
      color: #fff; 
      padding: 0 18px; 
      border-radius: 22px;
      font-size: 14px; 
      font-weight: 700; 
      cursor: pointer; 
      transition: all 0.2s;
      min-height: 32px;
      min-width: 60px;
      flex-shrink: 0;
    }
    .c-post:active { 
      transform: scale(0.94); 
      background: #0D7377; 
    }
    .c-post:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
    }
    .c-empty { 
      padding: 40px 20px; 
      text-align: center; 
      color: #888; 
      animation: fadeStagger 0.4s ease; 
    }

    .tip-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px 16px;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tip-btn {
      padding: 16px;
      background: #242424;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeStagger 0.4s ease forwards;
    }
    .tip-btn:nth-child(1) { animation-delay: 0s; }
    .tip-btn:nth-child(2) { animation-delay: 0.06s; }
    .tip-btn:nth-child(3) { animation-delay: 0.12s; }
    .tip-btn:nth-child(4) { animation-delay: 0.18s; }
    .tip-btn:active { 
      transform: scale(0.94);
      background: #0B5E6B;
      border-color: #0B5E6B;
    }
    .tip-amount {
      font-size: 18px;
      font-weight: 700;
    }
    .tip-label {
      font-size: 12px;
      color: #888;
    }

    .toast {
      position: fixed; 
      top: 20px; 
      left: 50%; 
      transform: translateX(-50%);
      padding: 11px 20px; 
      background: #0B5E6B; 
      color: #fff; 
      border-radius: 10px;
      z-index: 100; 
      font-size: 14px; 
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      animation: slideInDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                 slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 2.6s ease-in forwards;
      pointer-events: none;
    }
    .toast.error { background: #dc2626; }
  </style>
</head>
<body>
  <script>
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());
  </script>

  <button class="close-btn" onclick="window.location='index.html'">✕</button>

  <div class="feed-loading" id="feed-loading"><div class="spinner"></div></div>
  <div class="reels-feed" id="reels-feed"></div>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="comments-sheet">
    <div class="sheet-head">Comments</div>
    <div class="c-list" id="c-list"></div>
    <div class="c-form">
      <input type="text" class="c-input" id="c-input" placeholder="Add a comment...">
      <button class="c-post" id="c-post">Post</button>
    </div>
  </div>

  <div class="sheet" id="tip-sheet">
    <div class="sheet-head">💰 Send a Tip</div>
    <div class="tip-grid" id="tip-grid">
      <button class="tip-btn" onclick="openTipPayment(10)"><div class="tip-amount">₹10</div><div class="tip-label">Small</div></button>
      <button class="tip-btn" onclick="openTipPayment(20)"><div class="tip-amount">₹20</div><div class="tip-label">Nice</div></button>
      <button class="tip-btn" onclick="openTipPayment(50)"><div class="tip-amount">₹50</div><div class="tip-label">Great</div></button>
      <button class="tip-btn" onclick="openTipPayment(100)"><div class="tip-amount">₹100</div><div class="tip-label">Amazing</div></button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    const C = { ...APPWRITE_CONFIG.COLLECTIONS, VIEWS: 'views', TIPS: 'tips' };
    let REELS = [];
    let MY_UID = null;
    let LIKED = new Set();
    let currentIndex = 0;
    let currentReel = null;
    let likeBusy = new Set();

    const RAZORPAY_KEY = 'rzp_test_T5NIK9x1L2J5pT';

    function toast(msg, isErr) {
      const t = document.createElement('div');
      t.className = 'toast' + (isErr ? ' error' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function getThumb(reel) {
      const t = reel && reel.thumbnail;
      const fb = '/logo-suite/primary/logo-khukuri-512x512.png';
      if (!t) return fb;
      if (/\.(mp4|mov|webm|m4v)(\?|$)/i.test(t)) return fb;
      return t;
    }

    async function init() {
      await session.refresh();
      MY_UID = session.getUserId();
      if (!MY_UID) { window.location = 'login.html'; return; }

      try {
        const likes = await db.list(C.LIKES, [Query.equal('userId', MY_UID), Query.limit(200)]);
        likes.documents.forEach(l => LIKED.add(l.reelId));
      } catch (e) {}

      try {
        const res = await db.list(C.REELS, [
          Query.equal('isDeleted', false),
          Query.orderDesc('uploadedAt'),
          Query.limit(50)
        ]);
        REELS = res.documents.filter(r => r.videoUrl && String(r.videoUrl).trim() !== '');
      } catch (e) {
        document.getElementById('feed-loading').innerHTML = '<p style="color:#888">Could not load videos</p>';
        return;
      }

      if (!REELS.length) {
        document.getElementById('feed-loading').innerHTML = '<p style="color:#888">No videos yet</p>';
        return;
      }

      const params = new URLSearchParams(location.search);
      const startId = params.get('id') || params.get('reelId');
      let startIndex = REELS.findIndex(r => r.$id === startId);
      if (startIndex < 0) startIndex = 0;

      await buildSlides();
      document.getElementById('feed-loading').style.display = 'none';

      const slides = document.querySelectorAll('.reel-slide');
      if (slides[startIndex]) slides[startIndex].scrollIntoView();
      setActive(startIndex);

      setupObserver();
      setupComments();
    }

    async function buildSlides() {
      const feed = document.getElementById('reels-feed');
      feed.innerHTML = '';

      const CREATORS_MAP = {};
      const uniqueCreatorIds = [...new Set(REELS.map(r => r.creatorId).filter(Boolean))];
      try {
        const creatorDocs = await Promise.all(
          uniqueCreatorIds.map(id => db.get(C.CREATORS, id).catch(() => null))
        );
        creatorDocs.forEach(c => { if (c) CREATORS_MAP[c.$id] = c; });
      } catch (e) {}

      REELS.forEach((reel, i) => {
        const liked = LIKED.has(reel.$id);
        const creator = CREATORS_MAP[reel.creatorId] || {};
        const creatorName = creator.name || reel.creatorName || 'GorkhaReels';
        const creatorProfilePic = creator.profilePic || reel.creatorProfilePic || '/logo-suite/primary/logo-khukuri-512x512.png';
        
        const slide = document.createElement('div');
        slide.className = 'reel-slide';
        slide.dataset.index = i;
        slide.innerHTML = `
          <video data-index="${i}" loop playsinline preload="none" poster="${getThumb(reel)}"></video>
          <div class="tap-layer" data-index="${i}"></div>
          <div class="pp-indicator" data-index="${i}">▶︎</div>
          <div class="actions">
            <div class="action-col">
              <button class="a-btn like ${liked ? 'liked' : ''}" data-index="${i}">${liked ? '❤️' : '🤍'}</button>
              <span class="a-count like-count">${reel.likes || 0}</span>
            </div>
            <div class="action-col">
              <button class="a-btn comment" data-index="${i}">💬</button>
              <span class="a-count comment-count">${reel.comments || 0}</span>
            </div>
            <div class="action-col">
              <button class="a-btn share" data-index="${i}">↗️</button>
              <span class="a-count">Share</span>
            </div>
            <div class="action-col">
              <button class="a-btn tip" data-index="${i}">💰</button>
              <span class="a-count">Tip</span>
            </div>
          </div>
          <div class="reel-bottom">
            <div class="reel-creator" data-creator-id="${reel.creatorId || ''}">
              <img class="reel-avatar" src="${creatorProfilePic + '?t=' + Date.now()}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'" alt="${escapeHtml(creatorName)}">
              <div class="reel-creator-info">
                <div class="reel-cname">${escapeHtml(creatorName)}</div>
              </div>
              ${reel.creatorId ? `<button class="reel-follow" data-index="${i}" onclick="event.stopPropagation();">Follow</button>` : ''}
            </div>
            <div class="reel-title">${escapeHtml(reel.title || '')}</div>
            ${reel.taggedCreators && reel.taggedCreators.trim() ? (() => {
              try {
                const tagged = JSON.parse(reel.taggedCreators);
                if (Array.isArray(tagged) && tagged.length > 0) {
                  const taggedHtml = tagged.map(t => `<span class="reel-tagged-badge" onclick="event.stopPropagation(); window.location='creator-profile.html?creatorId=${escapeHtml(t.creatorId)}'">🏷️ ${escapeHtml(t.creatorName)}</span>`).join('');
                  return `<div class="reel-tagged"><div class="reel-tagged-label">Tagged Creators</div><div class="reel-tagged-list">${taggedHtml}</div></div>`;
                }
              } catch (e) {}
              return '';
            })() : ''}
          </div>
        `;
        feed.appendChild(slide);

        slide.querySelector('.like').onclick = (e) => { e.stopPropagation(); toggleLike(i); };
        slide.querySelector('.comment').onclick = (e) => { e.stopPropagation(); openComments(i); };
        slide.querySelector('.share').onclick = (e) => { e.stopPropagation(); shareReel(reel); };
        slide.querySelector('.tip').onclick = (e) => { e.stopPropagation(); openTip(i); };
        
        slide.querySelector('.reel-creator').onclick = (e) => {
          const creatorId = e.currentTarget.dataset.creatorId;
          if (creatorId) {
            window.location = `creator-profile.html?creatorId=${encodeURIComponent(creatorId)}`;
          } else {
            toast('This creator is unavailable');
          }
        };
        
        const followBtn = slide.querySelector('.reel-follow');
        if (followBtn) {
          followBtn.onclick = (e) => { 
            e.stopPropagation(); 
            toggleFollow(i, e.currentTarget); 
          };
        }

        setupTap(slide.querySelector('.tap-layer'), i);
      });
    }

    function setupTap(layer, i) {
      let lastTap = 0, timer = null, firstUnmute = false;
      layer.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
          clearTimeout(timer); lastTap = 0;
          doubleTapLike(i, e.clientX, e.clientY);
        } else {
          lastTap = now;
          timer = setTimeout(() => {
            const v = document.querySelector(`video[data-index="${i}"]`);
            if (!firstUnmute && v.muted) { v.muted = false; firstUnmute = true; flash(i, '🔊'); return; }
            if (v.paused) { v.play(); flash(i, '▶︎'); } else { v.pause(); flash(i, '❚❚'); }
          }, 280);
        }
      });
    }

    function flash(i, sym) {
      const el = document.querySelector(`.pp-indicator[data-index="${i}"]`);
      if (!el) return;
      el.textContent = sym; el.classList.add('show');
      clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 450);
    }

    function doubleTapLike(i, x, y) {
      const slide = document.querySelector(`.reel-slide[data-index="${i}"]`);
      const rect = slide.getBoundingClientRect();
      const heart = document.createElement('div');
      heart.className = 'heart-pop'; heart.textContent = '❤️';
      heart.style.left = (x - rect.left) + 'px';
      heart.style.top = (y - rect.top) + 'px';
      slide.appendChild(heart);
      setTimeout(() => heart.remove(), 800);
      if (!LIKED.has(REELS[i].$id)) toggleLike(i, true);
    }

    function setupObserver() {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const i = parseInt(entry.target.dataset.index);
          const v = entry.target.querySelector('video');
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            if (!v.src && REELS[i].videoUrl) v.src = REELS[i].videoUrl;
            if (!v.src) return;
            v.muted = false;
            v.play().catch(() => { v.muted = true; v.play().catch(()=>{}); });
            setActive(i);
            countView(i);
          } else {
            v.pause();
          }
        });
      }, { threshold: [0, 0.6, 1] });
      document.querySelectorAll('.reel-slide').forEach(s => obs.observe(s));
    }

    function setActive(i) {
      currentIndex = i;
      currentReel = REELS[i];
    }

    const viewed = new Set();
    async function countView(i) {
      const reel = REELS[i];
      if (!reel || viewed.has(reel.$id)) return;
      viewed.add(reel.$id);
      
      try {
        // Check if user already viewed this reel today
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayStr = today.toISOString();
        
        const existingView = await db.list(C.VIEWS, [
          Query.equal('userId', MY_UID),
          Query.equal('reelId', reel.$id),
          Query.greaterThanOrEqual('viewedAt', todayStr),
          Query.limit(1)
        ]);
        
        // If already viewed today, don't count again
        if (existingView.documents.length > 0) return;
        
        // Count the view
        const newViews = (reel.views || 0) + 1;
        await db.update(C.REELS, reel.$id, { views: newViews });
        reel.views = newViews;
        
        // Record the view
        const viewId = ID.unique();
        await db.create(C.VIEWS, {
          viewId,
          userId: MY_UID,
          reelId: reel.$id,
          creatorId: reel.creatorId,
          viewedAt: new Date().toISOString()
        }, viewId);
      } catch (e) {
        console.error('View count error:', e?.message || e);
      }
    }

    async function toggleLike(i, forceLike) {
      const reel = REELS[i];
      if (likeBusy.has(reel.$id)) return;
      likeBusy.add(reel.$id);
      const slide = document.querySelector(`.reel-slide[data-index="${i}"]`);
      const btn = slide.querySelector('.like');
      const countEl = slide.querySelector('.like-count');
      try {
        if (LIKED.has(reel.$id) && !forceLike) {
          const likes = await db.list(C.LIKES, [Query.equal('reelId', reel.$id), Query.equal('userId', MY_UID)]);
          if (likes.documents.length) await db.remove(C.LIKES, likes.documents[0].$id);
          LIKED.delete(reel.$id);
          reel.likes = Math.max(0, (reel.likes || 1) - 1);
          btn.textContent = '🤍'; btn.classList.remove('liked');
        } else if (!LIKED.has(reel.$id)) {
          const likeId = ID.unique();
          try {
            await db.create(C.LIKES, {
              likeId, reelId: reel.$id, creatorId: reel.creatorId, userId: MY_UID, createdAt: new Date().toISOString()
            }, likeId);
            reel.likes = (reel.likes || 0) + 1;
          } catch (err) {
            if (!(err && err.code === 409)) throw err;
          }
          LIKED.add(reel.$id);
          btn.textContent = '❤️'; void btn.offsetWidth; btn.classList.add('liked');
        } else { return; }
        countEl.textContent = reel.likes;
        try { await db.update(C.REELS, reel.$id, { likes: reel.likes }); } catch (e) {}
      } catch (err) {
        console.error('Like error:', err?.message || err);
      } finally {
        likeBusy.delete(reel.$id);
      }
    }

    async function toggleFollow(i, btn) {
      const reel = REELS[i];
      try {
        const followRes = await db.list(C.FOLLOWERS, [
          Query.equal('followerId', MY_UID),
          Query.equal('followingId', reel.creatorId)
        ]);
        if (followRes.documents.length > 0) {
          await db.remove(C.FOLLOWERS, followRes.documents[0].$id);
          btn.textContent = 'Follow'; btn.classList.remove('following');
        } else {
          const followId = ID.unique();
          await db.create(C.FOLLOWERS, {
            followId, followerId: MY_UID, followingId: reel.creatorId, CreatorId: reel.creatorId, createdAt: new Date().toISOString()
          }, followId);
          btn.textContent = 'Following'; btn.classList.add('following');
        }
      } catch (err) {
        console.error('Follow error:', err?.message || err);
      }
    }

    async function shareReel(reel) {
      const shareUrl = `${location.origin}/share?reelId=${reel.$id}`;
      try {
        if (navigator.share) await navigator.share({ title: reel.title, text: `Check out "${reel.title}" on GorkhaReels`, url: shareUrl });
        else { await navigator.clipboard.writeText(shareUrl); toast('Share link copied!'); }
      } catch (e) {}
    }

    function setupComments() {
      document.getElementById('sheet-backdrop').onclick = closeComments;
      document.getElementById('c-post').onclick = postComment;
      document.getElementById('c-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') postComment(); });
    }

    function openComments(i) {
      setActive(i);
      document.getElementById('sheet-backdrop').classList.add('open');
      document.getElementById('comments-sheet').classList.add('open');
      loadComments();
    }

    function closeComments() {
      document.getElementById('sheet-backdrop').classList.remove('open');
      document.getElementById('comments-sheet').classList.remove('open');
    }

    async function loadComments() {
      const list = document.getElementById('c-list');
      list.innerHTML = '<div class="c-empty">Loading comments...</div>';
      try {
        const res = await db.list(C.COMMENTS, [
          Query.equal('reelId', currentReel.$id),
          Query.limit(100)
        ]);
        const comments = res.documents.filter(c => !c.isDeleted);
        if (!comments.length) { list.innerHTML = '<div class="c-empty">No comments yet. Be the first!</div>'; return; }
        list.innerHTML = comments.map(c => `
          <div class="c-item">
            <img class="c-avatar" src="${(c.creatorProfilePic || '/logo-suite/primary/logo-khukuri-512x512.png') + '?t=' + Date.now()}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'" alt="${escapeHtml(c.creatorName || 'User')}">
            <div class="c-body">
              <div class="c-author">${escapeHtml(c.creatorName || 'User')}</div>
              <div class="c-text">${escapeHtml(c.text)}</div>
              <div class="c-meta">${formatDate(c.createdAt)}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Comments load error:', err?.message || err);
        list.innerHTML = '<div class="c-empty">Could not load comments</div>';
      }
    }

    async function postComment() {
      const input = document.getElementById('c-input');
      const text = input.value.trim();
      if (!text) return;
      const postBtn = document.getElementById('c-post');
      postBtn.disabled = true; postBtn.textContent = '...';

      let cName = 'User', cPic = '';
      try {
        const u = await db.get(C.CREATORS, MY_UID);
        cName = u.name || 'User'; cPic = u.profilePic || '';
      } catch (e) {
        const acct = session.getUser();
        if (acct && acct.name) cName = acct.name;
      }

      try {
        const commentId = ID.unique();
        await db.create(C.COMMENTS, {
          commentId,
          reelId: currentReel.$id,
          creatorId: MY_UID,
          creatorName: cName,
          creatorProfilePic: cPic,
          text,
          likes: 0,
          isDeleted: false,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }, commentId);

        input.value = '';
        try {
          const newCount = (currentReel.comments || 0) + 1;
          await db.update(C.REELS, currentReel.$id, { comments: newCount });
          currentReel.comments = newCount;
          const slide = document.querySelector(`.reel-slide[data-index="${currentIndex}"]`);
          if (slide) slide.querySelector('.comment-count').textContent = newCount;
        } catch (e) {}
        await loadComments();
        toast('Comment posted!');
      } catch (err) {
        console.error('Post comment error:', err?.code, err?.message || err);
        toast('Could not post comment', true);
      } finally {
        postBtn.disabled = false; postBtn.textContent = 'Post';
      }
    }

    function openTip(i) {
      setActive(i);
      document.getElementById('sheet-backdrop').classList.add('open');
      document.getElementById('tip-sheet').classList.add('open');
    }

    function closeTip() {
      document.getElementById('sheet-backdrop').classList.remove('open');
      document.getElementById('tip-sheet').classList.remove('open');
    }

    async function openTipPayment(amount) {
      if (!currentReel) {
        toast('No video selected', true);
        return;
      }
      
      let creatorEmail = 'creator@gorkhareels.app';
      try {
        const creator = await db.get(C.CREATORS, currentReel.creatorId);
        creatorEmail = creator.email || creatorEmail;
      } catch (e) {}

      const options = {
        key: RAZORPAY_KEY,
        amount: amount * 100,
        currency: 'INR',
        name: 'GorkhaReels',
        description: `Tip for ${currentReel.title || 'creator'}`,
        prefill: {
          email: session.getUser()?.email || 'user@gorkhareels.app'
        },
        handler: async (response) => {
          await saveTip(amount, response.razorpay_payment_id);
          closeTip();
          toast(`💰 Tip of ₹${amount} sent!`);
        },
        modal: {
          ondismiss: () => {
            console.log('Payment cancelled');
          }
        },
        theme: {
          color: '#0B5E6B'
        }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }

    async function saveTip(amount, paymentId) {
      if (!currentReel || !currentReel.creatorId) {
        console.error('No reel or creator info');
        return;
      }
      
      try {
        const tipId = ID.unique();
        const tipData = {
          tipId,
          creatorId: currentReel.creatorId,
          userId: MY_UID,
          amount: amount,
          paymentId: paymentId,
          status: 'completed',
          message: '',
          createdAt: new Date().toISOString()
        };

        await db.create(C.TIPS, tipData, tipId);
        console.log('✅ Tip saved:', tipId);

        // Update creator totalTips
        try {
          const creator = await db.get(C.CREATORS, currentReel.creatorId);
          const newTotal = (creator.totalTips || 0) + amount;
          await db.update(C.CREATORS, currentReel.creatorId, { totalTips: newTotal });
          console.log('✅ Creator tips updated:', newTotal);
        } catch (e) {
          console.error('Could not update creator tips:', e?.message || e);
        }
      } catch (err) {
        console.error('Save tip error:', err?.message || err);
        toast('Failed to save tip', true);
      }
    }

    function formatDate(ds) {
      const d = new Date(ds), now = new Date(), diff = now - d;
      const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
      if (m < 1) return 'now';
      if (m < 60) return m + 'm';
      if (h < 24) return h + 'h';
      if (days < 7) return days + 'd';
      return d.toLocaleDateString();
    }

    init();
  </script>
