<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video - GorkhaReels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; z-index: 1000; }
    .modal.active { display: flex; }

    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }

    video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
    }

    .info-panel {
      width: 100%;
      max-width: 400px;
      background: #1a1a1a;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .creator-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .creator-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #333;
      overflow: hidden;
    }

    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .creator-info { flex: 1; }
    .creator-name { font-weight: 600; font-size: 14px; }
    .creator-handle { font-size: 12px; color: #888; }

    .follow-btn {
      padding: 8px 16px;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .follow-btn.following {
      background: #333;
    }

    .title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .description { font-size: 14px; color: #ccc; line-height: 1.4; margin-bottom: 16px; }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }

    .stat { text-align: center; }
    .stat-num { font-size: 16px; font-weight: 600; }
    .stat-label { font-size: 12px; color: #888; }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .hashtag {
      background: #333;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .hashtag:hover {
      background: #ff6b35;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      background: #333;
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .modal { flex-direction: column; }
      .info-panel { max-width: 100%; max-height: 50vh; }
      .video-container { max-height: 50vh; }
    }

    .loading { padding: 20px; text-align: center; color: #888; }
    .error { color: #ff6b35; padding: 12px; background: rgba(255,107,53,0.1); border-radius: 6px; }
  </style>
</head>
<body>
  <div class="modal active">
    <div class="video-container">
      <button class="close-btn" onclick="window.history.back()">✕</button>
      <video id="video-player" controls></video>
      <div class="loading" id="loading">Loading...</div>
      <div class="error" id="error" style="display:none;"></div>
    </div>

    <div class="info-panel">
      <div id="video-info" style="display:none;">
        <div class="creator-header" id="creator-header">
          <div class="creator-avatar">
            <img id="creator-avatar" src="" alt="">
          </div>
          <div class="creator-info">
            <div class="creator-name" id="creator-name"></div>
            <div class="creator-handle" id="creator-handle"></div>
          </div>
          <button class="follow-btn" id="follow-btn">Follow</button>
        </div>

        <div class="title" id="video-title"></div>
        <div class="description" id="video-description"></div>

        <div class="stats">
          <div class="stat">
            <div class="stat-num" id="view-count">0</div>
            <div class="stat-label">Views</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="like-count">0</div>
            <div class="stat-label">Likes</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="comment-count">0</div>
            <div class="stat-label">Comments</div>
          </div>
        </div>

        <div class="hashtags" id="hashtags-container"></div>

        <div class="actions">
          <button class="action-btn" id="like-btn">❤️ Like</button>
          <button class="action-btn">💬 Comment</button>
          <button class="action-btn">🔗 Share</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/appwrite-config.js"></script>
  <script src="./js/utils.js"></script>
  <script>
    class VideoModal {
      constructor() {
        this.reelId = new URLSearchParams(window.location.search).get('reelId');
        this.reel = null;
        this.creator = null;
        this.isLiked = false;
        this.isFollowing = false;
        this.init();
      }

      async init() {
        try {
          await session.refresh();
          if (!this.reelId) {
            this.showError('No video specified');
            return;
          }
          await this.loadVideo();
          await this.loadCreator();
          if (session.isLoggedIn()) {
            await this.checkLikeStatus();
            await this.checkFollowStatus();
          }
          this.setupUI();
        } catch(err) {
          console.error('Init failed:', err);
          this.showError('Error loading video: ' + err.message);
        }
      }

      async loadVideo() {
        try {
          this.reel = await db.get(APPWRITE_CONFIG.COLLECTIONS.REELS, this.reelId);
          if (!this.reel || this.reel.isDeleted) {
            throw new Error('Video not found');
          }
          document.getElementById('video-player').src = this.reel.videoUrl;
          document.getElementById('loading').style.display = 'none';
        } catch(err) {
          throw new Error('Could not load video: ' + err.message);
        }
      }

      async loadCreator() {
        try {
          this.creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, this.reel.creatorId);
        } catch(err) {
          console.log('Could not load creator details');
        }
      }

      async checkLikeStatus() {
        try {
          const userId = session.getUserId();
          const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [
            Query.equal('reelId', this.reelId),
            Query.equal('userId', userId)
          ]);
          this.isLiked = likes.documents.length > 0;
        } catch(err) {
          console.log('Could not check like status');
        }
      }

      async checkFollowStatus() {
        try {
          const userId = session.getUserId();
          if (userId === this.reel.creatorId) return;
          const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
            Query.equal('followerId', userId),
            Query.equal('followingId', this.reel.creatorId)
          ]);
          this.isFollowing = followers.documents.length > 0;
        } catch(err) {
          console.log('Could not check follow status');
        }
      }

      setupUI() {
        // Creator info
        document.getElementById('creator-name').textContent = this.creator?.name || this.reel.creatorName;
        document.getElementById('creator-handle').textContent = `@${this.creator?.username || 'creator'}`;
        document.getElementById('creator-avatar').src = this.creator?.profilePic || this.reel.creatorProfilePic || 'assets/placeholder.svg';

        // Video info
        document.getElementById('video-title').textContent = this.reel.title;
        document.getElementById('video-description').textContent = this.reel.description;
        document.getElementById('view-count').textContent = this.reel.views || 0;
        document.getElementById('like-count').textContent = this.reel.likes || 0;
        document.getElementById('comment-count').textContent = this.reel.comments || 0;

        // Hashtags
        const hashtagsContainer = document.getElementById('hashtags-container');
        if (this.reel.hashtags) {
          const tags = this.reel.hashtags.split(',').map(t => t.trim()).filter(t => t);
          tags.forEach(tag => {
            const hashtag = document.createElement('div');
            hashtag.className = 'hashtag';
            hashtag.textContent = '#' + escapeHtml(tag);
            hashtag.addEventListener('click', () => {
              window.location.href = `./search.html?hashtag=${encodeURIComponent(tag)}`;
            });
            hashtagsContainer.appendChild(hashtag);
          });
        }

        // Follow button
        const followBtn = document.getElementById('follow-btn');
        if (session.isLoggedIn() && session.getUserId() === this.reel.creatorId) {
          followBtn.style.display = 'none';
        } else {
          if (this.isFollowing) {
            followBtn.classList.add('following');
            followBtn.textContent = 'Following';
          }
          followBtn.addEventListener('click', () => this.toggleFollow());
        }

        // Like button
        const likeBtn = document.getElementById('like-btn');
        if (this.isLiked) {
          likeBtn.style.background = '#ff6b35';
        }
        likeBtn.addEventListener('click', () => this.toggleLike());

        // Creator header click
        document.getElementById('creator-header').addEventListener('click', () => {
          window.location.href = `./creator-profile.html?userId=${this.reel.creatorId}`;
        });

        document.getElementById('video-info').style.display = 'flex';
        document.getElementById('video-info').style.flexDirection = 'column';
      }

      showError(message) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = message;
      }

      async toggleLike() {
        try {
          if (!session.isLoggedIn()) {
            window.location.href = './login.html';
            return;
          }

          const userId = session.getUserId();
          const likeBtn = document.getElementById('like-btn');

          if (this.isLiked) {
            const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [
              Query.equal('reelId', this.reelId),
              Query.equal('userId', userId)
            ]);
            if (likes.documents.length > 0) {
              await db.delete(APPWRITE_CONFIG.COLLECTIONS.LIKES, likes.documents[0].$id);
            }
            this.isLiked = false;
            this.reel.likes = Math.max(0, (this.reel.likes || 1) - 1);
            likeBtn.style.background = '#333';
          } else {
            const likeId = ID.unique();
            await db.create(APPWRITE_CONFIG.COLLECTIONS.LIKES, {
              likeId,
              reelId: this.reelId,
              userId,
              createdAt: new Date().toISOString()
            }, likeId);
            this.isLiked = true;
            this.reel.likes = (this.reel.likes || 0) + 1;
            likeBtn.style.background = '#ff6b35';
          }

          document.getElementById('like-count').textContent = this.reel.likes;
        } catch(err) {
          console.error('Like toggle failed:', err);
          Toast.error('Action failed');
        }
      }

      async toggleFollow() {
        try {
          if (!session.isLoggedIn()) {
            window.location.href = './login.html';
            return;
          }

          const userId = session.getUserId();
          const followBtn = document.getElementById('follow-btn');

          if (this.isFollowing) {
            const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', userId),
              Query.equal('followingId', this.reel.creatorId)
            ]);
            if (followers.documents.length > 0) {
              await db.delete(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, followers.documents[0].$id);
            }
            this.isFollowing = false;
            followBtn.classList.remove('following');
            followBtn.textContent = 'Follow';
          } else {
            const followId = ID.unique();
            await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, {
              followId,
              followerId: userId,
              followingId: this.reel.creatorId,
              createdAt: new Date().toISOString(),
              CreatorId: this.reel.creatorId
            }, followId);
            this.isFollowing = true;
            followBtn.classList.add('following');
            followBtn.textContent = 'Following';
          }
        } catch(err) {
          console.error('Follow toggle failed:', err);
          Toast.error('Action failed');
        }
      }
    }

    window.addEventListener('load', () => {
      new VideoModal();
    });
  </script>
</body>
</html>
