<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GorkhaReels</title>
  <meta name="description" content="Sign in to GorkhaReels">
  <meta name="theme-color" content="#121212">
  
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
      background: var(--dark-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .auth-logo img {
      height: 40px;
      width: auto;
    }

    .auth-logo .auth-title {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-red);
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      text-align: left;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-icon {
      position: absolute;
      left: 12px;
      top: 38px;
      font-size: 18px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      background: var(--dark-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-red);
      box-shadow: 0 0 0 2px rgba(211, 47, 47, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
    }

    .auth-button {
      padding: 12px;
      background: var(--primary-red);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .auth-button:hover:not(:disabled) {
      background: #b71c1c;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
    }

    .auth-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .auth-toggle {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .auth-toggle-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .auth-toggle-button {
      padding: 10px 16px;
      background: transparent;
      color: var(--primary-red);
      border: 1px solid var(--primary-red);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-toggle-button:hover {
      background: rgba(211, 47, 47, 0.1);
    }

    .error-message {
      background: rgba(211, 47, 47, 0.1);
      border: 1px solid var(--primary-red);
      color: var(--primary-red);
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .form-helper {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/logo.png" alt="GorkhaReels">
      <div class="auth-title">GorkhaReels</div>
    </div>

    <!-- Login Form (Initially Visible) -->
    <div id="login-form" class="auth-form">
      <div class="auth-subtitle">
        Sign in to watch, upload, and share videos
      </div>

      <div id="login-error" class="error-message"></div>

      <div class="form-group">
        <label for="login-email">📧 Email or Username</label>
        <input 
          type="text" 
          id="login-email" 
          placeholder="your.email@gmail.com or username"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="login-password">🔐 Password</label>
        <input 
          type="password" 
          id="login-password" 
          placeholder="Enter your password"
          autocomplete="current-password"
        >
      </div>

      <button class="auth-button" id="login-btn">🔓 Sign In</button>

      <div class="auth-toggle">
        <div class="auth-toggle-text">Don't have an account?</div>
        <button class="auth-toggle-button" onclick="toggleForm()">✨ Create Account</button>
      </div>
    </div>

    <!-- Signup Form (Hidden Initially) -->
    <div id="signup-form" class="auth-form" style="display: none;">
      <div class="auth-subtitle">
        Create your creator account and start sharing videos
      </div>

      <div id="signup-error" class="error-message"></div>

      <div class="form-group">
        <label for="signup-name">👤 Full Name</label>
        <input 
          type="text" 
          id="signup-name" 
          placeholder="Your full name"
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <label for="signup-email">📧 Email</label>
        <input 
          type="email" 
          id="signup-email" 
          placeholder="your.email@gmail.com"
          autocomplete="email"
        >
        <div class="form-helper">We'll never share your email</div>
      </div>

      <div class="form-group">
        <label for="signup-password">🔐 Password</label>
        <input 
          type="password" 
          id="signup-password" 
          placeholder="Create a strong password"
          autocomplete="new-password"
        >
        <div class="form-helper">Min 8 characters</div>
      </div>

      <button class="auth-button" id="signup-btn">🎬 Create Account</button>

      <div class="auth-toggle">
        <div class="auth-toggle-text">Already have an account?</div>
        <button class="auth-toggle-button" onclick="toggleForm()">🔓 Sign In</button>
      </div>
    </div>
  </div>

  <!-- Appwrite Web SDK (must load first) -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <!-- Scripts -->
  <script src="js/appwrite-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
