<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Creator Analytics - GorkhaReels</title>
  <meta name="theme-color" content="#0B5E6B">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    .container { max-width: 600px; margin: 0 auto; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 16px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); object-fit: cover; }
    .header-title { font-size: 20px; font-weight: 900; font-family: 'Space Grotesk', sans-serif; }
    .back-btn { background: rgba(255,255,255,0.18); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .back-btn:active { background: rgba(255,255,255,0.28); }

    /* Content */
    .content { padding: 16px; margin-bottom: 80px; }

    /* Card */
    .card {
      background: linear-gradient(135deg, #1a1a1a, #0d2d3a);
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card-title { font-size: 14px; font-weight: 700; color: #0B5E6B; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-item {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 700; color: #0B5E6B; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Chart Container */
    .chart-container {
      position: relative;
      height: 250px;
      margin-bottom: 16px;
    }

    /* Video List */
    .video-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #2d2d2d;
    }
    .video-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      background: #2d2d2d;
      object-fit: cover;
      flex-shrink: 0;
    }
    .video-info { flex: 1; min-width: 0; }
    .video-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-stats { font-size: 11px; color: #888; }
    .video-stats span { margin-right: 8px; }

    /* Period Selector */
    .period-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .period-btn {
      flex: 1;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #888;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .period-btn.active {
      background: #0B5E6B;
      border-color: #0B5E6B;
      color: #fff;
    }

    /* Loading */
    .loading { padding: 40px 20px; text-align: center; color: #888; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d2d2d; border-top-color: #0B5E6B; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      flex: 1;
      padding: 10px;
      font-size: 18px;
    }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="">
      <div class="header-title">Analytics</div>
    </div>
    <button class="back-btn" onclick="window.location='creator-dashboard.html'">←</button>
  </div>

  <div class="container">
    <div class="content">
      <!-- Overview Stats -->
      <div class="card">
        <div class="card-title">📊 Overview</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="total-views">0</div>
            <div class="stat-label">Total Views</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="total-likes">0</div>
            <div class="stat-label">Total Likes</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="total-comments">0</div>
            <div class="stat-label">Comments</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="total-videos">0</div>
            <div class="stat-label">Videos</div>
          </div>
        </div>
      </div>

      <!-- Engagement Chart -->
      <div class="card">
        <div class="card-title">📈 7-Day Trend</div>
        <div class="period-selector">
          <button class="period-btn active" onclick="changePeriod('7d')">7 Days</button>
          <button class="period-btn" onclick="changePeriod('30d')">30 Days</button>
          <button class="period-btn" onclick="changePeriod('all')">All Time</button>
        </div>
        <div class="chart-container">
          <canvas id="views-chart"></canvas>
        </div>
      </div>

      <!-- Engagement Breakdown -->
      <div class="card">
        <div class="card-title">❤️ Engagement Breakdown</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="engagement-rate">0%</div>
            <div class="stat-label">Engagement Rate</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avg-likes">0</div>
            <div class="stat-label">Avg Likes/Video</div>
          </div>
        </div>
        <div class="chart-container" style="height: 200px;">
          <canvas id="engagement-chart"></canvas>
        </div>
      </div>

      <!-- Top Videos -->
      <div class="card">
        <div class="card-title">🎥 Top Performing Videos</div>
        <div id="top-videos">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Revenue -->
      <div class="card">
        <div class="card-title">💰 Revenue</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="total-earnings">₹0</div>
            <div class="stat-label">Total Earnings</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avg-earning">₹0</div>
            <div class="stat-label">Avg Per Video</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='upload.html'"><span>＋</span><span class="nav-label">Create</span></button>
    <button class="nav-btn" onclick="window.location='messages.html'"><span>💬</span><span class="nav-label">Messages</span></button>
    <button class="nav-btn active"><span>📊</span><span class="nav-label">Analytics</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    const C = APPWRITE_CONFIG.COLLECTIONS;
    let viewsChart = null;
    let engagementChart = null;
    let currentPeriod = '7d';

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function init() {
      await session.refresh();
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      await loadAnalytics();
    }

    async function loadAnalytics() {
      try {
        const uid = session.getUserId();

        // Load all reels
        const reelsRes = await db.list(C.REELS, [
          Query.equal('creatorId', uid),
          Query.equal('isDeleted', false),
          Query.limit(1000)
        ]);

        const reels = reelsRes.documents || [];

        // Calculate overall stats
        const totalViews = reels.reduce((sum, r) => sum + (r.views || 0), 0);
        const totalLikes = reels.reduce((sum, r) => sum + (r.likes || 0), 0);
        const totalComments = reels.reduce((sum, r) => sum + (r.comments || 0), 0);

        document.getElementById('total-views').textContent = totalViews.toLocaleString();
        document.getElementById('total-likes').textContent = totalLikes.toLocaleString();
        document.getElementById('total-comments').textContent = totalComments.toLocaleString();
        document.getElementById('total-videos').textContent = reels.length;

        // Engagement rate
        const engagementRate = totalViews > 0 ? ((totalLikes + totalComments) / totalViews * 100).toFixed(1) : 0;
        document.getElementById('engagement-rate').textContent = engagementRate + '%';
        document.getElementById('avg-likes').textContent = reels.length > 0 ? Math.round(totalLikes / reels.length) : 0;

        // Sort reels by views
        const sortedReels = [...reels].sort((a, b) => (b.views || 0) - (a.views || 0));

        // Top videos
        const topVideosHtml = sortedReels.slice(0, 5).map(reel => `
          <div class="video-item">
            <img class="video-thumb" src="${reel.thumbnail || '/logo-suite/primary/logo-khukuri-256x256.png'}" alt="" onerror="this.src='/logo-suite/primary/logo-khukuri-256x256.png'">
            <div class="video-info">
              <div class="video-title">${escapeHtml(reel.title || 'Untitled')}</div>
              <div class="video-stats">
                <span>👁️ ${(reel.views || 0).toLocaleString()}</span>
                <span>❤️ ${(reel.likes || 0).toLocaleString()}</span>
                <span>💬 ${(reel.comments || 0).toLocaleString()}</span>
              </div>
            </div>
          </div>
        `).join('');
        document.getElementById('top-videos').innerHTML = topVideosHtml || '<p style="color: #888; text-align: center;">No videos yet</p>';

        // Revenue
        const creator = await db.get(C.CREATORS, uid);
        const totalEarnings = creator.totalTips || 0;
        const avgPerVideo = reels.length > 0 ? Math.round(totalEarnings / reels.length) : 0;
        document.getElementById('total-earnings').textContent = '₹' + totalEarnings.toLocaleString();
        document.getElementById('avg-earning').textContent = '₹' + avgPerVideo.toLocaleString();

        // Chart data
        drawViewsChart(reels);
        drawEngagementChart(reels);

      } catch (e) {
        console.error('Analytics load error:', e);
        document.body.innerHTML += `<div style="padding: 40px 20px; text-align: center; color: #888;">Error loading analytics</div>`;
      }
    }

    function drawViewsChart(reels) {
      const ctx = document.getElementById('views-chart').getContext('2d');
      
      // Get last 7 days data
      const days = [];
      const viewData = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        days.push(dateStr);

        // Count views for this day
        const dayViews = reels
          .filter(r => {
            const rDate = new Date(r.uploadedAt);
            return rDate.toDateString() === d.toDateString();
          })
          .reduce((sum, r) => sum + (r.views || 0), 0);
        viewData.push(dayViews);
      }

      if (viewsChart) viewsChart.destroy();

      viewsChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: days,
          datasets: [{
            label: 'Views',
            data: viewData,
            borderColor: '#0B5E6B',
            backgroundColor: 'rgba(11, 94, 107, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#0B5E6B',
            pointBorderColor: '#fff',
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { color: '#888', font: { size: 11 } },
              grid: { color: '#2d2d2d' }
            },
            x: {
              ticks: { color: '#888', font: { size: 11 } },
              grid: { display: false }
            }
          }
        }
      });
    }

    function drawEngagementChart(reels) {
      const ctx = document.getElementById('engagement-chart').getContext('2d');
      
      const totalLikes = reels.reduce((sum, r) => sum + (r.likes || 0), 0);
      const totalComments = reels.reduce((sum, r) => sum + (r.comments || 0), 0);

      if (engagementChart) engagementChart.destroy();

      engagementChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Likes', 'Comments'],
          datasets: [{
            data: [totalLikes, totalComments],
            backgroundColor: ['#0B5E6B', '#0D7377'],
            borderColor: '#0f0f0f',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#fff', font: { size: 12 } }
            }
          }
        }
      });
    }

    function changePeriod(period) {
      currentPeriod = period;
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      // Could implement different periods here
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
