<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Leaderboard - GorkhaReels</title>
  <meta name="theme-color" content="#0B5E6B">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    .banner {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    .banner-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .banner-logo { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; background: rgba(255,255,255,0.15); object-fit: cover; }
    .banner-title { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; color: #fff; font-family: 'Space Grotesk', sans-serif; }
    .banner-right { display: flex; gap: 8px; }
    .back-btn { width: 38px; height: 38px; border: none; border-radius: 50%; background: rgba(255,255,255,0.18); color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .back-btn:active { background: rgba(255,255,255,0.28); }

    .container { max-width: 600px; margin: 0 auto; padding: 16px; margin-bottom: 80px; }

    /* Tabs */
    .tabs {
      display: flex;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex: 1;
      min-width: 100px;
      padding: 10px 12px;
      background: transparent;
      border: none;
      color: #666;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .tab-btn.active {
      background: #0B5E6B;
      color: #fff;
    }
    .tab-btn:active { opacity: 0.8; }

    /* Leaderboard */
    .leaderboard { display: none; }
    .leaderboard.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #1a1a1a, #0d2d3a);
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      margin-bottom: 12px;
      animation: slideIn 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rank-item:nth-child(1) { animation-delay: 0s; }
    .rank-item:nth-child(2) { animation-delay: 0.06s; }
    .rank-item:nth-child(3) { animation-delay: 0.12s; }
    .rank-item:nth-child(n+4) { animation-delay: 0.18s; }

    .rank-badge {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #0B5E6B, #0D7377);
      box-shadow: 0 4px 12px rgba(11, 94, 107, 0.3);
    }

    .rank-badge.top1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); font-size: 20px; }
    .rank-badge.top2 { background: linear-gradient(135deg, #c0cfe4, #a8b8cc); font-size: 20px; }
    .rank-badge.top3 { background: linear-gradient(135deg, #d4a574, #b8956a); font-size: 20px; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-category { font-size: 11px; color: #666; }

    .rank-stat {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .stat-value { font-size: 16px; font-weight: 700; color: #0B5E6B; }
    .stat-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.3px; }

    .medal { font-size: 20px; }

    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .loading { padding: 40px 20px; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d2d2d; border-top-color: #0B5E6B; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      flex: 1;
      padding: 10px;
      font-size: 18px;
    }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <header class="banner">
    <div class="banner-left">
      <img class="banner-logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="GorkhaReels">
      <div class="banner-title">🏆 Leaderboard</div>
    </div>
    <div class="banner-right">
      <button class="back-btn" onclick="window.location='index.html'">←</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="earners">💰 Top Earners</button>
      <button class="tab-btn" data-tab="growth">📈 Top Growth</button>
      <button class="tab-btn" data-tab="views">👁️ Top Views</button>
      <button class="tab-btn" data-tab="rising">⭐ Rising Stars</button>
    </div>

    <!-- Top Earners -->
    <div id="earners" class="leaderboard active">
      <div class="loading" id="earners-loading"><div class="spinner"></div></div>
      <div id="earners-list"></div>
    </div>

    <!-- Top Growth -->
    <div id="growth" class="leaderboard">
      <div class="loading" id="growth-loading"><div class="spinner"></div></div>
      <div id="growth-list"></div>
    </div>

    <!-- Top Views -->
    <div id="views" class="leaderboard">
      <div class="loading" id="views-loading"><div class="spinner"></div></div>
      <div id="views-list"></div>
    </div>

    <!-- Rising Stars -->
    <div id="rising" class="leaderboard">
      <div class="loading" id="rising-loading"><div class="spinner"></div></div>
      <div id="rising-list"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='search.html'"><span>🔍</span><span class="nav-label">Search</span></button>
    <button class="nav-btn active"><span>🏆</span><span class="nav-label">Top</span></button>
    <button class="nav-btn" onclick="window.location='creator-dashboard.html'"><span>👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    const C = APPWRITE_CONFIG.COLLECTIONS;

    async function init() {
      await session.refresh();
      
      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.leaderboard').forEach(l => l.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab).classList.add('active');
          
          const tabName = btn.dataset.tab;
          if (tabName === 'earners') loadEarners();
          else if (tabName === 'growth') loadGrowth();
          else if (tabName === 'views') loadViews();
          else if (tabName === 'rising') loadRising();
        });
      });

      // Load initial
      loadEarners();
    }

    async function loadEarners() {
      try {
        const creators = await db.list(C.CREATORS, [
          Query.orderDesc('totalTips'),
          Query.limit(20)
        ]);
        
        const list = document.getElementById('earners-list');
        const loading = document.getElementById('earners-loading');
        
        if (!creators.documents.length) {
          list.innerHTML = '<div class="empty-state">No creators yet</div>';
          loading.style.display = 'none';
          return;
        }

        const medals = ['🥇', '🥈', '🥉'];
        list.innerHTML = creators.documents.map((creator, idx) => `
          <div class="rank-item" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
            <div class="rank-badge ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}">
              ${idx < 3 ? medals[idx] : `#${idx + 1}`}
            </div>
            <div class="rank-info">
              <div class="rank-name">${escapeHtml(creator.name || 'Creator')}</div>
              <div class="rank-category">${creator.category || 'Common Zone'}</div>
            </div>
            <div class="rank-stat">
              <div class="stat-value">₹${(creator.totalTips || 0).toLocaleString()}</div>
              <div class="stat-label">Earned</div>
            </div>
          </div>
        `).join('');
        
        loading.style.display = 'none';
      } catch (e) {
        console.error('Load earners error:', e);
        document.getElementById('earners-list').innerHTML = '<div class="empty-state">Error loading leaderboard</div>';
        document.getElementById('earners-loading').style.display = 'none';
      }
    }

    async function loadGrowth() {
      try {
        const followers = await db.list(C.FOLLOWERS, [Query.limit(1000)]);
        const creators = await db.list(C.CREATORS, [Query.limit(100)]);
        
        // Count followers per creator
        const followerCounts = {};
        followers.documents.forEach(f => {
          followerCounts[f.followingId] = (followerCounts[f.followingId] || 0) + 1;
        });

        // Sort by follower count
        const sorted = creators.documents
          .map(c => ({ ...c, followerCount: followerCounts[c.$id] || 0 }))
          .sort((a, b) => b.followerCount - a.followerCount)
          .slice(0, 20);

        const list = document.getElementById('growth-list');
        const loading = document.getElementById('growth-loading');
        
        if (!sorted.length) {
          list.innerHTML = '<div class="empty-state">No creators yet</div>';
          loading.style.display = 'none';
          return;
        }

        const medals = ['🥇', '🥈', '🥉'];
        list.innerHTML = sorted.map((creator, idx) => `
          <div class="rank-item" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
            <div class="rank-badge ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}">
              ${idx < 3 ? medals[idx] : `#${idx + 1}`}
            </div>
            <div class="rank-info">
              <div class="rank-name">${escapeHtml(creator.name || 'Creator')}</div>
              <div class="rank-category">${creator.category || 'Common Zone'}</div>
            </div>
            <div class="rank-stat">
              <div class="stat-value">${creator.followerCount.toLocaleString()}</div>
              <div class="stat-label">Followers</div>
            </div>
          </div>
        `).join('');
        
        loading.style.display = 'none';
      } catch (e) {
        console.error('Load growth error:', e);
        document.getElementById('growth-list').innerHTML = '<div class="empty-state">Error loading leaderboard</div>';
        document.getElementById('growth-loading').style.display = 'none';
      }
    }

    async function loadViews() {
      try {
        const creators = await db.list(C.CREATORS, [
          Query.orderDesc('totalViews'),
          Query.limit(20)
        ]);
        
        const list = document.getElementById('views-list');
        const loading = document.getElementById('views-loading');
        
        if (!creators.documents.length) {
          list.innerHTML = '<div class="empty-state">No creators yet</div>';
          loading.style.display = 'none';
          return;
        }

        const medals = ['🥇', '🥈', '🥉'];
        list.innerHTML = creators.documents.map((creator, idx) => `
          <div class="rank-item" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
            <div class="rank-badge ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}">
              ${idx < 3 ? medals[idx] : `#${idx + 1}`}
            </div>
            <div class="rank-info">
              <div class="rank-name">${escapeHtml(creator.name || 'Creator')}</div>
              <div class="rank-category">${creator.category || 'Common Zone'}</div>
            </div>
            <div class="rank-stat">
              <div class="stat-value">${(creator.totalViews || 0).toLocaleString()}</div>
              <div class="stat-label">Views</div>
            </div>
          </div>
        `).join('');
        
        loading.style.display = 'none';
      } catch (e) {
        console.error('Load views error:', e);
        document.getElementById('views-list').innerHTML = '<div class="empty-state">Error loading leaderboard</div>';
        document.getElementById('views-loading').style.display = 'none';
      }
    }

    async function loadRising() {
      try {
        const reels = await db.list(C.REELS, [
          Query.orderDesc('uploadedAt'),
          Query.limit(500)
        ]);
        
        const creators = await db.list(C.CREATORS, [Query.limit(100)]);
        const creatorMap = {};
        creators.documents.forEach(c => { creatorMap[c.$id] = c; });

        // Calculate engagement rate per creator (last week)
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        
        const engagement = {};
        reels.documents
          .filter(r => new Date(r.uploadedAt) > weekAgo)
          .forEach(r => {
            if (!r.creatorId) return;
            if (!engagement[r.creatorId]) {
              engagement[r.creatorId] = { views: 0, likes: 0, comments: 0 };
            }
            engagement[r.creatorId].views += r.views || 0;
            engagement[r.creatorId].likes += r.likes || 0;
            engagement[r.creatorId].comments += r.comments || 0;
          });

        // Calculate rise score
        const rising = Object.entries(engagement)
          .map(([creatorId, stats]) => {
            const rate = stats.views > 0 ? ((stats.likes + stats.comments) / stats.views * 100).toFixed(1) : 0;
            return {
              ...creatorMap[creatorId],
              engagementRate: parseFloat(rate),
              weekViews: stats.views
            };
          })
          .filter(c => c.$id && c.weekViews > 0)
          .sort((a, b) => b.engagementRate - a.engagementRate)
          .slice(0, 20);

        const list = document.getElementById('rising-list');
        const loading = document.getElementById('rising-loading');
        
        if (!rising.length) {
          list.innerHTML = '<div class="empty-state">No data yet</div>';
          loading.style.display = 'none';
          return;
        }

        const medals = ['🥇', '🥈', '🥉'];
        list.innerHTML = rising.map((creator, idx) => `
          <div class="rank-item" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
            <div class="rank-badge ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}">
              ${idx < 3 ? medals[idx] : `#${idx + 1}`}
            </div>
            <div class="rank-info">
              <div class="rank-name">${escapeHtml(creator.name || 'Creator')}</div>
              <div class="rank-category">${creator.category || 'Common Zone'}</div>
            </div>
            <div class="rank-stat">
              <div class="stat-value">${creator.engagementRate}%</div>
              <div class="stat-label">Engagement</div>
            </div>
          </div>
        `).join('');
        
        loading.style.display = 'none';
      } catch (e) {
        console.error('Load rising error:', e);
        document.getElementById('rising-list').innerHTML = '<div class="empty-state">Error loading leaderboard</div>';
        document.getElementById('rising-loading').style.display = 'none';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
