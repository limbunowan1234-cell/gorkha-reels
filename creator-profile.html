<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Profile - GorkhaReels</title>
  <!-- ✅ FAVICON & META TAGS -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon/logo-3-minimalist-icon-32x32.png">
  <meta property="og:image" content="/icons/hero/splash-screen-1200x1200.png">
  <meta name="theme-color" content="#0B5E6B">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    /* ===== TEAL HEADER WITH WORDMARK ===== */
    .banner {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(212, 165, 116, 0.75);
      box-shadow: 0 1px 0 rgba(232, 196, 160, 0.18), 0 4px 24px rgba(11, 94, 107, 0.3);
    }
    .banner-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .banner-logo { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.15); object-fit: cover; }
    .banner-text { min-width: 0; }
    .banner-title { font-size: 16px; font-weight: 800; letter-spacing: 0.3px; line-height: 1.1; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.25); }
    .banner-tagline { font-size: 10px; font-weight: 600; color: #D4A574; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.3px; }
    .banner-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .banner-btn { width: 36px; height: 36px; border: none; border-radius: 50%; background: rgba(255,255,255,0.15); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .banner-btn:active { background: rgba(255,255,255,0.25); }

    .profile-header { padding: 20px; text-align: center; background: transparent; border-bottom: 1px solid #2d2d2d; }
    .profile-pic-large { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #D4A574; margin-bottom: 12px; }
    .profile-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .verified-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; background: #0284c7; border-radius: 50%; color: #fff; font-size: 11px; margin-left: 4px; vertical-align: middle; }
    .profile-bio { font-size: 14px; color: #aaa; margin-bottom: 15px; }

    .profile-stats { display: flex; justify-content: center; gap: 30px; margin: 15px 0; }
    .stat { text-align: center; cursor: pointer; }
    .stat-number { font-size: 20px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }

    .follow-btn { padding: 12px 40px; background: linear-gradient(135deg, #0B5E6B, #0D7377); color: white; border: none; border-radius: 25px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(11,94,107,.3); }
    .follow-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(11,94,107,.4); }
    .follow-btn.following { background: #262626; color: #ccc; }

    .videos-section { padding: 15px; border-bottom: 1px solid #2d2d2d; }
    .videos-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

    .videos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; background: #0f0f0f; }
    .video-thumb { position: relative; aspect-ratio: 9/16; background: #1a1a1a; cursor: pointer; overflow: hidden; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-views { position: absolute; bottom: 6px; left: 6px; font-size: 12px; color: white; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }

    .loading { text-align: center; padding: 40px; color: #888; }

    .list-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; }
    .list-backdrop.open { display: block; }
    .list-sheet { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 210; background: #161616; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s ease; }
    .list-sheet.open { transform: translateY(0); }
    .list-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #262626; font-weight: 700; }
    .list-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
    .list-body { flex: 1; overflow-y: auto; }
    .list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
    .list-item:active { background: #1a1a1a; }
    .list-avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; overflow: hidden; flex-shrink: 0; }
    .list-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .list-name { font-size: 15px; font-weight: 600; flex: 1; }
    .list-empty { text-align: center; color: #888; padding: 40px 20px; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #2d2d2d; display: flex; justify-content: space-around; align-items: center; padding: 8px 0; z-index: 100; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #666; cursor: pointer; flex: 1; padding: 10px; font-size: 18px; }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }

    .content { margin-bottom: 90px; }

    .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .drawer-backdrop.open { display: block; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 80%; max-width: 320px; background: #161616; z-index: 160; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.5); }
    .drawer.open { transform: translateX(0); }
    .drawer-head { background: linear-gradient(135deg, #0B5E6B, #0D7377); padding: 20px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(212, 165, 116, 0.75); }
    .drawer-head img { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); }
    .drawer-head .dh-title { font-size: 16px; font-weight: 800; }
    .drawer-head .dh-sub { font-size: 11px; color: #D4A574; font-weight: 600; }
    .drawer-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .drawer-item { width: 100%; display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: none; border: none; color: #fff; font-size: 15px; cursor: pointer; text-align: left; }
    .drawer-item:active { background: #222; }
    .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
    .drawer-sep { height: 1px; background: #262626; margin: 6px 18px; }
    .drawer-item-danger { color: #ef4444; }
  </style>
</head>
<body>

  <!-- ===== TEAL HEADER WITH WORDMARK ===== -->
  <header class="banner">
    <div class="banner-left">
      <img class="banner-logo" src="/icons/wordmark/logo-2-wordmark-300x300.png" alt="GorkhaReels">
      <div class="banner-text">
        <div class="banner-title">GorkhaReels</div>
        <div class="banner-tagline">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="banner-right">
      <button class="banner-btn" onclick="window.location='search.html'" aria-label="Search">🔍</button>
      <button class="banner-btn" id="open-drawer" aria-label="Menu">☰</button>
    </div>
  </header>

  <div class="content">
    <div class="profile-header">
      <img id="profile-pic" class="profile-pic-large" src="/icons/primary/logo-1-app-icon-180x180.png" alt="Profile">
      <h2 id="creator-name" class="profile-name">Loading...</h2>
      <p id="creator-bio" class="profile-bio"></p>

      <div class="profile-stats">
        <div class="stat">
          <div class="stat-number" id="videos-count">0</div>
          <div class="stat-label">Videos</div>
        </div>
        <div class="stat" id="followers-stat">
          <div class="stat-number" id="followers-count">0</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat" id="following-stat">
          <div class="stat-number" id="following-count">0</div>
          <div class="stat-label">Following</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="views-count">0</div>
          <div class="stat-label">Views</div>
        </div>
      </div>

      <button id="follow-btn" class="follow-btn">Follow</button>
    </div>

    <div class="videos-section">
      <div class="videos-title">🎬 Videos</div>
    </div>
    <div id="videos-grid" class="videos-grid"></div>

    <div id="loading" class="loading">Loading profile...</div>
  </div>

  <div class="list-backdrop" id="list-backdrop"></div>
  <div class="list-sheet" id="list-sheet">
    <div class="list-header">
      <span id="list-title">Followers</span>
      <button class="list-close" id="list-close">✕</button>
    </div>
    <div class="list-body" id="list-body"></div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'">
      <span>🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="window.location='upload.html'">
      <span>＋</span><span class="nav-label">Create</span>
    </button>
    <button class="nav-btn active" onclick="window.location='creator-dashboard.html'">
      <span>👤</span><span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- ===== APP DRAWER ===== -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <img src="/icons/wordmark/logo-2-wordmark-300x300.png" alt="GorkhaReels" style="height:36px;width:auto;">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html#edit'"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    class ProfileManager {
      constructor() {
        this.creatorId = new URLSearchParams(window.location.search).get('userId') || new URLSearchParams(window.location.search).get('id');
        this.creator = null;
        this.isFollowing = false;
        this.init();
      }

      async init() {
        if (!this.creatorId) { alert('No creator ID'); history.back(); return; }
        await session.refresh();
        this.setupDrawer();
        this.setupListModal();
        await this.loadProfile();
        document.getElementById('follow-btn').addEventListener('click', () => this.toggleFollow());
      }

      setupDrawer() {
        const open = () => { document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-backdrop').classList.add('open'); };
        const close = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-backdrop').classList.remove('open'); };
        document.getElementById('open-drawer').onclick = open;
        document.getElementById('drawer-backdrop').onclick = close;
        document.querySelectorAll('.drawer-item').forEach(btn => btn.addEventListener('click', close));
        document.getElementById('drawer-logout').onclick = async () => {
          try { await session.logout(); } catch (e) {}
          window.location = 'login.html';
        };
      }

      setupListModal() {
        document.getElementById('list-close').onclick = () => this.closeList();
        document.getElementById('list-backdrop').onclick = () => this.closeList();
      }

      async openFollowersList() {
        document.getElementById('list-title').textContent = 'Followers';
        document.getElementById('list-backdrop').classList.add('open');
        document.getElementById('list-sheet').classList.add('open');
        const listBody = document.getElementById('list-body');
        listBody.innerHTML = '<div class="list-empty">Loading...</div>';
        try {
          const follows = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
            Query.equal('followingId', this.creatorId), Query.limit(100)
          ]);
          if (!follows.documents.length) { listBody.innerHTML = '<div class="list-empty">No followers yet</div>'; return; }
          listBody.innerHTML = '';
          for (const f of follows.documents) {
            const creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, f.followerId);
            const item = document.createElement('div');
            item.className = 'list-item';
            item.onclick = () => window.location = `creator-profile.html?userId=${creator.$id}`;
            item.innerHTML = `
              <div class="list-avatar"><img src="${creator.profilePic || '/icons/primary/logo-1-app-icon-180x180.png'}" onerror="this.src='/icons/primary/logo-1-app-icon-180x180.png'"></div>
              <div class="list-name">${escapeHtml(creator.name || 'User')}</div>
            `;
            listBody.appendChild(item);
          }
        } catch (e) { console.error('Followers load failed:', e); listBody.innerHTML = '<div class="list-empty">Could not load</div>'; }
      }

      async openFollowingList() {
        document.getElementById('list-title').textContent = 'Following';
        document.getElementById('list-backdrop').classList.add('open');
        document.getElementById('list-sheet').classList.add('open');
        const listBody = document.getElementById('list-body');
        listBody.innerHTML = '<div class="list-empty">Loading...</div>';
        try {
          const follows = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
            Query.equal('followerId', this.creatorId), Query.limit(100)
          ]);
          if (!follows.documents.length) { listBody.innerHTML = '<div class="list-empty">Not following anyone yet</div>'; return; }
          listBody.innerHTML = '';
          for (const f of follows.documents) {
            const creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, f.followingId);
            const item = document.createElement('div');
            item.className = 'list-item';
            item.onclick = () => window.location = `creator-profile.html?userId=${creator.$id}`;
            item.innerHTML = `
              <div class="list-avatar"><img src="${creator.profilePic || '/icons/primary/logo-1-app-icon-180x180.png'}" onerror="this.src='/icons/primary/logo-1-app-icon-180x180.png'"></div>
              <div class="list-name">${escapeHtml(creator.name || 'User')}</div>
            `;
            listBody.appendChild(item);
          }
        } catch (e) { console.error('Following load failed:', e); listBody.innerHTML = '<div class="list-empty">Could not load</div>'; }
      }

      closeList() {
        document.getElementById('list-backdrop').classList.remove('open');
        document.getElementById('list-sheet').classList.remove('open');
      }

      async loadProfile() {
        try {
          this.creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, this.creatorId);
          document.getElementById('creator-name').innerHTML = escapeHtml(this.creator.name || 'Creator') +
            (this.creator.isVerified ? ' <span class="verified-badge">✓</span>' : '');
          document.getElementById('creator-bio').textContent = this.creator.bio || '';
          document.getElementById('profile-pic').src = this.creator.profilePic || '/icons/primary/logo-1-app-icon-180x180.png';

          const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [Query.equal('followingId', this.creatorId)]);
          const following = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [Query.equal('followerId', this.creatorId)]);
          document.getElementById('followers-count').textContent = followers.total;
          document.getElementById('following-count').textContent = following.total;

          document.getElementById('followers-stat').onclick = () => this.openFollowersList();
          document.getElementById('following-stat').onclick = () => this.openFollowingList();

          await this.loadVideos();

          if (session.isLoggedIn() && session.getUserId() !== this.creatorId) {
            const myFollow = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', session.getUserId()),
              Query.equal('followingId', this.creatorId),
              Query.limit(1)
            ]);
            this.isFollowing = myFollow.total > 0;
            this.updateFollowButton();
            document.getElementById('follow-btn').style.display = 'inline-block';
          } else {
            document.getElementById('follow-btn').style.display = 'none';
          }
          document.getElementById('loading').style.display = 'none';
        } catch (error) {
          console.error('Profile load failed:', error);
          document.getElementById('loading').innerHTML = 'Failed to load profile';
        }
      }

      async loadVideos() {
        try {
          const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
            Query.equal('creatorId', this.creatorId),
            Query.equal('isDeleted', false),
            Query.orderDesc('uploadedAt'),
            Query.limit(50)
          ]);
          const grid = document.getElementById('videos-grid');
          document.getElementById('videos-count').textContent = response.documents.length;
          const totalViews = response.documents.reduce((sum, r) => sum + (r.views || 0), 0);
          document.getElementById('views-count').textContent = totalViews;
          if (response.documents.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#888">No videos yet</div>';
            return;
          }
          grid.innerHTML = response.documents.map(reel => `
            <div class="video-thumb" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'">
              <img src="${reel.thumbnail || '/icons/primary/logo-1-app-icon-180x180.png'}" alt="${(reel.title || '').replace(/"/g,'&quot;')}" onerror="this.src='/icons/primary/logo-1-app-icon-180x180.png'">
              <div class="video-views">👁️ ${reel.views || 0}</div>
            </div>
          `).join('');
        } catch (e) { console.error('Videos load failed:', e); }
      }

      updateFollowButton() {
        const btn = document.getElementById('follow-btn');
        if (this.isFollowing) {
          btn.textContent = 'Following';
          btn.classList.add('following');
        } else {
          btn.textContent = 'Follow';
          btn.classList.remove('following');
        }
      }

      async toggleFollow() {
        if (!session.isLoggedIn()) { window.location.href = './login.html'; return; }
        const btn = document.getElementById('follow-btn');
        if (btn.dataset.busy === '1') return;
        btn.dataset.busy = '1'; btn.disabled = true; btn.textContent = '...';
        try {
          if (this.isFollowing) {
            const follows = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', session.getUserId()),
              Query.equal('followingId', this.creatorId),
              Query.limit(1)
            ]);
            if (follows.documents.length > 0) await db.remove(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, follows.documents[0].$id);
            this.isFollowing = false;
          } else {
            const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', session.getUserId()),
              Query.equal('followingId', this.creatorId),
              Query.limit(1)
            ]);
            if (existing.total === 0) {
              await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, {
                followId: ID.unique(),
                followerId: session.getUserId(),
                followingId: this.creatorId,
                CreatorId: this.creatorId,
                createdAt: new Date().toISOString()
              });
            }
            this.isFollowing = true;
          }
          this.updateFollowButton();
          const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [Query.equal('followingId', this.creatorId)]);
          document.getElementById('followers-count').textContent = followers.total;
        } catch (error) {
          console.error('Follow failed:', error);
          this.updateFollowButton();
        } finally {
          btn.disabled = false; btn.dataset.busy = '0';
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => new ProfileManager());
  </script>
</body>
</html>
