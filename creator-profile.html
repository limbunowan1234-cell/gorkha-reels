<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Creator Profile</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header><button onclick="history.back()">←</button><div id="profile-name">Loading...</div></header>
<div id="profile-container" style="padding:20px;text-align:center">
  <img id="profile-pic" src="assets/logo.png" style="width:100px;height:100px;border-radius:50%">
  <h2 id="creator-name"></h2>
  <div><span id="videos-count">0</span> Videos • <span id="followers-count">0</span> Followers</div>
  <button id="follow-btn" style="margin-top:15px;padding:12px 30px;background:#ff3b30;color:white;border:none;border-radius:25px;font-weight:700">Follow</button>
  <div id="videos-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
<script src="js/appwrite-config.js"></script>
<script>
class ProfileManager {
  constructor(){ this.creatorId = new URLSearchParams(location.search).get('id'); this.init(); }
  async init(){ await session.refresh(); this.loadProfile(); document.getElementById('follow-btn').onclick=()=>this.toggleFollow(); }

  async loadProfile(){
    const creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, this.creatorId);
    document.getElementById('creator-name').textContent = creator.name;
    document.getElementById('profile-pic').src = creator.profilePic || 'assets/logo.png';
    document.getElementById('videos-count').textContent = creator.totalReels || 0;

    const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [Query.equal('followingId', this.creatorId)]);
    document.getElementById('followers-count').textContent = followers.total;

    if(session.isLoggedIn()){
      const myFollow = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
        Query.equal('followerID', session.getUserId()),
        Query.equal('followingId', this.creatorId)
      ]);
      document.getElementById('follow-btn').textContent = myFollow.total>0? 'Following' : 'Follow';
    }
  }

  // FIXED FOLLOW WITH followingId
  async toggleFollow(){
    if(!session.isLoggedIn()){ location.href='./login.html'; return; }
    const btn = document.getElementById('follow-btn');
    const isFollowing = btn.textContent === 'Following';
    const userId = session.getUserId();

    try {
      if(isFollowing){
        const follows = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
          Query.equal('followerID', userId),
          Query.equal('followingId', this.creatorId)
        ]);
        if(follows.documents.length) await db.remove(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, follows.documents[0].$id);
        btn.textContent = 'Follow'; btn.style.background = '#ff3b30';
      } else {
        await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, {
          followId: ID.unique(),
          followerID: userId,
          followingId: this.creatorId, // REQUIRED - THIS WAS MISSING
          CreatorId: this.creatorId,
          createdAt: new Date().toISOString()
        }, null, [Permission.read(Role.any()), Permission.delete(Role.user(userId))]);
        btn.textContent = 'Following'; btn.style.background = '#333';
      }
      this.loadProfile(); // refresh count
    } catch(e){ console.error(e); alert('Follow failed: '+e.message); }
  }
}
new ProfileManager();
</script>
</body>
</html>
