<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Profile - GorkhaReels</title>
  <meta name="theme-color" content="#121212">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .profile-page {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 80px;
    }

    /* Back header */
    .profile-back-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .back-btn:active { opacity: 0.7; }

    .back-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }

    /* Profile top - Instagram style */
    .pub-profile-top {
      display: flex;
      align-items: center;
      gap: 24px;
      margin: 20px 0 16px;
    }

    .pub-avatar {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-light);
      flex-shrink: 0;
    }

    .pub-stats-row {
      display: flex;
      flex: 1;
      justify-content: space-around;
    }

    .pub-stat-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .pub-stat-num {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .pub-stat-lbl {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Name + bio */
    .pub-identity {
      margin-bottom: 16px;
    }

    .pub-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }

    .pub-bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Follow button */
    .pub-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .follow-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--primary-red);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .follow-btn:active { opacity: 0.8; }
    .follow-btn.following {
      background: var(--dark-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .share-profile-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--dark-secondary);
      border: 1px solid var(--border-color);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Videos grid */
    .videos-section-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .grid-video-card {
      position: relative;
      aspect-ratio: 9/16;
      border-radius: 6px;
      overflow: hidden;
      background: var(--dark-secondary);
      cursor: pointer;
    }

    .grid-video-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .grid-video-views {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: flex;
      align-items: center;
      gap: 4px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
    }

    /* Loading / empty states */
    .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .error-state {
      text-align: center;
      padding: 60px 20px;
    }
  </style>
</head>
<body>

  <!-- Back Header -->
  <div class="profile-back-header">
    <button class="back-btn" onclick="history.back()">‹</button>
    <span class="back-title" id="page-title">Creator Profile</span>
  </div>

  <!-- Profile Content -->
  <div class="profile-page" id="profile-content">
    <div class="loading-state">
      <div class="spinner" style="margin: 0 auto 16px; width:32px;height:32px;border:3px solid #333;border-top-color:#dc2626;border-radius:50%;"></div>
      <p>Loading profile...</p>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='./index.html'">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="window.location.href='./index.html?trending'">
      <span>🔥</span>
      <span class="nav-label">Trending</span>
    </button>
    <button class="nav-item nav-create" onclick="window.location.href='./upload.html'">
      <span class="nav-create-btn">+</span>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item" onclick="window.location.href='./creator-dashboard.html'">
      <span>👤</span>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    // ===== CREATOR PROFILE PAGE =====
    class CreatorProfilePage {
      constructor() {
        this.creatorId = null;
        this.creatorData = null;
        this.reels = [];
        this.init();
      }

      async init() {
        // Get creator ID from URL
        const params = new URLSearchParams(window.location.search);
        this.creatorId = params.get('id');

        if (!this.creatorId) {
          this.showError('No creator specified');
          return;
        }

        // Check if viewing own profile — redirect to dashboard
        await session.refresh();
        if (session.isLoggedIn() && session.getUserId() === this.creatorId) {
          window.location.href = './creator-dashboard.html';
          return;
        }

        await this.loadCreator();
        await this.loadReels();
      }

      async loadCreator() {
        try {
          this.creatorData = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, this.creatorId);
          this.renderProfile();
        } catch (error) {
          console.error('Creator not found:', error);
          this.showError('Creator not found');
        }
      }

      renderProfile() {
        const d = this.creatorData;
        const name = d.name || 'GorkhaReels Creator';
        const bio = d.bio || '';
        const pic = d.profilePic || 'assets/logo.png';
        const followers = this.formatNumber(d.followers || 0);
        const views = this.formatNumber(d.totalViews || 0);

        // Update page title
        document.getElementById('page-title').textContent = name;
        document.title = `${name} - GorkhaReels`;

        const content = document.getElementById('profile-content');
        content.innerHTML = `
          <!-- Top stats row (Instagram style) -->
          <div class="pub-profile-top">
            <img src="${pic}" onerror="this.src='assets/logo.png'" class="pub-avatar" alt="${escapeHtml(name)}">
            <div class="pub-stats-row">
              <div class="pub-stat-cell">
                <span class="pub-stat-num" id="reel-count">...</span>
                <span class="pub-stat-lbl">Videos</span>
              </div>
              <div class="pub-stat-cell">
                <span class="pub-stat-num">${followers}</span>
                <span class="pub-stat-lbl">Followers</span>
              </div>
              <div class="pub-stat-cell">
                <span class="pub-stat-num">${views}</span>
                <span class="pub-stat-lbl">Views</span>
              </div>
            </div>
          </div>

          <!-- Name + Bio -->
          <div class="pub-identity">
            <div class="pub-name">${escapeHtml(name)}</div>
            ${bio ? `<div class="pub-bio">${escapeHtml(bio)}</div>` : ''}
          </div>

          <!-- Action buttons -->
          <div class="pub-actions">
            <button class="follow-btn" id="follow-btn" onclick="window.profilePage.toggleFollow()">
              ➕ Follow
            </button>
            <button class="share-profile-btn" onclick="window.profilePage.shareProfile()" title="Share">
              ↗️
            </button>
          </div>

          <!-- Videos -->
          <div class="videos-section-title">🎬 Videos</div>
          <div class="videos-grid" id="videos-grid">
            <div class="loading-state" style="grid-column: 1/-1;">
              <p style="color: var(--text-secondary)">Loading videos...</p>
            </div>
          </div>
        `;
      }

      async loadReels() {
        try {
          const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
            Query.equal('creatorId', this.creatorId),
            Query.equal('isDeleted', false),
            Query.orderDesc('uploadedAt'),
            Query.limit(50)
          ]);

          this.reels = response.documents;

          // Update video count
          const countEl = document.getElementById('reel-count');
          if (countEl) countEl.textContent = this.reels.length;

          this.renderVideos();
        } catch (error) {
          console.error('Error loading reels:', error);
        }
      }

      renderVideos() {
        const grid = document.getElementById('videos-grid');
        if (!grid) return;

        if (this.reels.length === 0) {
          grid.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-secondary);">
              <div style="font-size:36px;margin-bottom:12px;">🎬</div>
              <p>No videos yet</p>
            </div>`;
          return;
        }

        grid.innerHTML = this.reels.map(reel => `
          <div class="grid-video-card" onclick="window.location.href='./index.html?reel=${reel.$id}'">
            <img src="${reel.thumbnail || 'assets/logo.png'}" onerror="this.src='assets/logo.png'" alt="${escapeHtml(reel.title)}">
            <div class="grid-video-views">
              <span>👁️</span>
              <span>${this.formatNumber(reel.views || 0)}</span>
            </div>
          </div>
        `).join('');
      }

      toggleFollow() {
        const btn = document.getElementById('follow-btn');
        if (!btn) return;

        if (btn.classList.contains('following')) {
          btn.classList.remove('following');
          btn.textContent = '➕ Follow';
          Toast.success('Unfollowed');
        } else {
          btn.classList.add('following');
          btn.textContent = '✓ Following';
          Toast.success('Following! 🎉');
        }
        // Following feature coming soon — just UI for now
      }

      shareProfile() {
        const url = `${window.location.origin}${window.location.pathname}?id=${this.creatorId}`;
        if (navigator.share) {
          navigator.share({ title: this.creatorData?.name, url }).catch(() => {});
        } else {
          navigator.clipboard.writeText(url);
          Toast.success('Profile link copied! 🔗');
        }
      }

      showError(msg) {
        document.getElementById('profile-content').innerHTML = `
          <div class="error-state">
            <div style="font-size:48px;margin-bottom:16px;">😕</div>
            <h3 style="color:#fff;margin-bottom:8px;">${msg}</h3>
            <button onclick="history.back()" style="margin-top:20px;padding:10px 24px;background:var(--primary-red);border:none;border-radius:8px;color:#fff;cursor:pointer;">Go Back</button>
          </div>`;
      }

      formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return String(num);
      }
    }

    // Init
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        window.profilePage = new CreatorProfilePage();
      });
    } else {
      window.profilePage = new CreatorProfilePage();
    }
  </script>
</body>
</html>
