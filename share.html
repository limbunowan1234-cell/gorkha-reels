<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaReels - Loading...</title>
  <meta name="description" content="Discover amazing Gorkha videos on GorkhaReels">
  <meta name="theme-color" content="#0B5E6B">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  
  <!-- OpenGraph Meta Tags (Will be populated dynamically) -->
  <meta property="og:type" content="video.other">
  <meta property="og:site_name" content="GorkhaReels">
  <meta id="og-title" property="og:title" content="GorkhaReels Video">
  <meta id="og-description" property="og:description" content="Watch on GorkhaReels">
  <meta id="og-image" property="og:image" content="/logo-suite/primary/logo-khukuri-512x512.png">
  <meta id="og-url" property="og:url" content="">
  <meta id="og-video" property="og:video" content="">
  <meta property="og:video:type" content="video/mp4">
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="player">
  <meta id="twitter-title" name="twitter:title" content="GorkhaReels Video">
  <meta id="twitter-description" name="twitter:description" content="Watch on GorkhaReels">
  <meta id="twitter-image" name="twitter:image" content="/logo-suite/primary/logo-khukuri-512x512.png">
  <meta id="twitter-url" name="twitter:url" content="">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: system-ui;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      text-align: center;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #2d2d2d;
      border-top-color: #0B5E6B;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #0B5E6B;
    }

    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }

    .video-preview {
      background: linear-gradient(135deg, #1a1a1a, #0d2d3a);
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      display: none;
    }

    .video-preview.show {
      display: block;
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
      background: #0f0f0f;
      margin-bottom: 12px;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .creator-info {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 12px;
    }

    .open-btn {
      width: 100%;
      padding: 12px;
      background: #0B5E6B;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .open-btn:active {
      transform: scale(0.96);
      background: #0D7377;
    }

    .error {
      color: #ef4444;
      font-size: 14px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1>GorkhaReels</h1>
    <p>Loading video...</p>

    <div class="video-preview" id="preview">
      <div class="thumbnail">
        <img id="thumb" src="/logo-suite/primary/logo-khukuri-512x512.png" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'">
      </div>
      <div class="video-title" id="title">Video</div>
      <div class="creator-info" id="creator">Creator Name</div>
      <button class="open-btn" id="open-btn">Watch on GorkhaReels</button>
    </div>

    <div class="error" id="error" style="display: none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    async function init() {
      try {
        const params = new URLSearchParams(location.search);
        const reelId = params.get('reelId');

        if (!reelId) {
          throw new Error('No video ID provided');
        }

        // Fetch reel data
        const reel = await db.get(APPWRITE_CONFIG.COLLECTIONS.REELS, reelId);
        
        console.log('📊 Reel data:', reel);

        if (!reel || reel.isDeleted) {
          throw new Error('Video not found');
        }

        // Fetch creator data
        let creatorName = reel.creatorName || 'Creator';
        try {
          const creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, reel.creatorId);
          creatorName = creator.name || creatorName;
        } catch (e) {}

        // Get thumbnail - prioritize actual images, fallback on videos
        const getThumb = (reel) => {
          const thumb = reel && reel.thumbnail;
          const vid = reel && reel.videoUrl;
          const fb = '/logo-suite/primary/logo-khukuri-512x512.png';
          
          console.log('🔍 Thumbnail debug:', { thumb, vid, equal: thumb === vid });
          
          if (!thumb) {
            console.log('❌ No thumbnail field');
            return fb;
          }
          
          // If thumbnail IS the video file (extraction failed), use fallback
          if (thumb === vid) {
            console.log('❌ Thumbnail = Video URL (extraction failed)');
            return fb;
          }
          
          // If thumbnail is a video file, use fallback
          if (/\.(mp4|mov|webm|m4v)(\?|$)/i.test(thumb)) {
            console.log('❌ Thumbnail is video file');
            return fb;
          }
          
          // If it's a real image file on Bunny, use it
          if (/\.(jpg|jpeg|png|webp)(\?|$)/i.test(thumb)) {
            console.log('✅ Using real image thumbnail:', thumb);
            return thumb;
          }
          
          // For URLs without extension, assume it's a valid thumbnail URL
          console.log('✅ Using thumbnail URL:', thumb);
          return thumb;
        };
        };

        const thumbUrl = getThumb(reel);
        const videoUrl = `${location.origin}/video-modal.html?reelId=${reelId}`;
        const title = reel.title || 'GorkhaReels Video';
        const description = `Watch "${title}" by ${creatorName} on GorkhaReels`;

        // Update OpenGraph meta tags
        document.getElementById('og-title').setAttribute('content', title);
        document.getElementById('og-description').setAttribute('content', description);
        document.getElementById('og-image').setAttribute('content', thumbUrl);
        document.getElementById('og-url').setAttribute('content', videoUrl);
        document.getElementById('og-video').setAttribute('content', reel.videoUrl || '');

        // Update Twitter meta tags
        document.getElementById('twitter-title').setAttribute('content', title);
        document.getElementById('twitter-description').setAttribute('content', description);
        document.getElementById('twitter-image').setAttribute('content', thumbUrl);
        document.getElementById('twitter-url').setAttribute('content', videoUrl);

        // Update page title
        document.title = title + ' - GorkhaReels';

        // Update preview
        document.getElementById('thumb').src = thumbUrl;
        document.getElementById('title').textContent = title;
        document.getElementById('creator').textContent = `by ${creatorName}`;
        document.getElementById('open-btn').onclick = () => {
          window.location = videoUrl;
        };

        // Hide spinner, show preview
        document.getElementById('spinner').style.display = 'none';
        document.querySelector('p').style.display = 'none';
        document.getElementById('preview').classList.add('show');

        // Auto-redirect after 2 seconds (user can cancel by clicking back)
        // Comment out if you want users to manually click
        // setTimeout(() => {
        //   window.location = videoUrl;
        // }, 2000);

      } catch (err) {
        console.error('Share error:', err);
        document.getElementById('spinner').style.display = 'none';
        document.querySelector('p').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = '❌ ' + (err.message || 'Could not load video');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
