<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - GorkhaReels</title>
  <meta name="description" content="Search creators, videos, and hashtags on GorkhaReels">
  <meta name="theme-color" content="#121212">
  
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    .search-container {
      max-width: 100%;
      margin: 0 auto;
      padding: 0;
      background: #0f0f0f;
      min-height: 100vh;
    }

    .search-header {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 20px;
      sticky: top;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid #0D7377;
    }

    .search-input-wrapper {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .search-input:focus {
      outline: none;
      border-color: #D4A574;
      background: rgba(255, 255, 255, 0.15);
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .tab {
      flex: 1;
      padding: 14px 16px;
      background: none;
      border: none;
      color: #a3a3a3;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
    }

    .tab.active {
      color: #0B5E6B;
      border-bottom-color: #0B5E6B;
      background: rgba(11, 94, 107, 0.1);
    }

    .tab:hover {
      color: #0D7377;
    }

    .tab-content {
      display: none;
      padding: 16px;
      padding-bottom: 80px;
    }

    .tab-content.active {
      display: block;
    }

    /* Explore Grid */
    .explore-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .explore-card {
      position: relative;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
    }

    .explore-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .explore-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .explore-card-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .explore-card-meta {
      color: #a3a3a3;
      font-size: 11px;
    }

    /* Creators List */
    .creators-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .creator-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: background 0.2s;
    }

    .creator-item:hover {
      background: #1a1a1a;
    }

    .creator-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      object-fit: cover;
    }

    .creator-info {
      flex: 1;
      min-width: 0;
    }

    .creator-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Space Grotesk', sans-serif;
    }

    .creator-followers {
      font-size: 12px;
      color: #a3a3a3;
    }

    /* Hashtags List */
    .hashtags-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hashtag-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: background 0.2s;
    }

    .hashtag-item:hover {
      background: #1a1a1a;
    }

    .hashtag-info {
      flex: 1;
    }

    .hashtag-name {
      font-size: 14px;
      font-weight: 600;
      color: #0B5E6B;
      margin-bottom: 4px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .hashtag-stats {
      font-size: 12px;
      color: #a3a3a3;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #a3a3a3;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-text {
      font-size: 14px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 10px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="search-container">
    <!-- Search Header -->
    <div class="search-header">
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button class="back-btn" onclick="window.location.href='./index.html'">← Back</button>
      </div>
      <div class="search-input-wrapper">
        <input 
          type="text" 
          class="search-input" 
          id="search-input" 
          placeholder="Search videos, creators..."
          autocomplete="off"
        >
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="explore">Explore</button>
      <button class="tab" data-tab="creators">Creators</button>
      <button class="tab" data-tab="hashtags">Hashtags</button>
    </div>

    <!-- Explore Tab -->
    <div class="tab-content active" id="explore-tab">
      <div class="explore-grid" id="explore-grid">
        <div class="empty-state">
          <div class="empty-state-icon">🎬</div>
          <div class="empty-state-text">Browse trending videos</div>
        </div>
      </div>
    </div>

    <!-- Creators Tab -->
    <div class="tab-content" id="creators-tab">
      <div class="creators-list" id="creators-list">
        <div class="empty-state">
          <div class="empty-state-icon">👥</div>
          <div class="empty-state-text">Search for creators</div>
        </div>
      </div>
    </div>

    <!-- Hashtags Tab -->
    <div class="tab-content" id="hashtags-tab">
      <div class="hashtags-list" id="hashtags-list">
        <div class="empty-state">
          <div class="empty-state-icon">#️⃣</div>
          <div class="empty-state-text">Search for hashtags</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>

  <script>
    const C = APPWRITE_CONFIG.COLLECTIONS;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        tab.classList.add('active');
        const tabId = tab.dataset.tab + '-tab';
        document.getElementById(tabId).classList.add('active');

        if (tab.dataset.tab === 'explore') {
          loadExplore();
        }
      });
    });

    // Search input
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      
      if (activeTab === 'creators') {
        searchCreators(query);
      } else if (activeTab === 'hashtags') {
        searchHashtags(query);
      }
    });

    // Load Explore (Trending Videos)
    async function loadExplore() {
      try {
        const response = await db.list(C.REELS, [Query.limit(20), Query.orderDesc('views')]);
        const reels = response.documents;

        const grid = document.getElementById('explore-grid');
        if (reels.length === 0) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🎬</div><div class="empty-state-text">No videos yet</div></div>';
          return;
        }

        grid.innerHTML = reels.map(reel => `
          <div class="explore-card" onclick="window.location.href='./video-modal.html?id=${reel.$id}'">
            <img src="${getThumbSrc(reel)}" alt="${escapeHtml(reel.title)}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'">
            <div class="explore-card-overlay">
              <div class="explore-card-title">${escapeHtml(reel.title)}</div>
              <div class="explore-card-meta">${reel.views || 0} views</div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Explore load error:', error);
      }
    }

    // Search Creators by NAME ONLY
    async function searchCreators(query) {
      try {
        const list = document.getElementById('creators-list');

        if (!query) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><div class="empty-state-text">Search for creators</div></div>';
          return;
        }

        const response = await db.list(C.CREATORS, [Query.limit(100)]);
        const allCreators = response.documents;

        const filtered = allCreators.filter(creator => 
          creator.name && creator.name.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No creators found</div></div>';
          return;
        }

        list.innerHTML = filtered.map(creator => `
          <div class="creator-item" onclick="window.location.href='./creator-profile.html?id=${creator.$id}'">
            <div class="creator-avatar">
              ${creator.profilePic ? `<img src="${creator.profilePic + '?t=' + Date.now()}" alt="${escapeHtml(creator.name)}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : '👤'}
            </div>
            <div class="creator-info">
              <div class="creator-name">${escapeHtml(creator.name)}</div>
              <div class="creator-followers">${creator.followers || 0} followers</div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Creator search error:', error);
        document.getElementById('creators-list').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Error loading creators</div></div>';
      }
    }

    // Search Hashtags
    async function searchHashtags(query) {
      try {
        const list = document.getElementById('hashtags-list');

        if (!query) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">#️⃣</div><div class="empty-state-text">Search for hashtags</div></div>';
          return;
        }

        const response = await db.list(C.REELS, [Query.limit(100)]);
        const reels = response.documents;

        const hashtagMap = {};
        reels.forEach(reel => {
          const tags = reel.hashtags || [];
          if (Array.isArray(tags)) {
            tags.forEach(tag => {
              const tagStr = String(tag).toLowerCase();
              if (tagStr.includes(query.toLowerCase())) {
                hashtagMap[tagStr] = (hashtagMap[tagStr] || 0) + 1;
              }
            });
          }
        });

        const hashtags = Object.entries(hashtagMap)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count);

        if (hashtags.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No hashtags found</div></div>';
          return;
        }

        list.innerHTML = hashtags.map(tag => `
          <div class="hashtag-item" onclick="window.location.href='./search.html?hashtag=${encodeURIComponent(tag.name)}'">
            <div class="hashtag-info">
              <div class="hashtag-name">#${escapeHtml(tag.name)}</div>
              <div class="hashtag-stats">${tag.count} video${tag.count !== 1 ? 's' : ''}</div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Hashtag search error:', error);
      }
    }

    function getThumbSrc(reel) {
      const t = reel && reel.thumbnail;
      const fallback = '/logo-suite/primary/logo-khukuri-512x512.png';
      if (!t) return fallback;
      if (/\.(mp4|mov|webm|m4v)(\?|$)/i.test(t)) return fallback;
      return t;
    }

    loadExplore();
  </script>
</body>
</html>
