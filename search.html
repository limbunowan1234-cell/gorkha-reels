<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - GorkhaReels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 24px; margin-bottom: 10px; }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: color 0.2s;
    }

    .tab-btn.active {
      color: #fff;
      border-bottom-color: #ff6b35;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Videos Tab */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .video-card {
      aspect-ratio: 9/16;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .video-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 12px;
      color: #fff;
      font-size: 12px;
    }

    /* Creators Tab */
    .creator-list { display: flex; flex-direction: column; gap: 12px; }

    .creator-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      cursor: pointer;
    }

    .creator-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      overflow: hidden;
    }

    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .creator-info { flex: 1; }
    .creator-name { font-weight: 600; font-size: 14px; }
    .creator-stats { font-size: 12px; color: #888; }

    .follow-btn {
      padding: 8px 16px;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .follow-btn.following {
      background: #333;
      color: #fff;
    }

    /* Hashtags Tab */
    .hashtag-list { display: flex; flex-direction: column; gap: 12px; }

    .hashtag-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      cursor: pointer;
    }

    .hashtag-name { font-weight: 600; font-size: 16px; }
    .hashtag-stats { font-size: 12px; color: #888; }

    .loading { text-align: center; color: #888; padding: 20px; }
    .error { color: #ff6b35; padding: 12px; background: rgba(255,107,53,0.1); border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Search</h1>
      <input type="text" class="search-input" id="search-input" placeholder="Search videos, creators...">
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="videos">Videos</button>
      <button class="tab-btn" data-tab="creators">Creators</button>
      <button class="tab-btn" data-tab="hashtags">Hashtags</button>
    </div>

    <!-- Videos Tab -->
    <div id="videos" class="tab-content active">
      <div class="video-grid" id="video-grid"></div>
      <div class="loading" id="videos-loading" style="display:none;">Loading videos...</div>
      <div class="error" id="videos-error" style="display:none;"></div>
    </div>

    <!-- Creators Tab -->
    <div id="creators" class="tab-content">
      <div class="creator-list" id="creator-list"></div>
      <div class="loading" id="creators-loading" style="display:none;">Loading creators...</div>
      <div class="error" id="creators-error" style="display:none;"></div>
    </div>

    <!-- Hashtags Tab -->
    <div id="hashtags" class="tab-content">
      <div class="hashtag-list" id="hashtag-list"></div>
      <div class="loading" id="hashtags-loading" style="display:none;">Loading hashtags...</div>
      <div class="error" id="hashtags-error" style="display:none;"></div>
    </div>
  </div>

  <script src="./js/appwrite-config.js"></script>
  <script>
    class SearchPage {
      constructor() {
        this.currentTab = 'videos';
        this.searchQuery = '';
        this.followingSet = new Set();
        this.init();
      }

      async init() {
        try {
          await session.refresh();
          await this.loadFollowing();
          this.setupListeners();
          await this.loadVideos();
        } catch(err) {
          console.error('Init failed:', err);
        }
      }

      setupListeners() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            this.currentTab = e.target.dataset.tab;
            this.handleTabChange();
          });
        });

        document.getElementById('search-input').addEventListener('input', (e) => {
          this.searchQuery = e.target.value.trim().toLowerCase();
          this.handleSearch();
        });
      }

      async loadFollowing() {
        try {
          if (!session.isLoggedIn()) return;
          const userId = session.getUserId();
          const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
            Query.equal('followerId', userId)
          ]);
          followers.documents.forEach(doc => {
            this.followingSet.add(doc.followingId);
          });
        } catch(err) {
          console.log('Could not load following:', err);
        }
      }

      handleTabChange() {
        if (this.currentTab === 'videos') this.loadVideos();
        else if (this.currentTab === 'creators') this.loadCreators();
        else if (this.currentTab === 'hashtags') this.loadHashtags();
      }

      async handleSearch() {
        if (this.currentTab === 'videos') this.loadVideos();
        else if (this.currentTab === 'creators') this.loadCreators();
      }

      async loadVideos() {
        try {
          document.getElementById('videos-loading').style.display = 'block';
          document.getElementById('videos-error').style.display = 'none';

          let queries = [Query.equal('isDeleted', false)];
          
          if (this.searchQuery) {
            queries.push(Query.search('title', this.searchQuery));
          }

          const reels = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, queries);

          let filtered = reels.documents;
          if (this.searchQuery) {
            filtered = filtered.filter(r => 
              r.title.toLowerCase().includes(this.searchQuery) ||
              r.description.toLowerCase().includes(this.searchQuery) ||
              (r.hashtags && r.hashtags.toLowerCase().includes(this.searchQuery))
            );
          }

          // If searching for hashtag via URL param
          const urlParams = new URLSearchParams(window.location.search);
          const hashtagFilter = urlParams.get('hashtag');
          if (hashtagFilter) {
            filtered = filtered.filter(r => 
              r.hashtags && r.hashtags.toLowerCase().includes(hashtagFilter.toLowerCase())
            );
          }

          // Sort by views (trending)
          filtered.sort((a, b) => (b.views || 0) - (a.views || 0));

          const grid = document.getElementById('video-grid');
          grid.innerHTML = '';

          filtered.forEach(reel => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
              <img src="${reel.thumbnail || 'assets/placeholder.svg'}" alt="${escapeHtml(reel.title)}">
              <div class="video-overlay">
                <div style="font-weight:600;margin-bottom:4px;">${escapeHtml(reel.title.substring(0, 20))}</div>
                <div>👁️ ${reel.views || 0}</div>
              </div>
            `;
            card.addEventListener('click', () => {
              window.location.href = `./video-modal.html?reelId=${reel.$id}`;
            });
            grid.appendChild(card);
          });

          document.getElementById('videos-loading').style.display = 'none';
        } catch(err) {
          document.getElementById('videos-loading').style.display = 'none';
          document.getElementById('videos-error').style.display = 'block';
          document.getElementById('videos-error').textContent = 'Error loading videos: ' + err.message;
        }
      }

      async loadCreators() {
        try {
          document.getElementById('creators-loading').style.display = 'block';
          document.getElementById('creators-error').style.display = 'none';

          const creators = await db.list(APPWRITE_CONFIG.COLLECTIONS.CREATORS);
          let filtered = creators.documents;

          if (this.searchQuery) {
            filtered = filtered.filter(c =>
              c.name.toLowerCase().includes(this.searchQuery) ||
              (c.username && c.username.toLowerCase().includes(this.searchQuery))
            );
          }

          const list = document.getElementById('creator-list');
          list.innerHTML = '';

          filtered.forEach(creator => {
            const isFollowing = this.followingSet.has(creator.userId);
            const item = document.createElement('div');
            item.className = 'creator-item';
            item.innerHTML = `
              <div class="creator-avatar">
                <img src="${creator.profilePic || 'assets/placeholder.svg'}" alt="${escapeHtml(creator.name)}">
              </div>
              <div class="creator-info">
                <div class="creator-name">${escapeHtml(creator.name)}</div>
                <div class="creator-stats">${creator.followers || 0} followers • ${creator.totalReels || 0} reels</div>
              </div>
              <button class="follow-btn ${isFollowing ? 'following' : ''}">
                ${isFollowing ? 'Following' : 'Follow'}
              </button>
            `;

            const followBtn = item.querySelector('.follow-btn');
            followBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              this.toggleFollow(creator.userId, creator.name, followBtn);
            });

            item.addEventListener('click', () => {
              window.location.href = `./creator-profile.html?userId=${creator.userId}`;
            });

            list.appendChild(item);
          });

          document.getElementById('creators-loading').style.display = 'none';
        } catch(err) {
          document.getElementById('creators-loading').style.display = 'none';
          document.getElementById('creators-error').style.display = 'block';
          document.getElementById('creators-error').textContent = 'Error loading creators: ' + err.message;
        }
      }

      async loadHashtags() {
        try {
          document.getElementById('hashtags-loading').style.display = 'block';
          document.getElementById('hashtags-error').style.display = 'none';

          const reels = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
            Query.equal('isDeleted', false)
          ]);

          const hashtagMap = {};
          reels.documents.forEach(reel => {
            if (reel.hashtags) {
              const tags = reel.hashtags.split(',').map(t => t.trim().toLowerCase()).filter(t => t);
              tags.forEach(tag => {
                if (!hashtagMap[tag]) {
                  hashtagMap[tag] = { count: 0, views: 0 };
                }
                hashtagMap[tag].count++;
                hashtagMap[tag].views += reel.views || 0;
              });
            }
          });

          const hashtags = Object.entries(hashtagMap)
            .map(([name, data]) => ({ name, ...data }))
            .sort((a, b) => b.views - a.views)
            .slice(0, 50);

          const list = document.getElementById('hashtag-list');
          list.innerHTML = '';

          hashtags.forEach(ht => {
            const item = document.createElement('div');
            item.className = 'hashtag-item';
            item.innerHTML = `
              <div>
                <div class="hashtag-name">#${escapeHtml(ht.name)}</div>
                <div class="hashtag-stats">${ht.count} videos • ${ht.views} views</div>
              </div>
            `;
            item.addEventListener('click', () => {
              window.location.href = `./search.html?hashtag=${encodeURIComponent(ht.name)}`;
            });
            list.appendChild(item);
          });

          document.getElementById('hashtags-loading').style.display = 'none';
        } catch(err) {
          document.getElementById('hashtags-loading').style.display = 'none';
          document.getElementById('hashtags-error').style.display = 'block';
          document.getElementById('hashtags-error').textContent = 'Error loading hashtags: ' + err.message;
        }
      }

      async toggleFollow(targetUserId, targetName, btn) {
        try {
          if (!session.isLoggedIn()) {
            window.location.href = './login.html';
            return;
          }

          const userId = session.getUserId();
          if (userId === targetUserId) return;

          if (this.followingSet.has(targetUserId)) {
            // Unfollow
            const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [
              Query.equal('followerId', userId),
              Query.equal('followingId', targetUserId)
            ]);
            if (followers.documents.length > 0) {
              await db.delete(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, followers.documents[0].$id);
            }
            this.followingSet.delete(targetUserId);
            btn.classList.remove('following');
            btn.textContent = 'Follow';
          } else {
            // Follow
            const followId = ID.unique();
            await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, {
              followId,
              followerId: userId,
              followingId: targetUserId,
              createdAt: new Date().toISOString(),
              CreatorId: targetUserId
            }, followId);
            this.followingSet.add(targetUserId);
            btn.classList.add('following');
            btn.textContent = 'Following';
          }
        } catch(err) {
          console.error('Follow toggle failed:', err);
          Toast.error('Action failed');
        }
      }
    }

    window.addEventListener('load', () => {
      new SearchPage();
    });
  </script>
</body>
</html>
