<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Videos - GorkhaReels</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    header {
      position: sticky;
      top: 0;
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d2d;
      z-index: 100;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search-input {
      flex: 1;
      background: #2d2d2d;
      border: none;
      color: #fff;
      padding: 10px 12px;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }

    .search-input::placeholder {
      color: #666;
    }

    .search-btn {
      background: #dc2626;
      border: none;
      color: #fff;
      padding: 10px 14px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }

    .categories {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .category-btn {
      background: #2d2d2d;
      border: none;
      color: #ccc;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .category-btn.active {
      background: #dc2626;
      color: #fff;
    }

    .section-title {
      padding: 12px 16px 8px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      color: #999;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
      padding: 0 12px 12px;
      margin-bottom: 80px;
    }

    .thumbnail {
      position: relative;
      aspect-ratio: 9/16;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .thumbnail:active {
      transform: scale(0.95);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      opacity: 0.8;
    }

    .thumbnail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 12px 8px 8px;
    }

    .thumbnail-title {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 12px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2d2d2d;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }

    .nav-item {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-item.active {
      color: #dc2626;
    }

    .nav-label {
      font-size: 10px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="search-box">
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Search videos..."
        onkeyup="debounceSearch()"
      >
      <button class="search-btn" onclick="performSearch()">🔍</button>
    </div>

    <div class="categories" id="categories"></div>
  </header>

  <div id="mainContent">
    <div class="section-title">🔥 Trending</div>
    <div class="grid" id="trendingGrid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading trending...</p>
      </div>
    </div>

    <div class="section-title">⭐ Recommended</div>
    <div class="grid" id="recommendedGrid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading recommended...</p>
      </div>
    </div>
  </div>

  <div id="searchResults" style="display: none; margin-bottom: 80px;">
    <div class="section-title" id="resultTitle">Search Results</div>
    <div class="grid" id="resultsGrid"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location='index.html'">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="window.location='upload.html'">
      <span>➕</span>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item" onclick="window.location='trending.html'">
      <span>🔥</span>
      <span class="nav-label">Trending</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/thumbnail-utils.js"></script>
  <script>
    let allReels = [];
    let searchTimeout;
    const categories = ['All', 'Music', 'Comedy', 'Moto', 'Lifestyle', 'Sports', 'Dance', 'Cooking', 'Travel', 'Gaming'];
    let selectedCategory = 'All';

    async function init() {
      try {
        await session.refresh();
        await loadAllReels();
        setupCategories();
        await loadTrendingAndRecommended();
      } catch (err) {
        console.error('Init error:', err);
      }
    }

    async function loadAllReels() {
      try {
        const reels = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.orderDesc('uploadedAt'), Query.limit(100)]
        );
        allReels = reels.documents;
      } catch (err) {
        console.error('Error loading reels:', err);
      }
    }

    function setupCategories() {
      let html = '';
      categories.forEach(cat => {
        const active = cat === 'All' ? 'active' : '';
        html += `<button class="category-btn ${active}" onclick="selectCategory('${cat}')">${cat}</button>`;
      });
      document.getElementById('categories').innerHTML = html;
    }

    function selectCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      performSearch();
    }

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(performSearch, 300);
    }

    async function performSearch() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      
      if (!query) {
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('searchResults').style.display = 'none';
        return;
      }

      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('searchResults').style.display = 'block';

      let filtered = allReels.filter(reel => {
        const matchesQuery = 
          reel.title.toLowerCase().includes(query) ||
          reel.description.toLowerCase().includes(query) ||
          reel.hashtags.toLowerCase().includes(query);
        
        const matchesCategory = selectedCategory === 'All' || reel.category === selectedCategory.toLowerCase();
        
        return matchesQuery && matchesCategory;
      });

      await renderThumbnails('resultsGrid', filtered);
    }

    async function loadTrendingAndRecommended() {
      try {
        // Trending (by views)
        const trending = allReels.sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 10);
        await renderThumbnails('trendingGrid', trending);

        // Recommended (random)
        const recommended = allReels.sort(() => Math.random() - 0.5).slice(0, 10);
        await renderThumbnails('recommendedGrid', recommended);
      } catch (err) {
        console.error('Error loading sections:', err);
      }
    }

    async function renderThumbnails(elementId, reels) {
      if (!reels.length) {
        document.getElementById(elementId).innerHTML = '<div class="loading"><p>No videos found</p></div>';
        return;
      }

      let html = '';
      for (const reel of reels) {
        const thumbnail = await generateThumbnailFromVideo(reel.videoUrl);
        html += `
          <div class="thumbnail" onclick="openVideo('${reel.$id}')">
            <img src="${thumbnail}" alt="Video">
            <div class="play-icon">▶️</div>
            <div class="thumbnail-overlay">
              <div class="thumbnail-title">${reel.title}</div>
            </div>
          </div>
        `;
      }
      document.getElementById(elementId).innerHTML = html;
    }

    function openVideo(reelId) {
      window.location = `video-modal.html?id=${reelId}`;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
