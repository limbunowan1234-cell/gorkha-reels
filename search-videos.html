<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Search Videos</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; padding-bottom: 0; }

    /* Header */
    .header {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .back-btn {
      background: none;
      border: none;
      color: #a3a3a3;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 6px;
      padding: 6px 10px;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 13px;
    }

    .search-box input::placeholder { color: #666; }

    .clear-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }

    .clear-btn.show { display: block; }

    /* Content */
    .content {
      padding: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
    }

    .category-btn {
      padding: 8px 14px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #a3a3a3;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .category-btn.active {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }

    /* Section Title */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin: 16px 0 8px 0;
      color: #e5e5e5;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    /* Thumbnail */
    .thumbnail {
      position: relative;
      aspect-ratio: 9 / 16;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .thumbnail:active {
      transform: scale(0.95);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      background: rgba(220, 38, 38, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .thumbnail:hover .play-icon {
      opacity: 1;
    }

    .thumbnail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 8px;
      font-size: 10px;
    }

    .thumbnail-title {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .empty-icon { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="search-box">
      <span>🔍</span>
      <input id="search" type="text" placeholder="Search videos...">
      <button class="clear-btn" id="clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Categories -->
    <div class="categories" id="categories"></div>

    <!-- Results -->
    <div id="results">
      <div class="section-title">Trending Now</div>
      <div class="grid" id="trendingGrid"></div>

      <div class="section-title">Recommended</div>
      <div class="grid" id="recommendedGrid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/thumbnail-generator.js"></script>
  <script>
    const CATEGORIES = ['All', 'Music', 'Comedy', 'Moto', 'Lifestyle', 'Sports', 'Dance', 'Cooking', 'Travel', 'Gaming'];
    let selectedCategory = 'All';
    let debounce;

    async function init() {
      loadCategories();
      loadTrendingAndRecommended();
    }

    function loadCategories() {
      let html = '';
      CATEGORIES.forEach(cat => {
        html += `
          <button class="category-btn ${cat === 'All' ? 'active' : ''}" onclick="selectCategory('${cat}')">
            ${cat}
          </button>
        `;
      });
      document.getElementById('categories').innerHTML = html;
    }

    async function loadTrendingAndRecommended() {
      try {
        // Trending (most views)
        const trending = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.orderDesc('views'), Query.limit(12)]
        );

        // Recommended (recent)
        const recommended = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.orderDesc('uploadedAt'), Query.limit(12)]
        );

        renderThumbnails('trendingGrid', trending.documents);
        renderThumbnails('recommendedGrid', recommended.documents);
      } catch (err) {
        console.error('Load error:', err);
      }
    }

    async function renderThumbnails(elementId, reels) {
      let html = '';
      for (const reel of reels) {
        const thumbnail = await loadVideoThumbnail(reel.videoUrl, 'assets/placeholder.svg');
        html += `
          <div class="thumbnail" onclick="openVideo('${reel.$id}')">
            <img src="${thumbnail}" onerror="this.src='assets/placeholder.svg'">
            <div class="play-icon">▶</div>
            <div class="thumbnail-overlay">
              <div class="thumbnail-title">${reel.title}</div>
            </div>
          </div>
        `;
      }
      document.getElementById(elementId).innerHTML = html;
    }

    function selectCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      loadTrendingAndRecommended();
    }

    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.trim();
      document.getElementById('clear').classList.toggle('show', query.length > 0);
      
      clearTimeout(debounce);
      if (query.length > 0) {
        debounce = setTimeout(() => searchVideos(query), 300);
      } else {
        loadTrendingAndRecommended();
      }
    });

    async function searchVideos(query) {
      try {
        const results = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [
            Query.or([
              Query.contains('title', query),
              Query.contains('description', query),
              Query.contains('hashtags', query)
            ]),
            Query.orderDesc('views'),
            Query.limit(50)
          ]
        );

        if (results.documents.length === 0) {
          document.getElementById('results').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No videos found</p></div>';
          return;
        }

        let html = '<div class="section-title">Search Results</div><div class="grid" id="searchGrid"></div>';
        document.getElementById('results').innerHTML = html;
        renderThumbnails('searchGrid', results.documents);
      } catch (err) {
        console.error('Search error:', err);
      }
    }

    function clearSearch() {
      document.getElementById('search').value = '';
      document.getElementById('clear').classList.remove('show');
      loadTrendingAndRecommended();
    }

    function openVideo(reelId) {
      window.location.href = `./video-modal.html?id=${reelId}`;
    }

    init();
  </script>
</body>
</html>
