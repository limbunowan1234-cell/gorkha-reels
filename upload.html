<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>New Reel - GorkhaReels</title>
  <meta name="theme-color" content="#121212">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    body { background: #0f0f0f; overflow-x: hidden; }

    .upload-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(10,10,10,0.98);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }

    .upload-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none; color: #fff;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    #upload-header-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .header-spacer { width: 36px; }

    #step-pick {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 24px 20px;
    }

    #dropzone {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 9/16;
      border: 2px dashed #3f3f3f;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      background: #1a1a1a;
      transition: border-color 0.2s;
    }

    #dropzone.drag-over {
      border-color: var(--primary-red);
      background: rgba(220,38,38,0.05);
    }

    .dropzone-icon { font-size: 56px; }
    .dropzone-text { font-size: 18px; font-weight: 700; color: #fff; }
    .dropzone-sub { font-size: 13px; color: #737373; text-align: center; }

    .select-btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: var(--primary-red);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #step-details {
      display: none;
      flex-direction: column;
      min-height: calc(100vh - 60px);
      padding-bottom: 100px;
    }

    .details-preview {
      position: relative;
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
    }

    #video-preview {
      width: 100%;
      max-height: 45vh;
      object-fit: contain;
    }

    .change-video-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .details-form {
      padding: 20px 16px;
      flex: 1;
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #a3a3a3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 13px 14px;
      color: #fff;
      font-size: 15px;
      box-sizing: border-box;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary-red);
    }

    .form-textarea { resize: none; }
    .form-select option { background: #1a1a1a; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .post-btn-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95) 30%);
      z-index: 50;
    }

    #post-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-red), #f97316);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(220,38,38,0.4);
    }

    #post-btn:active { transform: scale(0.98); }
    #post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .char-count {
      font-size: 11px;
      color: #737373;
      text-align: right;
      margin-top: 4px;
    }

    /* ===== ON-SCREEN DEBUG PANEL (no console/eruda needed) ===== */
    #debug-panel {
      background: #000;
      border-top: 2px solid #dc2626;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #4ade80;
      max-height: 30vh;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #debug-panel .err { color: #f87171; }
    #debug-panel .warn { color: #fbbf24; }
    #debug-title {
      color: #fff;
      font-weight: 700;
      font-size: 11px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    #debug-clear {
      color: #60a5fa;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="upload-header">
    <button class="upload-back" onclick="history.length > 1 ? history.back() : window.location.href='./index.html'">‹</button>
    <span id="upload-header-title">New Reel</span>
    <div class="header-spacer"></div>
  </div>

  <div id="step-pick">
    <div id="dropzone">
      <div class="dropzone-icon">🎬</div>
      <div class="dropzone-text">Select a video</div>
      <div class="dropzone-sub">MP4, WebM, MOV<br>Max 500MB • Max 2 minutes</div>
      <button class="select-btn" type="button" id="choose-btn">
        📱 Choose from Phone
      </button>
    </div>
    <input type="file" id="video-file-input" accept="video/*" style="display:none;">
  </div>

  <div id="step-details">
    <div class="details-preview">
      <video id="video-preview" playsinline muted loop autoplay></video>
      <button class="change-video-btn" id="change-video-btn" type="button">✏️ Change</button>
    </div>

    <div class="details-form">
      <div class="form-field">
        <label class="form-label">Title *</label>
        <input id="post-title" type="text" class="form-input" placeholder="Give your reel a catchy title..." maxlength="100" oninput="document.getElementById('title-count').textContent = this.value.length + '/100'">
        <div class="char-count" id="title-count">0/100</div>
      </div>

      <div class="form-field">
        <label class="form-label">Description</label>
        <textarea id="post-description" class="form-textarea" rows="3" placeholder="What's this reel about?" maxlength="300" oninput="document.getElementById('desc-count').textContent = this.value.length + '/300'"></textarea>
        <div class="char-count" id="desc-count">0/300</div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Category</label>
          <select id="post-category" class="form-select">
            <option value="sports">⚽ Sports</option>
            <option value="entertainment" selected>🎭 Entertainment</option>
            <option value="music">🎵 Music</option>
            <option value="dance">💃 Dance</option>
            <option value="comedy">😂 Comedy</option>
            <option value="education">📚 Education</option>
            <option value="vlog">📹 Vlog</option>
            <option value="other">✨ Other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Language</label>
          <select id="post-language" class="form-select">
            <option value="Nepali" selected>🇳🇵 Nepali</option>
            <option value="Hindi">🇮🇳 Hindi</option>
            <option value="English">🇬🇧 English</option>
          </select>
        </div>
      </div>
    </div>

    <div class="post-btn-container">
      <button id="post-btn" type="button" onclick="window.uploader && window.uploader.post()">🚀 Post Reel</button>
    </div>
  </div>

  <!-- ===== ON-SCREEN DEBUG PANEL ===== -->
  <div id="debug-panel">
    <div id="debug-title">
      <span>🐞 LIVE DEBUG (no console needed)</span>
      <span id="debug-clear" onclick="document.getElementById('debug-log').innerHTML=''">clear</span>
    </div>
    <div id="debug-log"></div>
  </div>

  <script>
    // Tiny on-screen logger - works with zero external tools
    window.dlog = function(msg, type) {
      const el = document.getElementById('debug-log');
      if (!el) return;
      const line = document.createElement('div');
      if (type === 'error') line.className = 'err';
      if (type === 'warn') line.className = 'warn';
      const time = new Date().toLocaleTimeString();
      line.textContent = `[${time}] ${msg}`;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    };
    window.addEventListener('error', function(e) {
      window.dlog('UNCAUGHT: ' + e.message + ' @ ' + (e.filename||'') + ':' + (e.lineno||''), 'error');
    });
    window.dlog('Page loaded, scripts starting...');
  </script>

  <!-- Load config and upload script -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/upload.js"></script>
</body>
</html>
