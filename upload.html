<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>New Reel - GorkhaReels</title>
  <meta name="theme-color" content="#121212">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link rel="stylesheet" href="css/styles.css">

  <!-- 🚨 ERUDA BLOCKER - MUST BE FIRST -->
  <script>
    if (typeof window !== 'undefined') {
      window.eruda = null;
      window.Eruda = null;
      const origFetch = window.fetch;
      window.fetch = function(...args) {
        if (args[0] && args[0].includes && args[0].includes('eruda')) {
          return Promise.reject(new Error('Eruda blocked'));
        }
        return origFetch.apply(this, args);
      };
    }
  </script>

  <style>
    body { background: #0f0f0f; overflow-x: hidden; }

    .upload-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(10,10,10,0.98);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }

    .upload-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none; color: #fff;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    #upload-header-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .header-spacer { width: 36px; }

    #step-pick {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 24px 20px;
    }

    #dropzone {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 9/16;
      border: 2px dashed #3f3f3f;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      background: #1a1a1a;
      transition: border-color 0.2s;
    }

    #dropzone.drag-over {
      border-color: #0B5E6B;
      background: rgba(11,94,107,0.08);
    }

    .dropzone-icon { font-size: 56px; }
    .dropzone-text { font-size: 18px; font-weight: 700; color: #fff; }
    .dropzone-sub { font-size: 13px; color: #737373; text-align: center; }

    .select-btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: #0B5E6B;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    #step-details {
      display: none;
      flex-direction: column;
      min-height: calc(100vh - 60px);
      padding-bottom: 100px;
    }

    .details-preview {
      position: relative;
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
    }

    #video-preview {
      width: 100%;
      max-height: 45vh;
      object-fit: contain;
    }

    .change-video-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .details-form {
      padding: 20px 16px;
      flex: 1;
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #a3a3a3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 13px 14px;
      color: #fff;
      font-size: 15px;
      box-sizing: border-box;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: #0B5E6B;
    }

    .form-textarea { resize: none; }
    .form-select option { background: #1a1a1a; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hashtag-section {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 18px;
    }

    .hashtag-label {
      font-size: 12px;
      font-weight: 600;
      color: #a3a3a3;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .suggested-hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .hashtag-btn {
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      color: #fff;
      padding: 6px 10px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .hashtag-btn:hover {
      border-color: #0B5E6B;
      color: #0B5E6B;
    }

    .hashtag-btn.active {
      background: #0B5E6B;
      border-color: #0B5E6B;
      color: #fff;
    }

    .selected-hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2d2d2d;
    }

    .hashtag-badge {
      background: #0B5E6B;
      color: #fff;
      padding: 6px 10px;
      border-radius: 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hashtag-badge button {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }

    .post-btn-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95) 30%);
      z-index: 50;
    }

    #post-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #0B5E6B, #0D7377);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(11,94,107,0.3);
    }

    #post-btn:active { transform: scale(0.98); }
    #post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .char-count {
      font-size: 11px;
      color: #737373;
      text-align: right;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="upload-header">
    <button class="upload-back" onclick="history.length > 1 ? history.back() : window.location.href='./index.html'">‹</button>
    <span id="upload-header-title">New Reel</span>
    <div class="header-spacer"></div>
  </div>

  <div id="step-pick">
    <div id="dropzone">
      <div class="dropzone-icon">🎬</div>
      <div class="dropzone-text">Select a video</div>
      <div class="dropzone-sub">MP4, WebM, MOV<br>Max 500MB • Max 2 minutes</div>
      <button class="select-btn" type="button" id="choose-btn">
        📱 Choose from Phone
      </button>
    </div>
    <input type="file" id="video-file-input" accept="video/*" style="display:none;">
  </div>

  <div id="step-details">
    <div class="details-preview">
      <video id="video-preview" playsinline muted loop autoplay></video>
      <button class="change-video-btn" id="change-video-btn" type="button">✏️ Change</button>
    </div>

    <div class="details-form">
      <div class="form-field">
        <label class="form-label">Title *</label>
        <input id="post-title" type="text" class="form-input" placeholder="Give your reel a catchy title..." maxlength="100" oninput="updateHashtagSuggestions()">
        <div class="char-count" id="title-count">0/100</div>
      </div>

      <div class="form-field">
        <label class="form-label">Description</label>
        <textarea id="post-description" class="form-textarea" rows="3" placeholder="What's this reel about?" maxlength="300" oninput="updateHashtagSuggestions()"></textarea>
        <div class="char-count" id="desc-count">0/300</div>
      </div>

      <!-- HASHTAG SECTION -->
      <div class="form-field">
        <div class="hashtag-section">
          <div class="hashtag-label">
            <span>🏷️ Hashtags (Auto-suggested)</span>
            <span id="hashtag-count">0</span>
          </div>
          <div class="suggested-hashtags" id="suggested-hashtags"></div>
          <div class="selected-hashtags" id="selected-hashtags"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Category</label>
          <select id="post-category" class="form-select">
            <option value="sports">⚽ Sports</option>
            <option value="entertainment" selected>🎭 Entertainment</option>
            <option value="music">🎵 Music</option>
            <option value="dance">💃 Dance</option>
            <option value="comedy">😂 Comedy</option>
            <option value="education">📚 Education</option>
            <option value="vlog">📹 Vlog</option>
            <option value="other">✨ Other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Language</label>
          <select id="post-language" class="form-select">
            <option value="Nepali" selected>🇳🇵 Nepali</option>
            <option value="Hindi">🇮🇳 Hindi</option>
            <option value="English">🇬🇧 English</option>
          </select>
        </div>
      </div>
    </div>

    <div class="post-btn-container">
      <button id="post-btn" type="button" onclick="window.uploader && window.uploader.post()">🚀 Post Reel</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/upload.js"></script>

  <script>
    // Hashtag extraction helpers
    const COMMON_WORDS = new Set(['the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'can', 'your', 'my', 'his', 'her', 'this', 'that', 'it', 'as', 'from', 'by', 'with', 'about', 'into', 'through', 'during', 'before', 'after', 'above', 'below', 'up', 'down', 'out', 'off', 'over', 'under', 'again', 'further', 'then', 'once', 'here', 'there', 'when', 'where', 'why', 'how']);

    function extractHashtagsFromText(text) {
      if (!text) return [];
      
      // Remove existing hashtags and special chars
      const words = text
        .toLowerCase()
        .replace(/#\S+/g, '') // Remove existing hashtags
        .split(/[\s\-_.,:;!?()]+/)
        .filter(w => w.length >= 3 && !COMMON_WORDS.has(w))
        .slice(0, 8); // Max 8 suggestions

      return [...new Set(words)]; // Remove duplicates
    }

    function updateHashtagSuggestions() {
      const title = document.getElementById('post-title').value;
      const desc = document.getElementById('post-description').value;
      const combined = (title + ' ' + desc).trim();

      const suggestions = extractHashtagsFromText(combined);
      const categoryVal = document.getElementById('post-category').value.toLowerCase();
      
      // Add category as suggestion
      if (!suggestions.includes(categoryVal)) {
        suggestions.unshift(categoryVal);
      }

      renderHashtagSuggestions(suggestions);

      // Update char counts
      document.getElementById('title-count').textContent = title.length + '/100';
      document.getElementById('desc-count').textContent = desc.length + '/300';
    }

    function renderHashtagSuggestions(suggestions) {
      const container = document.getElementById('suggested-hashtags');
      const selected = window.uploader?.selectedHashtags || new Set();

      let html = suggestions.map(word => {
        const tag = '#' + word;
        const isActive = selected.has(tag);
        return `<button type="button" class="hashtag-btn ${isActive ? 'active' : ''}" onclick="toggleHashtag('${tag}')">${tag}</button>`;
      }).join('');

      container.innerHTML = html;
      updateSelectedHashtagsDisplay();
    }

    function toggleHashtag(tag) {
      if (!window.uploader) return;
      if (window.uploader.selectedHashtags.has(tag)) {
        window.uploader.selectedHashtags.delete(tag);
      } else {
        window.uploader.selectedHashtags.add(tag);
      }
      updateHashtagSuggestions();
    }

    function updateSelectedHashtagsDisplay() {
      const container = document.getElementById('selected-hashtags');
      const selected = window.uploader?.selectedHashtags || new Set();

      if (selected.size === 0) {
        container.innerHTML = '';
        document.getElementById('hashtag-count').textContent = '0';
        return;
      }

      let html = Array.from(selected).map(tag => `
        <div class="hashtag-badge">
          ${tag}
          <button type="button" onclick="toggleHashtag('${tag}')">✕</button>
        </div>
      `).join('');

      container.innerHTML = html;
      document.getElementById('hashtag-count').textContent = selected.size;
    }

    // Update suggestions when category changes
    document.getElementById('post-category').addEventListener('change', updateHashtagSuggestions);
  </script>
</body>
</html>
