<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>New Reel - GorkhaReels</title>
  <meta name="theme-color" content="#121212">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Fix header for non-feed pages */
    header { background: rgba(10,10,10,0.98) !important; position: sticky !important; backdrop-filter: blur(20px) !important; border-bottom: 1px solid rgba(255,255,255,0.06) !important; }

    body { background: #0f0f0f; overflow-x: hidden; }

    /* Upload Header */
    .upload-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(10,10,10,0.98);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }

    .upload-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none; color: #fff;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    #upload-header-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .header-spacer { width: 36px; }

    /* ===== STEP 1: PICK VIDEO ===== */
    #step-pick {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 24px 20px;
    }

    #dropzone {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 9/16;
      max-height: 60vh;
      border: 2px dashed #3f3f3f;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      background: #1a1a1a;
      transition: border-color 0.2s, background 0.2s;
    }

    #dropzone.drag-over {
      border-color: var(--primary-red);
      background: rgba(220,38,38,0.05);
    }

    #dropzone:active { opacity: 0.8; }

    .dropzone-icon { font-size: 56px; }
    .dropzone-text { font-size: 18px; font-weight: 700; color: #fff; }
    .dropzone-sub { font-size: 13px; color: #737373; text-align: center; }

    .select-btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: var(--primary-red);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== STEP 2: DETAILS ===== */
    #step-details {
      display: none;
      flex-direction: column;
      min-height: calc(100vh - 60px);
      padding-bottom: 100px;
    }

    .details-preview {
      position: relative;
      width: 100%;
      background: #000;
      display: flex;
      justify-content: center;
    }

    #video-preview {
      width: 100%;
      max-height: 45vh;
      object-fit: contain;
    }

    .change-video-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .details-form {
      padding: 20px 16px;
      flex: 1;
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #a3a3a3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 13px 14px;
      color: #fff;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary-red);
    }

    .form-textarea { resize: none; }

    .form-select option { background: #1a1a1a; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Post button - fixed at bottom */
    .post-btn-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95) 30%);
      z-index: 50;
    }

    #post-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-red), #f97316);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(220,38,38,0.4);
      transition: opacity 0.2s, transform 0.1s;
    }

    #post-btn:active { transform: scale(0.98); opacity: 0.9; }
    #post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Character counter */
    .char-count {
      font-size: 11px;
      color: #737373;
      text-align: right;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Upload Header -->
  <div class="upload-header">
    <button class="upload-back" onclick="history.length > 1 ? history.back() : window.location.href='./index.html'">‹</button>
    <span id="upload-header-title">New Reel</span>
    <div class="header-spacer"></div>
  </div>

  <!-- STEP 1: Pick Video -->
  <div id="step-pick">
    <div id="dropzone">
      <div class="dropzone-icon">🎬</div>
      <div class="dropzone-text">Select a video</div>
      <div class="dropzone-sub">MP4, WebM, MOV<br>Max 500MB • Max 2 minutes</div>
      <button class="select-btn" onclick="document.getElementById('video-file-input').click()">
        📱 Choose from Phone
      </button>
    </div>
    <input type="file" id="video-file-input" accept="video/*" style="display:none;">
  </div>

  <!-- STEP 2: Details -->
  <div id="step-details">
    <!-- Video Preview -->
    <div class="details-preview">
      <video id="video-preview" playsinline muted loop autoplay></video>
      <button class="change-video-btn" id="change-video-btn">✏️ Change</button>
    </div>

    <!-- Form -->
    <div class="details-form">
      <div class="form-field">
        <label class="form-label">Title *</label>
        <input
          id="post-title"
          type="text"
          class="form-input"
          placeholder="Give your reel a catchy title..."
          maxlength="100"
          oninput="document.getElementById('title-count').textContent = this.value.length + '/100'"
        >
        <div class="char-count" id="title-count">0/100</div>
      </div>

      <div class="form-field">
        <label class="form-label">Description</label>
        <textarea
          id="post-description"
          class="form-textarea"
          rows="3"
          placeholder="What's this reel about? Add hashtags..."
          maxlength="300"
          oninput="document.getElementById('desc-count').textContent = this.value.length + '/300'"
        ></textarea>
        <div class="char-count" id="desc-count">0/300</div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Category</label>
          <select id="post-category" class="form-select">
            <option value="entertainment">Entertainment</option>
            <option value="music">Music</option>
            <option value="dance">Dance</option>
            <option value="comedy">Comedy</option>
            <option value="food">Food</option>
            <option value="travel">Travel</option>
            <option value="sports">Sports</option>
            <option value="education">Education</option>
            <option value="culture">Gorkha Culture</option>
            <option value="news">News</option>
            <option value="other" selected>Other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Language</label>
          <select id="post-language" class="form-select">
            <option value="Nepali" selected>Nepali</option>
            <option value="Hindi">Hindi</option>
            <option value="English">English</option>
            <option value="Gorkhali">Gorkhali</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Post Button (fixed bottom) -->
    <div class="post-btn-container">
      <button id="post-btn" onclick="window.uploader && window.uploader.post()">
        🚀 Post Reel
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/upload.js"></script>
</body>
</html>
