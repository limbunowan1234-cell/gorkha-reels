<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Search Creators</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    .header {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .back-btn {
      background: none;
      border: none;
      color: #a3a3a3;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 6px;
      padding: 6px 10px;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 13px;
    }

    .search-box input::placeholder { color: #666; }

    .clear-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }

    .clear-btn.show { display: block; }

    .results {
      padding: 8px 12px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .creator-item {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      background: #1a1a1a;
      cursor: pointer;
      transition: background 0.2s;
    }

    .creator-item:active { background: #252525; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      flex: 1;
      min-width: 0;
    }

    .name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .username {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }

    .stats {
      font-size: 10px;
      color: #666;
    }

    .follow-btn {
      padding: 6px 12px;
      background: #dc2626;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .follow-btn.following {
      background: #2d2d2d;
      border: 1px solid #3f3f3f;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .empty-icon { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="search-box">
      <span>🔍</span>
      <input id="search" type="text" placeholder="Search creators...">
      <button class="clear-btn" id="clear" onclick="document.getElementById('search').value=''; document.getElementById('clear').classList.remove('show'); loadResults('')">✕</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="empty">
      <div class="empty-icon">🎬</div>
      <p style="font-size: 12px;">Search creators</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    let debounce;
    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.trim();
      document.getElementById('clear').classList.toggle('show', query.length > 0);
      
      clearTimeout(debounce);
      debounce = setTimeout(() => loadResults(query), 300);
    });

    async function loadResults(query) {
      try {
        const results = document.getElementById('results');
        
        if (!query) {
          results.innerHTML = '<div class="empty"><div class="empty-icon">🎬</div><p style="font-size: 12px;">Search creators</p></div>';
          return;
        }

        results.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">Searching...</div>';

        const creators = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.CREATORS,
          [
            Query.or([
              Query.contains('name', query),
              Query.contains('username', query)
            ]),
            Query.orderDesc('followers'),
            Query.limit(50)
          ]
        );

        if (creators.documents.length === 0) {
          results.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p style="font-size: 12px;">No creators found</p></div>';
          return;
        }

        let html = '';
        creators.documents.forEach(creator => {
          const avatar = creator.profilePic || 'https://via.placeholder.com/40';
          const followers = (creator.followers || 0) >= 1000 ? Math.floor(creator.followers / 1000) + 'K' : (creator.followers || 0);
          const videos = creator.totalReels || 0;

          html += `
            <div class="creator-item" onclick="location.href='./creator-profile.html?id=${creator.$id}'">
              <div class="avatar"><img src="${avatar}" onerror="this.src='https://via.placeholder.com/40'"></div>
              <div class="info">
                <div class="name">${creator.name}</div>
                <div class="username">@${creator.username || 'user'}</div>
                <div class="stats">${followers} followers • ${videos} videos</div>
              </div>
              <button class="follow-btn" onclick="event.stopPropagation(); toggleFollow('${creator.$id}', this)">${creator.isFollowing ? 'Following' : 'Follow'}</button>
            </div>
          `;
        });

        results.innerHTML = html;
      } catch (err) {
        console.error(err);
        document.getElementById('results').innerHTML = '<div class="empty"><p style="font-size: 12px; color: #f00;">Error loading results</p></div>';
      }
    }

    async function toggleFollow(creatorId, btn) {
      try {
        btn.disabled = true;
        await session.refresh();
        const userId = session.getUserId();

        const followId = `${userId}_${creatorId}`;
        const isFollowing = btn.textContent === 'Following';

        if (isFollowing) {
          await db.delete(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, followId);
          btn.textContent = 'Follow';
          btn.classList.remove('following');
        } else {
          await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, {
            followId, followerID: userId, followingId: creatorId, CreatorId: creatorId, createdAt: new Date().toISOString()
          }, followId);
          btn.textContent = 'Following';
          btn.classList.add('following');
        }
        btn.disabled = false;
      } catch (err) {
        console.error(err);
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
