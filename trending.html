<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending - GorkhaReels</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    header {
      position: sticky;
      top: 0;
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d2d;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
      padding: 12px;
      margin-bottom: 80px;
    }

    .thumbnail {
      position: relative;
      aspect-ratio: 9/16;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .thumbnail:active {
      transform: scale(0.95);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      opacity: 0.8;
    }

    .trending-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .thumbnail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 12px 8px 8px;
    }

    .thumbnail-title {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thumbnail-stats {
      font-size: 9px;
      color: #ccc;
      margin-top: 2px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 12px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2d2d2d;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }

    .nav-item {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-item.active {
      color: #dc2626;
    }

    .nav-label {
      font-size: 10px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img class="logo" src="assets/logo.png" alt="Logo">
      <div class="header-title">🔥 TRENDING</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="window.location='search-videos.html'">🔍</button>
      <button class="icon-btn" onclick="window.location='creator-dashboard.html'">👤</button>
      <button class="icon-btn" onclick="alert('Menu coming soon')">⋮</button>
    </div>
  </header>

  <div class="grid" id="grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading trending videos...</p>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location='index.html'">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="window.location='upload.html'">
      <span>➕</span>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item active" onclick="window.location='trending.html'">
      <span>🔥</span>
      <span class="nav-label">Trending</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/thumbnail-utils.js"></script>
  <script>
    async function init() {
      try {
        await session.refresh();
        await loadTrending();
      } catch (err) {
        console.error('Init error:', err);
        showError('Error loading trending');
      }
    }

    async function loadTrending() {
      try {
        const reels = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.orderDesc('views'), Query.limit(50)]
        );

        if (!reels.documents.length) {
          document.getElementById('grid').innerHTML = '<div class="loading"><p>No trending videos</p></div>';
          return;
        }

        let html = '';
        
        for (let index = 0; index < reels.documents.length; index++) {
          const reel = reels.documents[index];
          const rank = index + 1;
          const thumbnail = await generateThumbnailFromVideo(reel.videoUrl);
          
          html += `
            <div class="thumbnail" onclick="openVideo('${reel.$id}')">
              <img src="${thumbnail}" alt="Video">
              <div class="trending-badge">#${rank}</div>
              <div class="play-icon">▶️</div>
              <div class="thumbnail-overlay">
                <div class="thumbnail-title">${reel.title}</div>
                <div class="thumbnail-stats">${reel.views || 0} views</div>
              </div>
            </div>
          `;
        }

        document.getElementById('grid').innerHTML = html;
      } catch (err) {
        console.error('Load error:', err);
        showError('Error loading trending');
      }
    }

    function openVideo(reelId) {
      window.location = `video-modal.html?id=${reelId}`;
    }

    function showError(msg) {
      document.getElementById('grid').innerHTML = `<div class="loading"><p>${msg}</p></div>`;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
