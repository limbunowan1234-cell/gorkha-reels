<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending - GorkhaReels</title>
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    header {
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d2d;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      object-fit: cover;
    }

    .header-title {
      font-size: 18px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
    }

    .header-right {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:active {
      background: rgba(255,255,255,0.28);
      transform: scale(0.92);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
      padding: 12px;
      margin-bottom: 80px;
    }

    .thumbnail {
      position: relative;
      aspect-ratio: 9/16;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #2d2d2d;
    }

    .thumbnail:active {
      transform: scale(0.95);
      border-color: #0B5E6B;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      opacity: 0.8;
    }

    .trending-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      padding: 6px 10px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .rank-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #0B5E6B;
    }

    .thumbnail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.4), transparent);
      padding: 16px 8px 8px;
    }

    .thumbnail-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .thumbnail-creator {
      font-size: 10px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .thumbnail-stats {
      font-size: 9px;
      color: #999;
      display: flex;
      gap: 8px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 12px;
      color: #666;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2d2d2d;
      border-top-color: #0B5E6B;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding: 8px 0;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      flex: 1;
      padding: 10px;
      font-size: 18px;
    }

    .nav-btn.active {
      color: #0B5E6B;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img class="logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="Logo">
      <div class="header-title">🔥 Trending</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="window.location='search.html'" title="Search">🔍</button>
      <button class="icon-btn" onclick="window.location='creator-dashboard.html'" title="Profile">👤</button>
    </div>
  </header>

  <div class="grid" id="grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading trending videos...</p>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='upload.html'"><span>＋</span><span class="nav-label">Create</span></button>
    <button class="nav-btn" onclick="window.location='messages.html'"><span>💬</span><span class="nav-label">Messages</span></button>
    <button class="nav-btn" onclick="window.location='creator-dashboard.html'"><span>👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/trending.js"></script>

  <script>
    async function init() {
      try {
        await session.refresh();
        loadTrending();
      } catch (err) {
        console.error('Init error:', err);
        loadTrending();
      }
    }

    async function loadTrending() {
      try {
        // Load all reels and creators
        const [reelsResponse, creatorsResponse] = await Promise.all([
          db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
            Query.equal('isDeleted', false),
            Query.limit(500)
          ]),
          db.list(APPWRITE_CONFIG.COLLECTIONS.CREATORS, [Query.limit(100)])
        ]);

        if (!reelsResponse.documents.length) {
          document.getElementById('grid').innerHTML = '<div class="loading"><p>No trending videos yet</p></div>';
          return;
        }

        // Calculate trending scores
        const trendingReels = TrendingCalculator.getTrendingReels(
          reelsResponse.documents,
          creatorsResponse.documents,
          50
        );

        if (!trendingReels.length) {
          document.getElementById('grid').innerHTML = '<div class="loading"><p>No trending videos yet</p></div>';
          return;
        }

        // Build creator map
        const creatorMap = {};
        creatorsResponse.documents.forEach(c => { creatorMap[c.$id] = c; });

        // Render trending videos
        let html = '';
        trendingReels.forEach((reel, idx) => {
          const creator = creatorMap[reel.creatorId] || {};
          const badge = TrendingCalculator.getBadge(reel.trendingScore);
          const rank = idx + 1;

          html += `
            <div class="thumbnail" onclick="openVideo('${reel.$id}')">
              <img src="${reel.thumbnail || '/logo-suite/primary/logo-khukuri-256x256.png'}" 
                   alt="Video" 
                   onerror="this.src='/logo-suite/primary/logo-khukuri-256x256.png'">
              ${badge ? `<div class="trending-badge">${badge}</div>` : ''}
              <div class="rank-badge">#${rank}</div>
              <div class="play-icon">▶️</div>
              <div class="thumbnail-overlay">
                <div class="thumbnail-title">${escapeHtml(reel.title || 'Untitled')}</div>
                <div class="thumbnail-creator">${escapeHtml(creator.name || 'Creator')}</div>
                <div class="thumbnail-stats">
                  <span>👁️ ${(reel.views || 0).toLocaleString()}</span>
                  <span>❤️ ${(reel.likes || 0).toLocaleString()}</span>
                </div>
              </div>
            </div>
          `;
        });

        document.getElementById('grid').innerHTML = html;
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('grid').innerHTML = '<div class="loading"><p>Error loading trending</p></div>';
      }
    }

    function openVideo(reelId) {
      window.location = `video-modal.html?reelId=${reelId}`;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
