<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GorkhaReels - Short-form video platform for Gorkha creators and community. Watch, create, and share videos from the Gorkha community.">
  <meta name="theme-color" content="#121212">
  <meta name="keywords" content="gorkha, reels, videos, short-form, gorkha community, darjeeling, nepali">
  <meta name="author" content="Darjeeling Web Studio">
  
  <title>GorkhaReels - Gorkha Community Videos</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="shortcut icon" href="assets/logo.png">
  
  <!-- Open Graph -->
  <meta property="og:title" content="GorkhaReels - Gorkha Community Videos">
  <meta property="og:description" content="Discover short-form videos from Gorkha creators and community">
  <meta property="og:image" content="assets/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gorkhareel.com">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="GorkhaReels">
  <meta name="twitter:description" content="Watch Gorkha community videos">
  <meta name="twitter:image" content="assets/logo.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="sitemap" href="sitemap.xml">
  
  <style>
    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
    }

    body {
      overflow-y: scroll;
      overflow-x: hidden;
    }

    #feed-container {
      scroll-snap-align: start;
    }

    /* Video scroll snap */
    .video-card {
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div style="display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer;" onclick="location.href='./index.html'">
      <img src="assets/logo.png" alt="GorkhaReels" style="height: 32px; width: auto;">
      <div class="header-logo">GorkhaReels</div>
    </div>
    <div style="flex:1;"></div>
    <div class="header-actions">
      <button class="header-btn" id="search-btn" title="Search" onclick="window.feedManager && window.feedManager.openSearch()">🔍</button>
      <button class="header-btn" id="notifications-btn" title="Notifications">🔔</button>
      <button class="header-btn" id="menu-btn" title="Menu">⋮</button>
    </div>
  </header>

  <!-- Feed Container -->
  <div id="feed-container" class="feed-container">
    <!-- Videos will be loaded here -->
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-left: 12px;">Loading videos...</p>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-nav="trending">
      <span>🔥</span>
      <span class="nav-label">Trending</span>
    </button>
    <button class="nav-item nav-create" data-nav="create">
      <span class="nav-create-btn">+</span>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item" data-nav="profile">
      <span>👤</span>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- Scripts -->

  <!-- Search Overlay -->
  <div id="search-overlay" style="
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 9999;
    flex-direction: column;
    padding: 0;
  ">
    <!-- Search Header -->
    <div style="
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #2d2d2d;
      background: #0f0f0f;
    ">
      <div style="
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #3f3f3f;
        border-radius: 12px;
        padding: 10px 14px;
      ">
        <span style="font-size:18px;">🔍</span>
        <input
          id="search-input-field"
          type="text"
          placeholder="Search videos, titles..."
          autocomplete="off"
          style="
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 15px;
          "
        >
        <button id="search-clear-btn" onclick="document.getElementById('search-input-field').value=''; window.feedManager && window.feedManager.handleSearchInput('')" style="background:none;border:none;color:#737373;font-size:16px;cursor:pointer;display:none;">✕</button>
      </div>
      <button onclick="window.feedManager && window.feedManager.closeSearch()" style="
        background: none;
        border: none;
        color: #a3a3a3;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        padding: 8px 4px;
        white-space: nowrap;
      ">Cancel</button>
    </div>

    <!-- Search Results -->
    <div id="search-results" style="
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    ">
      <div style="text-align:center;color:#737373;padding:60px 20px;">
        <div style="font-size:40px;margin-bottom:12px;">🎬</div>
        <p>Search for videos by title</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
