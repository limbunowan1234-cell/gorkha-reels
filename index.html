<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GorkhaReels</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; padding-bottom: 70px; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo { height: 36px; width: auto; cursor: pointer; }
    .header-title { font-size: 14px; font-weight: 700; color: #fbbf24; flex: 1; }
    .header-btn { background: none; border: none; color: #a3a3a3; font-size: 18px; cursor: pointer; padding: 4px 8px; }

    /* Feed */
    .feed {
      max-width: 600px;
      margin: 0 auto;
      padding: 8px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
    }

    /* Video Thumbnail */
    .thumbnail {
      position: relative;
      aspect-ratio: 9 / 16;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .thumbnail:active {
      transform: scale(0.95);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Play Icon */
    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: rgba(220, 38, 38, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .thumbnail:hover .play-icon {
      opacity: 1;
    }

    /* Overlay */
    .thumbnail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 12px 8px;
      font-size: 11px;
    }

    .thumbnail-title {
      font-weight: 600;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .thumbnail-creator {
      font-size: 9px;
      color: #999;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #0f0f0f;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-around;
      z-index: 40;
    }

    .nav-item {
      background: none;
      border: none;
      color: #a3a3a3;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
    }

    .nav-create {
      width: 50px;
      height: 50px;
      background: #dc2626;
      border-radius: 50%;
      color: #fff;
      font-size: 24px;
      margin-bottom: 8px;
    }

    /* Menu */
    .menu-dropdown {
      display: none;
      position: fixed;
      top: 50px;
      right: 12px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
      min-width: 160px;
      z-index: 100;
    }

    .menu-item {
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: none;
      color: #fff;
      text-align: left;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid #2d2d2d;
    }

    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #2d2d2d; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #333;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <img src="assets/logo.png" alt="Logo" class="logo" onclick="location.href='./index.html'">
    <div class="header-title">GORKHAREEL</div>
    <button class="header-btn" onclick="location.href='./search-videos.html'">🔍</button>
    <button class="header-btn" onclick="location.href='./creator-dashboard.html'">👤</button>
    <button class="header-btn" onclick="toggleMenu()">⋮</button>
  </header>

  <!-- Menu -->
  <div id="menu" class="menu-dropdown">
    <button class="menu-item" onclick="location.href='./upload.html'">🎬 Upload</button>
    <button class="menu-item" onclick="location.href='./trending.html'">🔥 Trending</button>
    <button class="menu-item" onclick="location.href='./creator-dashboard.html'">👤 Profile</button>
    <button class="menu-item" onclick="logout()">🚪 Logout</button>
  </div>

  <!-- Feed -->
  <div class="feed">
    <div class="grid" id="grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading videos...</p>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='./index.html'">🏠</button>
    <button class="nav-item nav-create" onclick="location.href='./upload.html'">+</button>
    <button class="nav-item" onclick="location.href='./trending.html'">🔥</button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    async function init() {
      try {
        await session.refresh();
        loadVideos();
      } catch (err) {
        console.error('Init error:', err);
      }
    }

    async function loadVideos() {
      try {
        const reels = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.orderDesc('uploadedAt'), Query.limit(100)]
        );

        let html = '';
        reels.documents.forEach(reel => {
          const thumbnail = reel.thumbnail || reel.videoUrl;
          html += `
            <div class="thumbnail" onclick="openVideo('${reel.$id}')">
              <img src="${thumbnail}" onerror="this.src='https://via.placeholder.com/150x267'">
              <div class="play-icon">▶</div>
              <div class="thumbnail-overlay">
                <div class="thumbnail-title">${reel.title}</div>
                <div class="thumbnail-creator">${reel.creatorName}</div>
              </div>
            </div>
          `;
        });

        document.getElementById('grid').innerHTML = html || '<div class="loading"><p>No videos yet</p></div>';
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('grid').innerHTML = '<div class="loading"><p>Error loading videos</p></div>';
      }
    }

    function openVideo(reelId) {
      window.location.href = `./video-modal.html?id=${reelId}`;
    }

    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    async function logout() {
      if (confirm('Logout?')) {
        try {
          await session.logout();
          window.location.href = './login.html';
        } catch (err) {
          alert('Logout failed');
        }
      }
    }

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('menu');
      if (!menu.contains(e.target) && !e.target.matches('.header-btn')) {
        menu.style.display = 'none';
      }
    });

    init();
  </script>
</body>
</html>
