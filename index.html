<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaReels</title>
  
  <!-- ✅ UPDATED FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon/logo-3-minimalist-icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon/logo-3-minimalist-icon-16x16.png">
  <link rel="apple-touch-icon" href="/icons/favicon/logo-3-minimalist-icon-64x64.png">
  
  <!-- ✅ UPDATED SOCIAL PREVIEW -->
  <meta property="og:title" content="GorkhaReels - Gorkha Stories, Global Reach">
  <meta property="og:description" content="Watch short videos from the Gorkha community. Upload, share, and earn money.">
  <meta property="og:image" content="/icons/hero/splash-screen-1200x1200.png">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0B5E6B">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    /* ===== BRAND BANNER (pinned) ===== */
    .banner {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(120deg, #dc2626 0%, #f97316 100%);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    .banner-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .banner-logo {
      width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
      background: rgba(255,255,255,0.15); object-fit: cover;
    }
    .banner-text { min-width: 0; }
    .banner-title {
      font-size: 19px; font-weight: 800; letter-spacing: 0.3px; line-height: 1.1;
      color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }
    .banner-tagline {
      font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.9);
      margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .banner-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .banner-btn {
      width: 38px; height: 38px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.18); color: #fff; font-size: 19px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .banner-btn:active { background: rgba(255,255,255,0.3); }

    .feed { max-width: 100%; margin-bottom: 90px; }

    .post { padding: 16px; border-bottom: 1px solid #2d2d2d; cursor: pointer; transition: background 0.2s; }
    .post:active { background: rgba(255,255,255,0.05); }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .creator-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2d2d2d; overflow: hidden; flex-shrink: 0; }
    .creator-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .creator-name { font-size: 13px; font-weight: 600; flex: 1; }
    .verified-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; background: #0284c7; border-radius: 50%;
      color: #fff; font-size: 9px; margin-left: 3px; vertical-align: middle;
    }

    /* per-post ⋯ */
    .post-more {
      background: none; border: none; color: #666; font-size: 14px;
      cursor: pointer; padding: 2px 4px; line-height: 1; margin-left: auto;
    }
    .post-more:active { color: #999; }

    .post-thumbnail { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #1a1a1a; margin-bottom: 12px; }
    .post-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; opacity: 0.8; }
    .post-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .post-actions { display: flex; gap: 12px; }
    .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: background 0.2s; }
    .action-btn:active { background: rgba(255,255,255,0.2); }
    .action-btn.liked { background: rgba(220,38,38,0.25); }
    .action-icon { font-size: 16px; }

    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 12px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d2d2d; border-top-color: #dc2626; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== BOTTOM BAR: 3 main buttons ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; border-top: 1px solid #2d2d2d;
      display: flex; justify-content: space-around; align-items: center;
      padding: 8px 0; z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: #666; cursor: pointer;
      flex: 1; padding: 10px; font-size: 18px;
    }
    .nav-btn.active { color: #dc2626; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* ===== App drawer (top ⋯) ===== */
    .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
    .drawer-backdrop.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 80%; max-width: 320px;
      background: #161616; z-index: 210; transform: translateX(100%);
      transition: transform 0.25s ease; display: flex; flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      background: linear-gradient(120deg, #dc2626, #f97316);
      padding: 20px 16px; display: flex; align-items: center; gap: 12px;
    }
    .drawer-head img { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); }
    .drawer-head .dh-title { font-size: 16px; font-weight: 800; }
    .drawer-head .dh-sub { font-size: 11px; color: rgba(255,255,255,0.9); }
    .drawer-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .drawer-item {
      width: 100%; display: flex; align-items: center; gap: 14px;
      padding: 15px 18px; background: none; border: none; color: #fff;
      font-size: 15px; cursor: pointer; text-align: left;
    }
    .drawer-item:active { background: #222; }
    .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
    .drawer-sep { height: 1px; background: #262626; margin: 6px 18px; }
    .post-menu-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: none; }
    .post-menu-backdrop.open { display: block; }
    .post-menu {
      position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 310;
      max-width: 476px; margin: 0 auto;
      transform: translateY(140%); transition: transform 0.25s ease;
    }
    .post-menu.open { transform: translateY(0); }
    .post-menu-items { background: #1c1c1e; border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
    .post-menu-item {
      width: 100%; padding: 16px; background: none; border: none; color: #fff;
      font-size: 15px; cursor: pointer; text-align: left; border-bottom: 1px solid #2c2c2e;
    }
    .post-menu-item:last-child { border-bottom: none; }
    .post-menu-item.danger { color: #ff453a; }
    .post-menu-cancel {
      width: 100%; padding: 16px; background: #1c1c1e; border: none; border-radius: 14px;
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ===== BRAND BANNER ===== -->
  <header class="banner">
    <div class="banner-left">
      <!-- ✅ UPDATED LOGO PATH -->
      <img class="banner-logo" src="/icons/primary/logo-1-app-icon-180x180.png" alt="GorkhaReels">
      <div class="banner-text">
        <div class="banner-title">GorkhaReels</div>
        <div class="banner-tagline">Reels for real Gorkhas</div>
      </div>
    </div>
    <div class="banner-right">
      <button class="banner-btn" onclick="window.location='search.html'" aria-label="Search">🔍</button>
      <button class="banner-btn" id="open-drawer" aria-label="Menu">☰</button>
    </div>
  </header>

  <div class="feed" id="feed">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading videos...</p>
    </div>
  </div>

  <!-- ===== BOTTOM: 3-button nav ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="window.location='index.html'">
      <span>🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="window.location='upload.html'">
      <span>＋</span><span class="nav-label">Create</span>
    </button>
    <button class="nav-btn" onclick="window.location='creator-dashboard.html'">
      <span>👤</span><span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- ===== Per-post menu ===== -->
  <div class="post-menu-backdrop" id="post-menu-backdrop"></div>
  <div class="post-menu" id="post-menu">
    <div class="post-menu-items" id="post-menu-items"></div>
    <button class="post-menu-cancel" id="post-menu-cancel">Cancel</button>
  </div>

  <!-- ===== App drawer ===== -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <!-- ✅ UPDATED LOGO PATH -->
      <img src="/icons/primary/logo-1-app-icon-180x180.png" alt="GorkhaReels">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Reels for real Gorkhas</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html#edit'"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    let MY_USER_ID = null;
    let LIKED = new Set();

    async function init() {
      try {
        await session.refresh();
        if (session.isLoggedIn()) {
          MY_USER_ID = session.getUserId();
          try {
            const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [Query.equal('userId', MY_USER_ID), Query.limit(100)]);
            likes.documents.forEach(l => LIKED.add(l.reelId));
          } catch (e) {}
        }
        setupDrawer();
        loadVideos();
      } catch (err) {
        console.error('Init error:', err);
        setupDrawer();
        loadVideos();
      }
    }

    function setupDrawer() {
      const open = () => { document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-backdrop').classList.add('open'); };
      const close = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-backdrop').classList.remove('open'); };
      document.getElementById('open-drawer').onclick = open;
      document.getElementById('drawer-backdrop').onclick = close;
      // Close drawer when clicking items
      document.querySelectorAll('.drawer-item').forEach(btn => {
        btn.addEventListener('click', close);
      });
      document.getElementById('drawer-logout').onclick = async () => {
        try { await session.logout(); } catch (e) {}
        window.location = 'login.html';
      };
      
      // Post menu handlers
      document.getElementById('post-menu-cancel').onclick = closePostMenu;
      document.getElementById('post-menu-backdrop').onclick = closePostMenu;
    }

    async function loadVideos() {
      try {
        const reels = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.equal('isDeleted', false), Query.orderDesc('uploadedAt'), Query.limit(50)]
        );

        if (!reels.documents.length) {
          document.getElementById('feed').innerHTML = '<div class="loading"><p>No videos yet</p></div>';
          return;
        }

        // Batch-fetch verified status for unique creators (avoids one query per post)
        const VERIFIED = new Set();
        const uniqueCreatorIds = [...new Set(reels.documents.map(r => r.creatorId))];
        try {
          const creatorDocs = await Promise.all(
            uniqueCreatorIds.map(id => db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, id).catch(() => null))
          );
          creatorDocs.forEach(c => { if (c && c.isVerified) VERIFIED.add(c.$id); });
        } catch (e) {}

        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        reels.documents.forEach(reel => {
          const liked = LIKED.has(reel.$id);
          const isOwner = MY_USER_ID && MY_USER_ID === reel.creatorId;
          const isVerified = VERIFIED.has(reel.creatorId);
          const post = document.createElement('div');
          post.className = 'post';
          post.innerHTML = `
            <div class="post-header">
              <div class="creator-avatar">
                <img src="${reel.creatorProfilePic || 'assets/placeholder.svg'}" onerror="this.src='assets/placeholder.svg'">
              </div>
              <div class="creator-name">${escapeHtml(reel.creatorName || 'Creator')}${isVerified ? ' <span class="verified-badge">✓</span>' : ''}</div>
              <button class="post-more">⋯</button>
            </div>
            <div class="post-thumbnail">
              <img src="${reel.thumbnail || 'assets/placeholder.svg'}" alt="Video" onerror="this.src='assets/placeholder.svg'">
              <div class="play-icon">▶️</div>
            </div>
            <div class="post-title">${escapeHtml(reel.title || '')}</div>
            <div class="post-actions">
              <button class="action-btn like-btn ${liked ? 'liked' : ''}">
                <span class="action-icon">${liked ? '❤️' : '🤍'}</span>
                <span class="like-count">${reel.likes || 0}</span>
              </button>
              <button class="action-btn comment-btn">
                <span class="action-icon">💬</span>
                <span>${reel.comments || 0}</span>
              </button>
              <button class="action-btn share-btn">
                <span class="action-icon">↗️</span>
                <span>Share</span>
              </button>
            </div>
          `;
          // open reel
          post.onclick = () => window.location = `video-modal.html?reelId=${reel.$id}`;
          // stop propagation on action buttons
          post.querySelector('.like-btn').onclick = (e) => { e.stopPropagation(); toggleLike(reel, post); };
          post.querySelector('.comment-btn').onclick = (e) => { e.stopPropagation(); window.location = `video-modal.html?reelId=${reel.$id}`; };
          post.querySelector('.share-btn').onclick = (e) => { e.stopPropagation(); shareReel(reel); };
          post.querySelector('.post-more').onclick = (e) => { e.stopPropagation(); openPostMenu(reel, post, isOwner); };
          feed.appendChild(post);
        });
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('feed').innerHTML = '<div class="loading"><p>Error loading videos</p></div>';
      }
    }

    async function toggleLike(reel, post) {
      if (!MY_USER_ID) { window.location = 'login.html'; return; }
      const btn = post.querySelector('.like-btn');
      const icon = btn.querySelector('.action-icon');
      const countEl = btn.querySelector('.like-count');
      try {
        if (LIKED.has(reel.$id)) {
          const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [Query.equal('reelId', reel.$id), Query.equal('userId', MY_USER_ID)]);
          if (likes.documents.length) await db.remove(APPWRITE_CONFIG.COLLECTIONS.LIKES, likes.documents[0].$id);
          LIKED.delete(reel.$id);
          reel.likes = Math.max(0, (reel.likes || 1) - 1);
          btn.classList.remove('liked'); icon.textContent = '🤍';
        } else {
          const likeId = ID.unique();
          await db.create(APPWRITE_CONFIG.COLLECTIONS.LIKES, {
            likeId, reelId: reel.$id, creatorId: reel.creatorId, userId: MY_USER_ID, createdAt: new Date().toISOString()
          }, likeId);
          LIKED.add(reel.$id);
          reel.likes = (reel.likes || 0) + 1;
          btn.classList.add('liked'); icon.textContent = '❤️';
        }
        await db.update(APPWRITE_CONFIG.COLLECTIONS.REELS, reel.$id, { likes: reel.likes });
        countEl.textContent = reel.likes;
      } catch (err) {
        console.error('Like failed:', err);
      }
    }

    async function shareReel(reel) {
      const url = `${location.origin}/video-modal.html?reelId=${reel.$id}`;
      try {
        if (navigator.share) { await navigator.share({ title: reel.title, url }); }
        else { await navigator.clipboard.writeText(url); alert('Link copied!'); }
      } catch (e) {}
    }

    /* per-post ⋯ — owner vs viewer */
    function openPostMenu(reel, post, isOwner) {
      const items = document.getElementById('post-menu-items');
      items.innerHTML = '';

      const add = (label, handler, danger) => {
        const b = document.createElement('button');
        b.className = 'post-menu-item' + (danger ? ' danger' : '');
        b.textContent = label;
        b.onclick = () => { closePostMenu(); handler(); };
        items.appendChild(b);
      };

      if (isOwner) {
        add('✏️ Edit', () => window.location = `video-modal.html?reelId=${reel.$id}`);
        add('🗑️ Delete', () => deletePost(reel, post), true);
      } else {
        add('↗️ Share', () => shareReel(reel));
        add('🔗 Copy link', async () => {
          try { await navigator.clipboard.writeText(`${location.origin}/video-modal.html?reelId=${reel.$id}`); }
          catch (e) {}
        });
      }

      document.getElementById('post-menu-backdrop').classList.add('open');
      document.getElementById('post-menu').classList.add('open');
    }

    function closePostMenu() {
      document.getElementById('post-menu-backdrop').classList.remove('open');
      document.getElementById('post-menu').classList.remove('open');
    }

    async function deletePost(reel, post) {
      if (!confirm('Delete this reel? This cannot be undone easily.')) return;
      try {
        await db.update(APPWRITE_CONFIG.COLLECTIONS.REELS, reel.$id, { isDeleted: true });
        post.remove();
      } catch (e) { alert('Could not delete'); }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
