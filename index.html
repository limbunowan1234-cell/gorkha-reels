<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GorkhaReels</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; touch-action: pan-y; }
    
    /* Header */
    header {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo { height: 28px; width: auto; }
    .header-title { font-size: 16px; font-weight: 700; color: #fbbf24; flex: 1; }
    .header-btn { background: none; border: none; color: #a3a3a3; font-size: 20px; cursor: pointer; padding: 4px; }

    /* Feed */
    #feed-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 80px);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior: none;
    }

    .video-card {
      position: relative;
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Overlay Info */
    .video-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 20px 12px 80px;
      color: #fff;
    }

    .creator-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .creator-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      overflow: hidden;
    }

    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .creator-name {
      font-size: 13px;
      font-weight: 600;
    }

    .video-title {
      font-size: 13px;
      color: #e5e5e5;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    /* Action Buttons */
    .video-actions {
      position: absolute;
      right: 12px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .action-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .action-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .action-count {
      font-size: 11px;
      text-align: center;
      margin-top: 2px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #0f0f0f;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 40;
    }

    .nav-item {
      background: none;
      border: none;
      color: #a3a3a3;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-create {
      width: 48px;
      height: 48px;
      background: #dc2626;
      border-radius: 50%;
      font-size: 28px;
      color: #fff;
      margin-bottom: 8px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 10px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #333;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .menu-dropdown {
      display: none;
      position: fixed;
      top: 50px;
      right: 12px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
      min-width: 180px;
      z-index: 100;
    }

    .menu-item {
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: none;
      color: #fff;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #2d2d2d;
    }

    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #2d2d2d; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <img src="assets/logo.png" alt="Logo" class="logo">
    <div class="header-title">GORKHAREEL</div>
    <button class="header-btn" onclick="location.href='./search-creators.html'">🔍</button>
    <button class="header-btn" onclick="location.href='./creator-dashboard.html'">👤</button>
    <button class="header-btn" onclick="toggleMenu()">⋮</button>
  </header>

  <!-- Menu -->
  <div id="menu" class="menu-dropdown">
    <button class="menu-item" onclick="location.href='./upload.html'">Upload</button>
    <button class="menu-item" onclick="location.href='./creator-dashboard.html'">Profile</button>
    <button class="menu-item" onclick="location.href='./search-creators.html'">Search</button>
    <button class="menu-item" onclick="logout()">Logout</button>
  </div>

  <!-- Feed -->
  <div id="feed-container" class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='./index.html'">🏠</button>
    <button class="nav-item nav-create" onclick="location.href='./upload.html'">+</button>
    <button class="nav-item" onclick="alert('Coming soon')">🔥</button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/feed.js"></script>
  
  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    async function logout() {
      if (confirm('Logout?')) {
        try {
          await session.logout();
          window.location.href = './login.html';
        } catch (err) {
          alert('Logout failed');
        }
      }
    }

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('menu');
      if (!menu.contains(e.target) && e.target.textContent !== '⋮') {
        menu.style.display = 'none';
      }
    });
  </script>
</body>
</html>
