<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GorkhaReels - Live Darjeeling</title>
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; overflow-x: hidden; }

    @keyframes storyGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(11, 94, 107, 0.6), inset 0 0 12px rgba(11, 94, 107, 0.3); }
      50% { box-shadow: 0 0 18px rgba(11, 94, 107, 0.8), inset 0 0 16px rgba(11, 94, 107, 0.4); }
    }

    .banner { position: sticky; top: 0; z-index: 100; background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 14px rgba(0,0,0,0.4); }
    .banner-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .banner-logo { width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0; background: rgba(255,255,255,0.15); object-fit: cover; }
    .banner-text { min-width: 0; }
    .banner-title { font-size: 22px; font-weight: 900; letter-spacing: 0.6px; line-height: 1.1; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.3); font-family: 'Space Grotesk', sans-serif; }
    .banner-tagline { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.9); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .banner-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .banner-btn { width: 38px; height: 38px; border: none; border-radius: 50%; background: rgba(255,255,255,0.18); color: #fff; font-size: 19px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .banner-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.92); }

    /* ====== GEO CONTEXT TABS (NEW) ====== */
    .geo-context-tabs {
      position: sticky;
      top: 56px;
      z-index: 99;
      background: linear-gradient(180deg, rgba(15,15,15,0.98) 0%, rgba(15,15,15,0.95) 100%);
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .geo-context-tabs::-webkit-scrollbar { height: 3px; }
    .geo-context-tabs::-webkit-scrollbar-thumb { background: #0B5E6B; border-radius: 2px; }
    .geo-tab {
      flex: 0 0 auto;
      padding: 8px 14px;
      border: 1px solid rgba(11, 94, 107, 0.3);
      border-radius: 20px;
      background: transparent;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s ease;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .geo-tab:hover {
      border-color: #0B5E6B;
      background: rgba(11, 94, 107, 0.1);
    }
    .geo-tab.active {
      background: linear-gradient(135deg, #0B5E6B, #0D7377);
      border-color: #0D7377;
      color: #fff;
      box-shadow: 0 4px 12px rgba(11, 94, 107, 0.3);
    }

    /* ====== LIVE DARJEELING STRIP (NEW) ====== */
    .live-darjeeling-strip {
      background: #0f0f0f;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
      z-index: 98;
    }
    .live-strip-title {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-strip-container {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding-bottom: 4px;
    }
    .live-strip-container::-webkit-scrollbar { height: 4px; }
    .live-strip-container::-webkit-scrollbar-thumb { background: #0B5E6B; border-radius: 2px; }
    .live-strip-item {
      flex: 0 0 100px;
      aspect-ratio: 9/16;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .live-strip-item:hover {
      border-color: #0B5E6B;
      transform: translateY(-4px);
    }
    .live-strip-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .live-strip-item-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      text-align: center;
    }

    .story-carousel-section { padding: 16px; border-bottom: 1px solid #1a1a1a; background: #0f0f0f; z-index: 97; }
    .story-carousel-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .story-carousel-scroll::-webkit-scrollbar { display: none; }
    .story-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; }
    .story-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2.5px solid #333; transition: all 0.3s; }
    .story-avatar.has-unseen { border: 2.5px solid #0B5E6B; box-shadow: 0 0 12px rgba(11, 94, 107, 0.6), inset 0 0 12px rgba(11, 94, 107, 0.3); animation: storyGlow 2s ease-in-out infinite; }
    .story-name { font-size: 12px; max-width: 70px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
    .story-your-story { text-align: center; font-weight: 600; color: #0B5E6B; }

    .category-tabs-section { padding: 12px 16px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; z-index: 96; }
    .category-tabs-scroll { display: flex; gap: 8px; overflow-x: auto; scroll-behavior: smooth; padding: 4px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .category-tabs-scroll::-webkit-scrollbar { display: none; }
    .category-tab { flex: 0 0 auto; padding: 8px 16px; background: #1a1a1a; border: 1px solid #2d2d2d; color: #888; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .category-tab.active { background: #0B5E6B; border-color: #0B5E6B; color: #fff; }
    .category-tab:active { transform: scale(0.95); }

    .suggested-banner { padding: 16px; border-bottom: 1px solid #1a1a1a; background: #0f0f0f; display: block; z-index: 95; }
    .suggested-banner.hidden { display: none !important; }
    .suggested-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .suggested-title { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .suggested-close { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .suggested-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .suggested-scroll::-webkit-scrollbar { display: none; }
    .creator-card { flex: 0 0 auto; width: 130px; background: #1a1a1a; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid #2d2d2d; }
    .creator-card:active { transform: scale(0.96); border-color: #0B5E6B; }
    .creator-pic { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; border: 2px solid #0B5E6B; background: #2d2d2d; }
    .creator-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .creator-followers { font-size: 11px; color: #888; margin-bottom: 8px; }
    .follow-btn { width: 100%; padding: 8px; background: #0B5E6B; border: 1px solid #0B5E6B; border-radius: 8px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .follow-btn:active { background: rgba(11, 94, 107, 0.8); }
    .follow-btn.following { background: transparent; color: #0B5E6B; }

    .feed { padding-bottom: 100px; }
    .feed-item { border-bottom: 1px solid #1a1a1a; background: #0f0f0f; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .feed-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; gap: 12px; }
    .feed-creator-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .feed-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #0B5E6B; cursor: pointer; flex-shrink: 0; background: #2d2d2d; }
    .feed-creator-meta { min-width: 0; }
    .feed-creator-name { font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-time { font-size: 11px; color: #888; }
    .feed-menu { background: none; border: none; color: #666; font-size: 18px; cursor: pointer; padding: 4px; }
    .feed-video { position: relative; background: #000; aspect-ratio: 9/16; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .feed-video img, .feed-video video { width: 100%; height: 100%; object-fit: contain; }
    .feed-text-content { padding: 12px 16px; font-size: 15px; line-height: 1.5; color: #fff; word-break: break-word; }
    .feed-hashtags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .feed-hashtags a { color: #0B5E6B; text-decoration: none; font-weight: 600; font-size: 13px; }
    .feed-hashtags a:active { opacity: 0.7; }
    .feed-actions { display: flex; justify-content: space-around; padding: 12px 16px; border-top: 1px solid #1a1a1a; }
    .action-btn { background: none; border: none; color: #888; font-size: 18px; cursor: pointer; padding: 6px 12px; transition: color 0.2s; }
    .action-btn:hover { color: #0B5E6B; }
    .action-btn.liked { color: #ef4444; }
    .feed-stats { padding: 8px 16px; font-size: 13px; color: #888; }
    .loading { text-align: center; padding: 20px; color: #666; }

    /* ====== ZONE PILL (NEW) ====== */
    .zone-pill { display: inline-flex; align-items: center; gap: 4px; background: rgba(11,94,107,0.18); border: 1px solid rgba(11,94,107,0.4); color: #4db8c4; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin-left: 6px; vertical-align: middle; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #2d2d2d; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding: 8px 0; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #666; cursor: pointer; flex: 1; padding: 10px; font-size: 18px; }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }

    .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .drawer-backdrop.open { display: block; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 80%; max-width: 320px; background: #161616; z-index: 160; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.5); }
    .drawer.open { transform: translateX(0); }
    .drawer-head { background: linear-gradient(135deg, #0B5E6B, #0D7377); padding: 20px 16px; display: flex; align-items: center; gap: 12px; }
    .drawer-head img { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); }
    .drawer-head .dh-title { font-size: 16px; font-weight: 900; }
    .drawer-head .dh-sub { font-size: 11px; color: rgba(255,255,255,0.9); }
    .drawer-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .drawer-item { width: 100%; display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: none; border: none; color: #fff; font-size: 15px; cursor: pointer; text-align: left; }
    .drawer-item:active { background: #222; }
    .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
    .drawer-sep { height: 1px; background: #262626; margin: 6px 18px; }
    .drawer-item-danger { color: #ef4444; }

    /* Location badge for reels */
    .location-badge {
      position: absolute;
      bottom: 60px;
      right: 12px;
      background: rgba(11, 94, 107, 0.8);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .darjeeling-badge {
      position: absolute;
      bottom: 75px;
      right: 12px;
      background: #d4af37;
      color: #0f0f0f;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <header class="banner">
    <div class="banner-left">
      <img class="banner-logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="GorkhaReels">
      <div class="banner-text">
        <div class="banner-title">GorkhaReels</div>
        <div class="banner-tagline">🏔️ Live Darjeeling</div>
      </div>
    </div>
    <div class="banner-right">
      <button class="banner-btn" onclick="window.location='search.html'" aria-label="Search">🔍</button>

    <button class="geo-tab" data-context="SCENIC" onclick="switchGeoContext('SCENIC', event)">🏔️ Scenic</button>
    <button class="geo-tab" data-context="TRENDING" onclick="switchGeoContext('TRENDING', event)">🔥 Trending</button>
  </div>

  <!-- NEW: LIVE DARJEELING STRIP -->
  <div class="live-darjeeling-strip" id="live-darjeeling-strip">
    <div class="live-strip-title">📍 Live in Darjeeling</div>
    <div class="live-strip-container" id="live-strip-container">
      <div class="loading" style="padding: 12px;">Loading...</div>
    </div>
  </div>

  <div class="story-carousel-section" id="story-carousel-section">
    <div class="story-carousel-scroll" id="story-carousel-scroll">
      <a href="upload.html" class="story-item">
        <div class="story-avatar" style="background: linear-gradient(135deg, #0B5E6B, #0D7377); display: flex; align-items: center; justify-content: center; border: 2.5px solid #0B5E6B;">
          <span style="font-size: 28px;">➕</span>
        </div>
        <div class="story-name story-your-story">Your Story</div>
      </a>
    </div>
  </div>

  <div class="category-tabs-section" id="category-tabs-section">
    <div class="category-tabs-scroll">
      <button class="category-tab active" onclick="filterByCategory('all', event)">All + Common</button>
      <button class="category-tab" onclick="filterByCategory('trending', event)">🔥 Trending</button>
      <button class="category-tab" onclick="filterByCategory('musician', event)">🎵 Musicians</button>
      <button class="category-tab" onclick="filterByCategory('artist', event)">🎨 Artists</button>
      <button class="category-tab" onclick="filterByCategory('guide', event)">🧗 Guides</button>
      <button class="category-tab" onclick="filterByCategory('business', event)">🏪 Business</button>
      <button class="category-tab" onclick="filterByCategory('student', event)">📚 Students</button>
    </div>
  </div>

  <div class="suggested-banner" id="suggested-banner">
    <div class="suggested-header">
      <div class="suggested-title">✨ Creators You May Like</div>
      <button class="suggested-close" onclick="document.getElementById('suggested-banner').classList.add('hidden')">✕</button>
    </div>
    <div class="suggested-scroll" id="suggested-scroll">
      <div class="loading">Loading creators...</div>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="loading">Loading...</div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='upload.html'"><span>＋</span><span class="nav-label">Create</span></button>
    <button class="nav-btn" onclick="window.location='messages.html'"><span>💬</span><span class="nav-label">Messages</span></button>
    <button class="nav-btn" onclick="window.location='creator-dashboard.html'"><span>👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <img src="/logo-suite/primary/logo-khukuri-256x256.png" alt="">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Live Darjeeling</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-leaderboard.html'"><span class="di-icon">🏆</span> Leaderboard</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html#edit'"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/last-seen-tracker.js"></script>
  <script src="js/trending.js"></script>
  <script src="js/geo-feed-engine.js"></script>
  <script src="js/geo-context.js"></script>
  <script src="js/interstitial-manager.js"></script>

  <script>
    let MY_USER_ID = null, lastOffset = 0, isLoadingMore = false, currentFilter = 'all', currentGeoContext = 'FOR_YOU';
    let geoFeedEngine = null, geoContextManager = null, interstitialManager = null;

    function setupDrawer() {
      const openBtn = document.getElementById('open-drawer');
      const backdrop = document.getElementById('drawer-backdrop');
      const drawer = document.getElementById('drawer');
      const items = drawer.querySelectorAll('.drawer-item');

      openBtn.onclick = () => { drawer.classList.add('open'); backdrop.classList.add('open'); };
      backdrop.onclick = () => { drawer.classList.remove('open'); backdrop.classList.remove('open'); };
      items.forEach(item => { item.addEventListener('click', () => { drawer.classList.remove('open'); backdrop.classList.remove('open'); }); });
      document.getElementById('drawer-logout').onclick = async () => { try { await session.logout(); } catch (e) {} window.location = 'login.html'; };
    }

    /**
     * NEW: Switch geo context (For You, Near You, Scenic, Trending)
     */
    async function switchGeoContext(context, evt) {
      currentGeoContext = context;
      
      // Update UI
      document.querySelectorAll('.geo-tab').forEach(tab => tab.classList.remove('active'));
      if (evt && evt.target) evt.target.classList.add('active');
      
      // Reset feed and reload
      lastOffset = 0;
      isLoadingMore = false;
      
      // Switch engine context
      if (geoFeedEngine) geoFeedEngine.setContext(context);
      
      // Reload with new context
      await loadVideos();
    }

    /**
     * NEW: Load live strip with recent Darjeeling content
     * Shows the real zone tagged on each reel.
     */
    async function loadLiveStrip() {
      try {
        const container = document.getElementById('live-strip-container');
        const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
          Query.equal('isDeleted', false),
          Query.orderDesc('uploadedAt'),
          Query.limit(10)
        ]);
        
        const items = response.documents || [];
        if (items.length === 0) {
          container.innerHTML = '<div class="loading">No live content yet</div>';
          return;
        }
        
        container.innerHTML = items.slice(0, 6).map((reel) => `
          <div class="live-strip-item" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'">
            <video src="${reel.videoUrl}" muted playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
            <div class="live-strip-item-label">📍 ${escapeHtml(reel.zone || 'Darjeeling')}</div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Live strip error:', err);
        document.getElementById('live-strip-container').innerHTML = '<div class="loading">Error</div>';
      }
    }

    async function checkFollowStatus(creatorId, btn) {
      if (!MY_USER_ID) return;
      try {
        const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [ 
          Query.equal('followerId', MY_USER_ID), 
          Query.equal('followingId', creatorId), 
          Query.limit(1) 
        ]);
        
        if (existing.total > 0) {
          btn.textContent = 'Following';
          btn.classList.add('following');
          btn.disabled = true;
        } else {
          btn.textContent = 'Follow';
          btn.classList.remove('following');
          btn.disabled = false;
        }
      } catch (err) {
        console.error('Check follow status error:', err);
      }
    }

    async function loadSuggestedCreators() {
      try {
        const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.CREATORS, [ Query.orderDesc('followers'), Query.limit(20) ]);
        let creators = response.documents || [];
        if (MY_USER_ID) creators = creators.filter(c => c.$id !== MY_USER_ID);
        creators = creators.slice(0, 6);
        if (creators.length === 0) { document.getElementById('suggested-banner').classList.add('hidden'); return; }
        const scroll = document.getElementById('suggested-scroll');
        const html = creators.map(creator => `<div class="creator-card" onclick="window.location.href='creator-profile.html?creatorId=${creator.$id}'"><img class="creator-pic" src="${creator.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png'}" alt="${creator.name}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'"><div class="creator-name">${escapeHtml(creator.name || 'User')}</div><div class="creator-followers">${creator.followers || 0} followers</div><button class="follow-btn" id="follow-btn-${creator.$id}" onclick="event.stopPropagation(); followCreator('${creator.$id}', this)">Follow</button></div>`).join('');
        scroll.innerHTML = html;
        
        for (const creator of creators) {
          const btn = scroll.querySelector(`#follow-btn-${creator.$id}`);
          if (btn) await checkFollowStatus(creator.$id, btn);
        }
        
        document.getElementById('suggested-banner').classList.remove('hidden');
      } catch (err) { document.getElementById('suggested-scroll').innerHTML = '<div class="loading" style="padding: 20px;">Unable to load</div>'; }
    }

    async function followCreator(creatorId, btn) {
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      try {
        const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [ 
          Query.equal('followerId', MY_USER_ID), 
          Query.equal('followingId', creatorId), 
          Query.limit(1) 
        ]);
        
        if (existing.total === 0) { 
          await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, ID.unique(), { 
            followId: ID.unique(), 
            followerId: MY_USER_ID, 
            followingId: creatorId, 
            CreatorId: creatorId, 
            createdAt: new Date().toISOString() 
          }); 
        }
        
        btn.textContent = 'Following'; 
        btn.classList.add('following');
        btn.disabled = true;
      } catch (err) { 
        console.error('Follow error:', err); 
      }
    }

    async function loadTrendingFeed() {
      try {
        const trendingContainer = document.getElementById('feed');
        if (!trendingContainer) return;

        trendingContainer.innerHTML = '<div class="loading">Loading trending...</div>';

        const [reelsRes, creatorsRes] = await Promise.all([
          db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
            Query.equal('isDeleted', false),
            Query.limit(500)
          ]),
          db.list(APPWRITE_CONFIG.COLLECTIONS.CREATORS, [Query.limit(100)])
        ]);

        const trendingReels = TrendingCalculator.getTrendingReels(
          reelsRes.documents,
          creatorsRes.documents,
          30
        );

        const creatorMap = {};
        creatorsRes.documents.forEach(c => { creatorMap[c.$id] = c; });

        trendingContainer.innerHTML = '';
        
        for (const reel of trendingReels) {
          const creator = creatorMap[reel.creatorId] || {};
          const badge = TrendingCalculator.getBadge(reel.trendingScore);
          const liked = MY_USER_ID ? await isVideoLiked(reel.$id) : false;
          
          const reelItem = document.createElement('div');
          reelItem.className = 'feed-item';
          reelItem.innerHTML = `
            <div class="feed-header">
              <div class="feed-creator-info">
                <img class="feed-avatar" src="${creator.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png'}" 
                     onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'" 
                     onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
                <div class="feed-creator-meta">
                  <div class="feed-creator-name" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
                    ${escapeHtml(creator.name || 'User')}${creator.isVerified ? ' ✓' : ''}
                    ${badge ? ` <span style="color: #ff6b35; margin-left: 4px;">${badge}</span>` : ''}
                  </div>
                  <div class="feed-time">${creator.category ? '📌 ' + creator.category : 'Common Zone'} • ${getTimeAgo(new Date(reel.uploadedAt))}${reel.zone ? `<span class="zone-pill">📍 ${escapeHtml(reel.zone)}</span>` : ''}</div>
                </div>
              </div>
              <button class="feed-menu" onclick="showMoreOptions('${reel.$id}')">⋮</button>
            </div>
            <div class="feed-video" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'">
              <video src="${reel.videoUrl}" muted playsinline></video>
            </div>
            <div class="feed-actions">
              <button class="action-btn ${liked ? 'liked' : ''}" id="like-${reel.$id}" onclick="toggleLike('${reel.$id}', this, 'reel')">
                ${liked ? '❤️' : '🤍'}
              </button>
              <button class="action-btn" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}#comments'">💬</button>
              <button class="action-btn" onclick="shareContent('${reel.$id}', 'reel')">📤</button>
            </div>
            <div class="feed-stats">
              <span id="likes-${reel.$id}">${reel.likes || 0} likes</span> • 
              <span id="views-${reel.$id}">${reel.views || 0} views</span>
            </div>
          `;
          trendingContainer.appendChild(reelItem);
        }

        if (!trendingReels.length) {
          trendingContainer.innerHTML = '<div class="loading">No trending videos yet. Check back soon!</div>';
        }

      } catch (e) {
        console.error('Trending load error:', e);
        document.getElementById('feed').innerHTML = '<div class="loading">Error loading trending</div>';
      }
    }

    async function loadVideos() {
      try {
        const [reelsResponse, postsResponse] = await Promise.all([ db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [ Query.equal('isDeleted', false), Query.orderDesc('uploadedAt'), Query.limit(20) ]), db.list('posts', [ Query.equal('isDeleted', false), Query.orderDesc('createdAt'), Query.limit(20) ]) ]);
        let allContent = [];
        const creatorMap = {};
        
        for (const reel of reelsResponse.documents) {
          let creator = null;
          try { 
            creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, reel.creatorId);
            creatorMap[creator.$id] = creator;
          } catch (err) { 
            continue;
          }
          
          if (currentFilter !== 'all') {
            if (!creator.category || creator.category !== currentFilter) {
              continue;
            }
          }
          
          allContent.push({ type: 'reel', data: reel, creator: creator, timestamp: new Date(reel.uploadedAt) });
        }
        
        for (const post of postsResponse.documents) {
          let creator = null;
          try { 
            creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, post.creatorId);
            creatorMap[creator.$id] = creator;
          } catch (err) { 
            continue;
          }
          
          if (currentFilter !== 'all') {
            if (!creator.category || creator.category !== currentFilter) {
              continue;
            }
          }
          
          allContent.push({ type: 'post', data: post, creator: creator, timestamp: new Date(post.createdAt) });
        }
        
        // NEW: Apply geo ranking if not "all" filter
        if (geoFeedEngine && currentGeoContext !== 'FOR_YOU') {
          allContent = geoFeedEngine.rankContent(allContent, creatorMap);
        } else {
          allContent.sort((a, b) => b.timestamp - a.timestamp);
        }
        
        const paginatedContent = allContent.slice(lastOffset, lastOffset + 10);
        if (paginatedContent.length === 0 && lastOffset === 0) { 
          document.getElementById('feed').innerHTML = '<div class="loading">No content yet. Follow creators to see their reels and posts!</div>'; 
          return; 
        }
        
        const feed = document.getElementById('feed');
        if (lastOffset === 0) feed.innerHTML = '';
        
        for (const item of paginatedContent) {
          if (item.type === 'reel') {
            const reel = item.data, creator = item.creator;
            const liked = MY_USER_ID ? await isVideoLiked(reel.$id) : false;
            const reelItem = document.createElement('div');
            reelItem.className = 'feed-item';
            reelItem.innerHTML = `<div class="feed-header"><div class="feed-creator-info"><img class="feed-avatar" src="${creator.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png'}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'"><div class="feed-creator-meta"><div class="feed-creator-name" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">${escapeHtml(creator.name || 'User')}${creator.isVerified ? ' ✓' : ''}</div><div class="feed-time">${creator.category ? '📌 ' + creator.category : 'Common Zone'} • ${getTimeAgo(new Date(reel.uploadedAt))}${reel.zone ? `<span class="zone-pill">📍 ${escapeHtml(reel.zone)}</span>` : ''}</div></div></div><button class="feed-menu" onclick="showMoreOptions('${reel.$id}')">⋮</button></div><div class="feed-video" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'"><video src="${reel.videoUrl}" muted playsinline></video></div><div class="feed-actions"><button class="action-btn ${liked ? 'liked' : ''}" id="like-${reel.$id}" onclick="toggleLike('${reel.$id}', this, 'reel')">${liked ? '❤️' : '🤍'}</button><button class="action-btn" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}#comments'">💬</button><button class="action-btn" onclick="shareContent('${reel.$id}', 'reel')">📤</button></div><div class="feed-stats"><span id="likes-${reel.$id}">${reel.likes || 0} likes</span> • <span id="views-${reel.$id}">${reel.views || 0} views</span></div>`;
            feed.appendChild(reelItem);
          } else if (item.type === 'post') {
            const post = item.data, creator = item.creator;
            const liked = MY_USER_ID ? await isPostLiked(post.$id) : false;
            let hashtags = [];
            try { hashtags = JSON.parse(post.hashtags || '[]'); } catch (e) {}
            const postItem = document.createElement('div');
            postItem.className = 'feed-item';
            postItem.innerHTML = `<div class="feed-header"><div class="feed-creator-info"><img class="feed-avatar" src="${creator.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png'}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'"><div class="feed-creator-meta"><div class="feed-creator-name" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">${escapeHtml(creator.name || 'User')}${creator.isVerified ? ' ✓' : ''}</div><div class="feed-time">${creator.category ? '📌 ' + creator.category : 'Common Zone'} • ${getTimeAgo(new Date(post.createdAt))}</div></div></div><button class="feed-menu" onclick="showMoreOptions('${post.$id}')">⋮</button></div><div class="feed-text-content"><p>${escapeHtml(post.content)}</p>${hashtags.length > 0 ? `<div class="feed-hashtags">${hashtags.map(tag => `<a href="#" onclick="event.preventDefault(); alert('Hashtag search coming soon')">${tag}</a>`).join(' ')}</div>` : ''}</div><div class="feed-actions"><button class="action-btn ${liked ? 'liked' : ''}" id="like-${post.$id}" onclick="toggleLike('${post.$id}', this, 'post')">${liked ? '❤️' : '🤍'}</button><button class="action-btn" onclick="alert('Comments coming soon')">💬</button><button class="action-btn" onclick="shareContent('${post.$id}', 'post')">📤</button></div><div class="feed-stats"><span id="likes-${post.$id}">${post.likes || 0} likes</span> • <span id="shares-${post.$id}">${post.shares || 0} shares</span></div>`;
            feed.appendChild(postItem);
          }
        }
        
        lastOffset += paginatedContent.length;
        isLoadingMore = false;
      } catch (err) { 
        console.error('Load videos error:', err);
        isLoadingMore = false; 
      }
    }

    function getTimeAgo(date) { const seconds = Math.floor((new Date() - date) / 1000), minutes = Math.floor(seconds / 60), hours = Math.floor(minutes / 60), days = Math.floor(hours / 24); if (seconds < 60) return 'just now'; if (minutes < 60) return `${minutes}m ago`; if (hours < 24) return `${hours}h ago`; if (days < 7) return `${days}d ago`; return date.toLocaleDateString(); }

    async function isVideoLiked(reelId) { if (!MY_USER_ID) return false; try { const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [ Query.equal('userId', MY_USER_ID), Query.equal('reelId', reelId), Query.limit(1) ]); return response.total > 0; } catch (err) { return false; } }

    async function isPostLiked(postId) { if (!MY_USER_ID) return false; try { const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [ Query.equal('userId', MY_USER_ID), Query.equal('postId', postId), Query.limit(1) ]); return response.total > 0; } catch (err) { return false; } }

    async function toggleLike(contentId, btn, type) {
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      try {
        let query = [ Query.equal('userId', MY_USER_ID), Query.limit(1) ];
        if (type === 'reel') { query.push(Query.equal('reelId', contentId)); } else { query.push(Query.equal('postId', contentId)); }
        const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, query);
        const liked = response.total > 0;
        if (liked) { await db.remove(APPWRITE_CONFIG.COLLECTIONS.LIKES, response.documents[0].$id); btn.textContent = '🤍'; btn.classList.remove('liked'); } else { const likeData = { userId: MY_USER_ID, createdAt: new Date().toISOString() }; if (type === 'reel') { likeData.reelId = contentId; } else { likeData.postId = contentId; } await db.create(APPWRITE_CONFIG.COLLECTIONS.LIKES, ID.unique(), likeData); btn.textContent = '❤️'; btn.classList.add('liked'); }
        if (type === 'reel') { const reel = await db.get(APPWRITE_CONFIG.COLLECTIONS.REELS, contentId); document.getElementById('likes-' + contentId).textContent = (reel.likes || 0) + ' likes'; } else { const post = await db.get('posts', contentId); document.getElementById('likes-' + contentId).textContent = (post.likes || 0) + ' likes'; }
      } catch (err) { console.error('Like error:', err); }
    }

    function shareContent(contentId, type) { const path = type === 'reel' ? 'video-modal.html?reelId=' : 'posts/'; const url = `${window.location.origin}/${path}${contentId}`; navigator.share?.({ url, title: 'Check this out on GorkhaReels!' }); }

    function showMoreOptions(contentId) { alert('More options coming soon!'); }

    function filterByCategory(category, evt) { 
      currentFilter = category; 
      document.querySelectorAll('.category-tab').forEach(tab => { 
        tab.classList.remove('active'); 
      }); 
      if (evt && evt.target) { 
        evt.target.classList.add('active'); 
      } 
      lastOffset = 0; 
      isLoadingMore = false; 
      
      if (category === 'trending') {
        loadTrendingFeed();
      } else {
        loadVideos();
      }
    }

    function setupInfiniteScroll() { window.addEventListener('scroll', () => { if ((window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 500) && !isLoadingMore) { isLoadingMore = true; if (currentFilter === 'trending') { loadTrendingFeed(); } else { loadVideos(); } } }); }

    async function init() {
      try {
        // Initialize geo systems
        geoFeedEngine = new GeoFeedEngine();
        geoContextManager = new GeoContextManager();
        interstitialManager = new InterstitialManager();
        
        await geoContextManager.initialize();
        
        await session.refresh();
        if (session.isLoggedIn()) { MY_USER_ID = session.getUserId(); try { if (typeof lastSeenTracker !== 'undefined' && lastSeenTracker.init) { lastSeenTracker.init(MY_USER_ID); } } catch (e) {} await new Promise(resolve => setTimeout(resolve, 100)); }
        setupDrawer();
        await Promise.allSettled([ loadSuggestedCreators(), loadVideos(), loadLiveStrip(), loadStoryCarousel() ]);
        setupInfiniteScroll();
      } catch (err) { setupDrawer(); await loadVideos(); }
    }

    async function loadStoryCarousel() {
      try {
        const scroll = document.getElementById('story-carousel-scroll');
        const now = new Date().toISOString();

        // Active (unexpired) stories, newest first
        const res = await db.list('status', [
          Query.greaterThan('expiresAt', now),
          Query.orderDesc('createdAt'),
          Query.limit(100)
        ]);

        const stories = res.documents || [];
        if (stories.length === 0) return; // keep just the "Your Story" button

        // One entry per creator (dedupe), preserving newest-first order
        const seen = new Set();
        const uniqueCreatorIds = [];
        for (const s of stories) {
          if (!seen.has(s.creatorId)) {
            seen.add(s.creatorId);
            uniqueCreatorIds.push(s.creatorId);
          }
        }

        // Fetch each creator's profile (skip failures)
        const creators = await Promise.all(
          uniqueCreatorIds.map(id => db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, id).catch(() => null))
        );

        const html = creators
          .filter(c => c)
          .map(c => `
            <a href="story.html?creator=${c.$id}" class="story-item">
              <img class="story-avatar has-unseen"
                   src="${c.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png'}"
                   onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'"
                   alt="${escapeHtml(c.name || 'User')}">
              <div class="story-name">${escapeHtml(c.name || 'User')}</div>
            </a>
          `).join('');

        // Append after the "Your Story" button (never wipe it)
        scroll.insertAdjacentHTML('beforeend', html);
      } catch (err) {
        console.error('Story carousel error:', err);
        // On failure the "Your Story" button stays — no broken UI
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
  </script>
</body>
