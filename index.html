<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaReels</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    header {
      position: sticky;
      top: 0;
      background: #1a1a1a;
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d2d;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #fff;
    }

    .feed {
      max-width: 100%;
      margin-bottom: 80px;
    }

    .post {
      padding: 16px;
      border-bottom: 1px solid #2d2d2d;
      cursor: pointer;
      transition: background 0.2s;
    }

    .post:active {
      background: rgba(255,255,255,0.05);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .creator-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d2d2d;
      overflow: hidden;
      flex-shrink: 0;
    }

    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .creator-name {
      font-size: 13px;
      font-weight: 600;
    }

    .post-thumbnail {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      margin-bottom: 12px;
    }

    .post-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      opacity: 0.8;
    }

    .post-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .post-actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .action-icon {
      font-size: 16px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 12px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2d2d2d;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }

    .nav-item {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-item.active {
      color: #dc2626;
    }

    .nav-label {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img class="logo" src="assets/logo.png" alt="Logo">
      <div class="header-title">GORKHAREEL</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="window.location='search-videos.html'">🔍</button>
      <button class="icon-btn" onclick="window.location='creator-dashboard.html'">👤</button>
      <button class="icon-btn" onclick="alert('Menu coming soon')">⋮</button>
    </div>
  </header>

  <div class="feed" id="feed">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading videos...</p>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="window.location='index.html'">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="window.location='upload.html'">
      <span>➕</span>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item" onclick="window.location='trending.html'">
      <span>🔥</span>
      <span class="nav-label">Trending</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/thumbnail-utils.js"></script>
  <script>
    async function init() {
      try {
        await session.refresh();
        await loadVideos();
      } catch (err) {
        console.error('Init error:', err);
        showError('Error loading videos');
      }
    }

    async function loadVideos() {
      try {
        const reels = await db.list(
          APPWRITE_CONFIG.COLLECTIONS.REELS,
          [Query.orderDesc('uploadedAt'), Query.limit(50)]
        );

        if (!reels.documents.length) {
          document.getElementById('feed').innerHTML = '<div class="loading"><p>No videos yet</p></div>';
          return;
        }

        let html = '';
        
        // Load thumbnails in parallel
        for (const reel of reels.documents) {
          const thumbnail = await generateThumbnailFromVideo(reel.videoUrl);
          
          html += `
            <div class="post" onclick="openVideo('${reel.$id}')">
              <div class="post-header">
                <div class="creator-avatar">
                  <img src="${reel.creatorProfilePic || 'assets/placeholder.svg'}" onerror="this.src='assets/placeholder.svg'">
                </div>
                <div class="creator-name">${reel.creatorName}</div>
              </div>

              <div class="post-thumbnail">
                <img src="${thumbnail}" alt="Video">
                <div class="play-icon">▶️</div>
              </div>

              <div class="post-title">${reel.title}</div>

              <div class="post-actions">
                <button class="action-btn" onclick="event.stopPropagation()">
                  <span class="action-icon">❤️</span>
                  <span>${reel.likes || 0}</span>
                </button>
                <button class="action-btn" onclick="event.stopPropagation()">
                  <span class="action-icon">💬</span>
                  <span>${reel.comments || 0}</span>
                </button>
                <button class="action-btn" onclick="event.stopPropagation()">
                  <span class="action-icon">↗️</span>
                  <span>Share</span>
                </button>
              </div>
            </div>
          `;
        }

        document.getElementById('feed').innerHTML = html;
      } catch (err) {
        console.error('Load error:', err);
        showError('Error loading videos');
      }
    }

    function openVideo(reelId) {
      window.location = `video-modal.html?id=${reelId}`;
    }

    function showError(msg) {
      document.getElementById('feed').innerHTML = `<div class="loading"><p>${msg}</p></div>`;
    }

    // Start when all scripts loaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
