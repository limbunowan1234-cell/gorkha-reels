<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GorkhaReels - Live Darjeeling</title>
  <link rel="icon" type="image/png" href="/favicon/logo-khukuri-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; overflow-x: hidden; touch-action: manipulation; -webkit-text-size-adjust: 100%; }
    .feed-video, .zone-reel-card, .action-btn, .feed-menu, button { touch-action: manipulation; }

    @keyframes storyGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(11, 94, 107, 0.6), inset 0 0 12px rgba(11, 94, 107, 0.3); }
      50% { box-shadow: 0 0 18px rgba(11, 94, 107, 0.8), inset 0 0 16px rgba(11, 94, 107, 0.4); }
    }

    .banner { position: sticky; top: 0; z-index: 100; background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 14px rgba(0,0,0,0.4); }
    .banner-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .banner-logo { width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0; background: rgba(255,255,255,0.15); object-fit: cover; }
    .banner-text { min-width: 0; }
    .banner-title { font-size: 22px; font-weight: 900; letter-spacing: 0.6px; line-height: 1.1; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.3); font-family: 'Space Grotesk', sans-serif; }
    .banner-tagline { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.9); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .banner-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .banner-btn { width: 38px; height: 38px; border: none; border-radius: 50%; background: rgba(255,255,255,0.18); color: #fff; font-size: 19px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .banner-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.92); }

    /* ====== ZONE HIGHLIGHTS (TOP 2 REELS PER ZONE) ====== */
    .zone-highlights-section { background: #0f0f0f; border-bottom: 1px solid #1a1a1a; z-index: 98; }
    .zone-highlights-header { padding: 16px; }
    .zone-highlights-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .zone-highlights-tabs { display: flex; gap: 6px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .zone-highlights-tabs::-webkit-scrollbar { display: none; }
    .zone-highlight-tab { flex: 0 0 auto; padding: 6px 12px; background: #1a1a1a; border: 1px solid #2d2d2d; color: #888; border-radius: 16px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .zone-highlight-tab.active { background: #0B5E6B; border-color: #0B5E6B; color: #fff; }
    .zone-highlights-feed { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 12px; }
    .zone-reel-card { position: relative; aspect-ratio: 9/16; border-radius: 10px; overflow: hidden; background: #1a1a1a; border: 1px solid #2d2d2d; cursor: pointer; }
    .zone-reel-card video { width: 100%; height: 100%; object-fit: cover; }
    .zone-reel-card-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8)); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; color: #fff; }
    .zone-reel-stats { font-size: 10px; color: rgba(255,255,255,0.8); }
    .see-more-btn { width: calc(100% - 32px); margin: 12px 16px; padding: 12px; background: linear-gradient(135deg, #0B5E6B, #0D7377); border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .see-more-btn:active { transform: scale(0.98); }

    .story-carousel-section { padding: 16px; border-bottom: 1px solid #1a1a1a; background: #0f0f0f; z-index: 97; }
    .story-carousel-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .story-carousel-scroll::-webkit-scrollbar { display: none; }
    .story-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; }
    .story-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2.5px solid #333; transition: all 0.3s; }
    .story-avatar.has-unseen { border: 2.5px solid #0B5E6B; box-shadow: 0 0 12px rgba(11, 94, 107, 0.6), inset 0 0 12px rgba(11, 94, 107, 0.3); animation: storyGlow 2s ease-in-out infinite; }
    .story-name { font-size: 12px; max-width: 70px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
    .story-your-story { text-align: center; font-weight: 600; color: #0B5E6B; }

    .category-tabs-section { padding: 12px 16px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; z-index: 96; }
    .category-tabs-scroll { display: flex; gap: 8px; overflow-x: auto; scroll-behavior: smooth; padding: 4px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .category-tabs-scroll::-webkit-scrollbar { display: none; }
    .category-tab { flex: 0 0 auto; padding: 8px 16px; background: #1a1a1a; border: 1px solid #2d2d2d; color: #888; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .category-tab.active { background: #0B5E6B; border-color: #0B5E6B; color: #fff; }
    .category-tab:active { transform: scale(0.95); }

    .suggested-banner { padding: 16px; border-bottom: 1px solid #1a1a1a; background: #0f0f0f; display: block; z-index: 95; }
    .suggested-banner.hidden { display: none !important; }
    .suggested-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .suggested-title { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .suggested-close { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .suggested-scroll { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .suggested-scroll::-webkit-scrollbar { display: none; }
    .creator-card { flex: 0 0 auto; width: 130px; background: #1a1a1a; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid #2d2d2d; }
    .creator-card:active { transform: scale(0.96); border-color: #0B5E6B; }
    .creator-pic { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; border: 2px solid #0B5E6B; background: #2d2d2d; }
    .creator-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .creator-followers { font-size: 11px; color: #888; margin-bottom: 8px; }
    .follow-btn { width: 100%; padding: 8px; background: #0B5E6B; border: 1px solid #0B5E6B; border-radius: 8px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .follow-btn:active { background: rgba(11, 94, 107, 0.8); }
    .follow-btn.following { background: transparent; color: #0B5E6B; }

    .feed { padding-bottom: 100px; }
    .feed-item { border-bottom: 1px solid #1a1a1a; background: #0f0f0f; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .feed-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; gap: 12px; }
    .feed-creator-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .feed-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #0B5E6B; cursor: pointer; flex-shrink: 0; background: #2d2d2d; }
    .feed-creator-meta { min-width: 0; }
    .feed-creator-name { font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-time { font-size: 11px; color: #888; }
    .feed-menu { background: none; border: none; color: #666; font-size: 18px; cursor: pointer; padding: 4px; }
    .feed-video { position: relative; background: #000; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; max-height: 70vh; }
    .feed-video img, .feed-video video { width: 100%; height: auto; max-height: 70vh; object-fit: contain; display: block; }
    .feed-text-content { padding: 12px 16px; font-size: 15px; line-height: 1.5; color: #fff; word-break: break-word; }
    .feed-hashtags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .feed-hashtags a { color: #0B5E6B; text-decoration: none; font-weight: 600; font-size: 13px; }
    .feed-hashtags a:active { opacity: 0.7; }
    .feed-actions { display: flex; justify-content: space-around; padding: 12px 16px; border-top: 1px solid #1a1a1a; }
    .action-btn { background: none; border: none; color: #888; font-size: 18px; cursor: pointer; padding: 6px 12px; transition: color 0.2s; }
    .action-btn:hover { color: #0B5E6B; }
    .action-btn.liked { color: #ef4444; }
    .feed-stats { padding: 8px 16px; font-size: 13px; color: #888; }
    .loading { text-align: center; padding: 20px; color: #666; }

    /* ====== ZONE PILL (NEW) ====== */
    .zone-pill { display: inline-flex; align-items: center; gap: 4px; background: rgba(11,94,107,0.18); border: 1px solid rgba(11,94,107,0.4); color: #4db8c4; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin-left: 6px; vertical-align: middle; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #2d2d2d; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding: 8px 0; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #666; cursor: pointer; flex: 1; padding: 10px; font-size: 18px; }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }

    .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .drawer-backdrop.open { display: block; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 80%; max-width: 320px; background: #161616; z-index: 160; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.5); }
    .drawer.open { transform: translateX(0); }
    .drawer-head { background: linear-gradient(135deg, #0B5E6B, #0D7377); padding: 20px 16px; display: flex; align-items: center; gap: 12px; }
    .drawer-head img { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); }
    .drawer-head .dh-title { font-size: 16px; font-weight: 900; }
    .drawer-head .dh-sub { font-size: 11px; color: rgba(255,255,255,0.9); }
    .drawer-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .drawer-item { width: 100%; display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: none; border: none; color: #fff; font-size: 15px; cursor: pointer; text-align: left; }
    .drawer-item:active { background: #222; }
    .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
    .drawer-sep { height: 1px; background: #262626; margin: 6px 18px; }
    .drawer-item-danger { color: #ef4444; }

    /* Location badge for reels */
    .location-badge {
      position: absolute;
      bottom: 60px;
      right: 12px;
      background: rgba(11, 94, 107, 0.8);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .darjeeling-badge {
      position: absolute;
      bottom: 75px;
      right: 12px;
      background: #d4af37;
      color: #0f0f0f;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ====== OPTIONS BOTTOM SHEET ====== */
    .options-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 170; display: none; }
    .options-backdrop.open { display: block; }
    .options-sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #1a1a1a; border-radius: 18px 18px 0 0; z-index: 180; transform: translateY(100%); transition: transform 0.25s ease; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
    .options-sheet.open { transform: translateY(0); }
    .options-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 8px auto 12px; }
    .options-item { width: 100%; display: flex; align-items: center; gap: 14px; padding: 16px 22px; background: none; border: none; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; text-align: left; }
    .options-item:active { background: #262626; }
    .options-item .oi-icon { font-size: 20px; width: 24px; text-align: center; }
    .options-item-danger { color: #ef4444; }
    .options-cancel { width: calc(100% - 32px); margin: 8px 16px 0; padding: 14px; background: #262626; border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

  <header class="banner">
    <div class="banner-left">
      <img class="banner-logo" src="/favicon/logo-khukuri-192x192.png" alt="GorkhaReels">
      <div class="banner-text">
        <div class="banner-title">GorkhaReels</div>
        <div class="banner-tagline">🏔️ Live Darjeeling</div>
      </div>
    </div>
    <div class="banner-right">
      <button class="banner-btn" id="open-notifications" aria-label="Notifications" style="position: relative;">
        🔔
        <span id="notification-badge" style="position: absolute; top: -4px; right: -4px; background: #dc2626; color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; display: none; align-items: center; justify-content: center; border: 2px solid #1a1a1a;"></span>
      </button>
      <button class="banner-btn" onclick="window.location='search.html'" aria-label="Search">🔍</button>
      <button class="banner-btn" id="open-drawer" aria-label="Menu">☰</button>
    </div>
  </header>

  <!-- ZONE HIGHLIGHTS: TOP 2 REELS PER ZONE -->
  <div class="zone-highlights-section" id="zone-highlights-section">
    <div class="zone-highlights-header">
      <div class="zone-highlights-title">🏔️ Trending from Zones</div>
      <div class="zone-highlights-tabs">
        <button class="zone-highlight-tab active" data-zone="Darjeeling" onclick="switchZoneHighlight('Darjeeling', event)">Darjeeling</button>
        <button class="zone-highlight-tab" data-zone="Kalimpong" onclick="switchZoneHighlight('Kalimpong', event)">Kalimpong</button>
        <button class="zone-highlight-tab" data-zone="Kurseong" onclick="switchZoneHighlight('Kurseong', event)">Kurseong</button>
        <button class="zone-highlight-tab" data-zone="Siliguri" onclick="switchZoneHighlight('Siliguri', event)">Siliguri</button>
        <button class="zone-highlight-tab" data-zone="Mirik" onclick="switchZoneHighlight('Mirik', event)">Mirik</button>
        <button class="zone-highlight-tab" data-zone="Sukhiapokhri" onclick="switchZoneHighlight('Sukhiapokhri', event)">Sukhiapokhri</button>
        <button class="zone-highlight-tab" data-zone="Takdah" onclick="switchZoneHighlight('Takdah', event)">Takdah</button>
        <button class="zone-highlight-tab" data-zone="Sonada" onclick="switchZoneHighlight('Sonada', event)">Sonada</button>
        <button class="zone-highlight-tab" data-zone="Bijanbari" onclick="switchZoneHighlight('Bijanbari', event)">Bijanbari</button>
        <button class="zone-highlight-tab" data-zone="Pedong" onclick="switchZoneHighlight('Pedong', event)">Pedong</button>
        <button class="zone-highlight-tab" data-zone="Other" onclick="switchZoneHighlight('Other', event)">Other</button>
      </div>
    </div>
    <div class="zone-highlights-feed" id="zone-highlights-feed">
      <div class="loading">Loading zone highlights...</div>
    </div>
    <button class="see-more-btn" id="see-more-btn" onclick="seeMoreZone()">See More from this Zone →</button>
  </div>

  <div class="story-carousel-section" id="story-carousel-section">
    <div class="story-carousel-scroll" id="story-carousel-scroll">
      <a href="upload.html" class="story-item">
        <div class="story-avatar" style="background: linear-gradient(135deg, #0B5E6B, #0D7377); display: flex; align-items: center; justify-content: center; border: 2.5px solid #0B5E6B;">
          <span style="font-size: 28px;">➕</span>
        </div>
        <div class="story-name story-your-story">Your Story</div>
      </a>
    </div>
  </div>

  <div class="category-tabs-section" id="category-tabs-section">
    <div class="category-tabs-scroll">
      <button class="category-tab active" onclick="filterByCategory('all', event)">All + Common</button>
      <button class="category-tab" onclick="filterByCategory('trending', event)">🔥 Trending</button>
      <button class="category-tab" onclick="filterByCategory('musician', event)">🎵 Musicians</button>
      <button class="category-tab" onclick="filterByCategory('artist', event)">🎨 Artists</button>
      <button class="category-tab" onclick="filterByCategory('guide', event)">🧗 Guides</button>
      <button class="category-tab" onclick="filterByCategory('business', event)">🏪 Business</button>
      <button class="category-tab" onclick="filterByCategory('student', event)">📚 Students</button>
    </div>
  </div>

  <div class="suggested-banner hidden" id="suggested-banner">
    <div class="suggested-header">
      <div class="suggested-title">✨ Creators You May Like</div>
      <button class="suggested-close" onclick="document.getElementById('suggested-banner').classList.add('hidden')">✕</button>
    </div>
    <div class="suggested-scroll" id="suggested-scroll">
      <div class="loading">Loading creators...</div>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="loading">Loading...</div>
  </div>


  <div class="options-backdrop" id="options-backdrop" onclick="closeOptionsSheet()"></div>
  <div class="options-sheet" id="options-sheet">
    <div class="options-handle"></div>
    <button class="options-item" onclick="optShare()"><span class="oi-icon">📤</span> Share</button>
    <button class="options-item" onclick="optCopyLink()"><span class="oi-icon">🔗</span> Copy link</button>
    <button class="options-item options-item-danger" onclick="optReport()"><span class="oi-icon">🚩</span> Report</button>
    <button class="options-cancel" onclick="closeOptionsSheet()">Cancel</button>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='upload.html'"><span>＋</span><span class="nav-label">Create</span></button>
    <button class="nav-btn" onclick="window.location='messages.html'"><span>💬</span><span class="nav-label">Messages</span></button>
    <button class="nav-btn" onclick="window.location='creator-dashboard.html'"><span>👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <!-- Notifications Panel Backdrop -->
  <div class="drawer-backdrop" id="notifications-backdrop"></div>
  
  <!-- Notifications Panel -->
  <aside class="drawer" id="notifications-panel" style="width: 100%; max-width: 100%; border-radius: 18px 18px 0 0;">
    <div class="drawer-head">
      <div style="flex: 1;">
        <div class="dh-title">🔔 Notifications</div>
        <div class="dh-sub">Stay updated on your activity</div>
      </div>
      <button style="background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 4px;" onclick="closeNotificationsPanel()">✕</button>
    </div>
    <div id="notifications-panel-content" style="flex: 1; overflow-y: auto; padding: 0; background: #0f0f0f;">
      <div style="text-align: center; padding: 40px 20px; color: #888;">
        <div style="font-size: 48px; margin-bottom: 12px;">⏳</div>
        <p>Loading notifications...</p>
      </div>
    </div>
  </aside>

  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <img src="/favicon/logo-khukuri-192x192.png" alt="">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Live Darjeeling</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-leaderboard.html'"><span class="di-icon">🏆</span> Leaderboard</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html#edit'"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/last-seen-tracker.js"></script>
  <script src="js/trending.js"></script>

  <script>
    let MY_USER_ID = null, lastOffset = 0, isLoadingMore = false, currentFilter = 'all', currentZone = 'all';

    function setupDrawer() {
      const openBtn = document.getElementById('open-drawer');
      const backdrop = document.getElementById('drawer-backdrop');
      const drawer = document.getElementById('drawer');
      const items = drawer.querySelectorAll('.drawer-item');

      openBtn.onclick = () => { drawer.classList.add('open'); backdrop.classList.add('open'); };
      backdrop.onclick = () => { drawer.classList.remove('open'); backdrop.classList.remove('open'); };
      items.forEach(item => { item.addEventListener('click', () => { drawer.classList.remove('open'); backdrop.classList.remove('open'); }); });
      document.getElementById('drawer-logout').onclick = async () => { try { await session.logout(); } catch (e) {} window.location = 'login.html'; };
    }

    // ============== NOTIFICATIONS SETUP ==============
    function setupNotifications() {
      const bellBtn = document.getElementById('open-notifications');
      const backdrop = document.getElementById('notifications-backdrop');
      const panel = document.getElementById('notifications-panel');

      if (!bellBtn) return;

      bellBtn.onclick = () => {
        panel.classList.add('open');
        backdrop.classList.add('open');
        if (window.notificationsManager) {
          window.notificationsManager.loadNotifications().then(() => {
            window.notificationsManager.displayNotifications();
            const content = document.getElementById('notifications-panel-content');
            if (content) {
              content.innerHTML = `<div id="notifications-list"></div>`;
              const list = document.getElementById('notifications-list');
              if (window.notificationsManager.notifications.length === 0) {
                list.innerHTML = `<div style="text-align: center; padding: 40px 20px; color: #888;"><div style="font-size: 48px; margin-bottom: 12px;">🔔</div><p>No notifications yet</p></div>`;
              } else {
                list.innerHTML = window.notificationsManager.notifications.map(notif => {
                  const icon = window.notificationsManager.getNotificationIcon(notif.type);
                  const timeAgo = window.notificationsManager.getTimeAgo(new Date(notif.createdAt));
                  return `
                    <div style="padding: 12px 16px; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: ${notif.isRead ? 'transparent' : 'rgba(11, 94, 107, 0.1)'};" 
                         onclick="${notif.actionUrl ? `window.location='${notif.actionUrl}'; closeNotificationsPanel()` : 'void(0)'}">
                      <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 14px; color: #fff; font-weight: 600; margin-bottom: 4px;">
                          ${icon} ${escapeHtml(notif.message)}
                        </div>
                        <div style="font-size: 11px; color: #888;">
                          ${timeAgo}
                        </div>
                      </div>
                      <button 
                        style="background: none; border: none; color: #dc2626; font-size: 18px; cursor: pointer; padding: 4px 8px; margin-left: 8px;"
                        onclick="event.stopPropagation(); window.notificationsManager.deleteNotification('${notif.$id}')"
                        title="Delete">
                        ✕
                      </button>
                    </div>
                  `;
                }).join('');
              }
            }
          });
        }
      };

      backdrop.onclick = () => closeNotificationsPanel();
    }

    function closeNotificationsPanel() {
      const backdrop = document.getElementById('notifications-backdrop');
      const panel = document.getElementById('notifications-panel');
      if (backdrop) backdrop.classList.remove('open');
      if (panel) panel.classList.remove('open');
    }

    async function checkFollowStatus(creatorId, btn) {
      if (!MY_USER_ID) return;
      try {
        const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [ 
          Query.equal('followerId', MY_USER_ID), 
          Query.equal('followingId', creatorId), 
          Query.limit(1) 
        ]);
        
        if (existing.total > 0) {
          btn.textContent = 'Following';
          btn.classList.add('following');
          btn.disabled = true;
        } else {
          btn.textContent = 'Follow';
          btn.classList.remove('following');
          btn.disabled = false;
        }
      } catch (err) {
        console.error('Check follow status error:', err);
      }
    }

    async function loadSuggestedCreators() {
      try {
        const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.CREATORS, [ Query.orderDesc('followers'), Query.limit(20) ]);
        let creators = response.documents || [];
        if (MY_USER_ID) creators = creators.filter(c => c.$id !== MY_USER_ID);
        creators = creators.slice(0, 6);
        if (creators.length === 0) { document.getElementById('suggested-banner').classList.add('hidden'); return; }
        const scroll = document.getElementById('suggested-scroll');
        const html = creators.map(creator => `<div class="creator-card" onclick="window.location.href='creator-profile.html?creatorId=${creator.$id}'"><img class="creator-pic" src="${creator.profilePic || '/favicon/logo-khukuri-512x512.png'}" alt="${creator.name}" onerror="this.src='/favicon/logo-khukuri-512x512.png'"><div class="creator-name">${escapeHtml(creator.name || 'User')}</div><div class="creator-followers">${creator.followers || 0} followers</div><button class="follow-btn" id="follow-btn-${creator.$id}" onclick="event.stopPropagation(); followCreator('${creator.$id}', this)">Follow</button></div>`).join('');
        scroll.innerHTML = html;
        
        for (const creator of creators) {
          const btn = scroll.querySelector(`#follow-btn-${creator.$id}`);
          if (btn) await checkFollowStatus(creator.$id, btn);
        }
        
        document.getElementById('suggested-banner').classList.remove('hidden');
      } catch (err) { document.getElementById('suggested-scroll').innerHTML = '<div class="loading" style="padding: 20px;">Unable to load</div>'; }
    }

    async function followCreator(creatorId, btn) {
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      try {
        const existing = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [ 
          Query.equal('followerId', MY_USER_ID), 
          Query.equal('followingId', creatorId), 
          Query.limit(1) 
        ]);
        
        if (existing.total === 0) { 
          await db.create(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, ID.unique(), { 
            followerId: MY_USER_ID, 
            followingId: creatorId, 
            CreatorId: creatorId, 
            createdAt: new Date().toISOString() 
          }); 
        }
        
        btn.textContent = 'Following'; 
        btn.classList.add('following');
        btn.disabled = true;
      } catch (err) { 
        console.error('Follow error:', err); 
      }
    }

    async function loadTrendingFeed() {
      try {
        const trendingContainer = document.getElementById('feed');
        if (!trendingContainer) return;

        trendingContainer.innerHTML = '<div class="loading">Loading trending...</div>';

        const [reelsRes, creatorsRes] = await Promise.all([
          db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
            Query.equal('isDeleted', false),
            Query.limit(500)
          ]),
          db.list(APPWRITE_CONFIG.COLLECTIONS.CREATORS, [Query.limit(100)])
        ]);

        const trendingReels = TrendingCalculator.getTrendingReels(
          reelsRes.documents,
          creatorsRes.documents,
          30
        );

        const creatorMap = {};
        creatorsRes.documents.forEach(c => { creatorMap[c.$id] = c; });

        trendingContainer.innerHTML = '';
        
        for (const reel of trendingReels) {
          const creator = creatorMap[reel.creatorId] || {};
          const badge = TrendingCalculator.getBadge(reel.trendingScore);
          const liked = MY_USER_ID ? await isVideoLiked(reel.$id) : false;
          
          const reelItem = document.createElement('div');
          reelItem.className = 'feed-item';
          reelItem.innerHTML = `
            <div class="feed-header">
              <div class="feed-creator-info">
                <img class="feed-avatar" src="${creator.profilePic || '/favicon/logo-khukuri-512x512.png'}" 
                     onerror="this.src='/favicon/logo-khukuri-512x512.png'" 
                     onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
                <div class="feed-creator-meta">
                  <div class="feed-creator-name" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">
                    ${escapeHtml(creator.name || 'User')}${creator.isVerified ? ' ✓' : ''}
                    ${badge ? ` <span style="color: #ff6b35; margin-left: 4px;">${badge}</span>` : ''}
                  </div>
                  <div class="feed-time">${creator.category ? '📌 ' + creator.category : 'Common Zone'} • ${getTimeAgo(new Date(reel.uploadedAt))}${reel.zone ? `<span class="zone-pill">📍 ${escapeHtml(reel.zone)}</span>` : ''}</div>
                </div>
              </div>
              <button class="feed-menu" onclick="showMoreOptions('${reel.$id}', 'reel')">⋮</button>
            </div>
            <div class="feed-video" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'">
              <video src="${reel.videoUrl}" muted playsinline preload="metadata" webkit-playsinline></video>
            </div>
            <div class="feed-actions">
              <button class="action-btn ${liked ? 'liked' : ''}" id="like-${reel.$id}" onclick="toggleLike('${reel.$id}', this, 'reel')">
                ${liked ? '❤️' : '🤍'}
              </button>
              <button class="action-btn" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}#comments'">💬</button>
              <button class="action-btn" onclick="shareContent('${reel.$id}', 'reel')">📤</button>
            </div>
            <div class="feed-stats">
              <span id="likes-${reel.$id}">${reel.likes || 0} likes</span> • 
              <span id="views-${reel.$id}">${reel.views || 0} views</span>
            </div>
          `;
          trendingContainer.appendChild(reelItem);
        }

        if (!trendingReels.length) {
          trendingContainer.innerHTML = '<div class="loading">No trending videos yet. Check back soon!</div>';
        }
        setTimeout(primeVideoThumbnails, 100);

      } catch (e) {
        console.error('Trending load error:', e);
        document.getElementById('feed').innerHTML = '<div class="loading">Error loading trending</div>';
      }
    }

    async function loadVideos() {
      try {
        const [reelsResponse, postsResponse] = await Promise.all([ db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [ Query.equal('isDeleted', false), Query.orderDesc('uploadedAt'), Query.limit(20) ]), db.list('posts', [ Query.equal('isDeleted', false), Query.orderDesc('createdAt'), Query.limit(20) ]) ]);
        let allContent = [];
        const creatorMap = {};
        
        for (const reel of reelsResponse.documents) {
          let creator = null;
          try { 
            creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, reel.creatorId);
            creatorMap[creator.$id] = creator;
          } catch (err) { 
            continue;
          }
          
          if (currentFilter !== 'all') {
            if (!creator.category || creator.category !== currentFilter) {
              continue;
            }
          }
          
          if (currentZone !== 'all') {
            if (!reel.zone || reel.zone !== currentZone) {
              continue;
            }
          }
          
          allContent.push({ type: 'reel', data: reel, creator: creator, timestamp: new Date(reel.uploadedAt) });
        }
        
        for (const post of postsResponse.documents) {
          let creator = null;
          try { 
            creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, post.creatorId);
            creatorMap[creator.$id] = creator;
          } catch (err) { 
            continue;
          }
          
          if (currentFilter !== 'all') {
            if (!creator.category || creator.category !== currentFilter) {
              continue;
            }
          }
          
          if (currentZone !== 'all') {
            if (!reel.zone || reel.zone !== currentZone) {
              continue;
            }
          }
          
          allContent.push({ type: 'post', data: post, creator: creator, timestamp: new Date(post.createdAt) });
        }
        
        // Sort by recency (no geo ranking)
        allContent.sort((a, b) => b.timestamp - a.timestamp);
        
        const pageSize = lastOffset === 0 ? 6 : 10; const paginatedContent = allContent.slice(lastOffset, lastOffset + pageSize);
        if (paginatedContent.length === 0 && lastOffset === 0) { 
          document.getElementById('feed').innerHTML = '<div class="loading">No content yet. Follow creators to see their reels and posts!</div>'; 
          return; 
        }
        
        const feed = document.getElementById('feed');
        if (lastOffset === 0) feed.innerHTML = '';
        
        for (const item of paginatedContent) {
          if (item.type === 'reel') {
            const reel = item.data, creator = item.creator;
            const liked = MY_USER_ID ? await isVideoLiked(reel.$id) : false;
            const reelItem = document.createElement('div');
            reelItem.className = 'feed-item';
            reelItem.innerHTML = `<div class="feed-header"><div class="feed-creator-info"><img class="feed-avatar" src="${creator.profilePic || '/favicon/logo-khukuri-512x512.png'}" onerror="this.src='/favicon/logo-khukuri-512x512.png'" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'"><div class="feed-creator-meta"><div class="feed-creator-name" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">${escapeHtml(creator.name || 'User')}${creator.isVerified ? ' ✓' : ''}</div><div class="feed-time">${creator.category ? '📌 ' + creator.category : 'Common Zone'} • ${getTimeAgo(new Date(reel.uploadedAt))}${reel.zone ? `<span class="zone-pill">📍 ${escapeHtml(reel.zone)}</span>` : ''}</div></div></div><button class="feed-menu" onclick="showMoreOptions('${reel.$id}', 'reel')">⋮</button></div><div class="feed-video" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'"><video src="${reel.videoUrl}" muted playsinline preload="metadata" webkit-playsinline></video></div><div class="feed-actions"><button class="action-btn ${liked ? 'liked' : ''}" id="like-${reel.$id}" onclick="toggleLike('${reel.$id}', this, 'reel')">${liked ? '❤️' : '🤍'}</button><button class="action-btn" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}#comments'">💬</button><button class="action-btn" onclick="shareContent('${reel.$id}', 'reel')">📤</button></div><div class="feed-stats"><span id="likes-${reel.$id}">${reel.likes || 0} likes</span> • <span id="views-${reel.$id}">${reel.views || 0} views</span></div>`;
            feed.appendChild(reelItem);
          } else if (item.type === 'post') {
            const post = item.data, creator = item.creator;
            const liked = MY_USER_ID ? await isPostLiked(post.$id) : false;
            let hashtags = [];
            try { hashtags = JSON.parse(post.hashtags || '[]'); } catch (e) {}
            const postItem = document.createElement('div');
            postItem.className = 'feed-item';
            postItem.innerHTML = `<div class="feed-header"><div class="feed-creator-info"><img class="feed-avatar" src="${creator.profilePic || '/favicon/logo-khukuri-512x512.png'}" onerror="this.src='/favicon/logo-khukuri-512x512.png'" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'"><div class="feed-creator-meta"><div class="feed-creator-name" onclick="window.location='creator-profile.html?creatorId=${creator.$id}'">${escapeHtml(creator.name || 'User')}${creator.isVerified ? ' ✓' : ''}</div><div class="feed-time">${creator.category ? '📌 ' + creator.category : 'Common Zone'} • ${getTimeAgo(new Date(post.createdAt))}</div></div></div><button class="feed-menu" onclick="showMoreOptions('${post.$id}', 'post')">⋮</button></div><div class="feed-text-content"><p>${escapeHtml(post.content)}</p>${hashtags.length > 0 ? `<div class="feed-hashtags">${hashtags.map(tag => `<a href="#" onclick="event.preventDefault(); alert('Hashtag search coming soon')">${tag}</a>`).join(' ')}</div>` : ''}</div><div class="feed-actions"><button class="action-btn ${liked ? 'liked' : ''}" id="like-${post.$id}" onclick="toggleLike('${post.$id}', this, 'post')">${liked ? '❤️' : '🤍'}</button><button class="action-btn" onclick="alert('Comments coming soon')">💬</button><button class="action-btn" onclick="shareContent('${post.$id}', 'post')">📤</button></div><div class="feed-stats"><span id="likes-${post.$id}">${post.likes || 0} likes</span> • <span id="shares-${post.$id}">${post.shares || 0} shares</span></div>`;
            feed.appendChild(postItem);
          }
        }
        
        lastOffset += paginatedContent.length;
        
        // Show suggested creators after first 6 reels
        if (lastOffset >= 6 && document.getElementById('suggested-banner').classList.contains('hidden')) {
          document.getElementById('suggested-banner').classList.remove('hidden');
          // Move it into the feed visually by inserting before the feed
          const feedContainer = document.getElementById('feed');
          feedContainer.insertAdjacentElement('beforebegin', document.getElementById('suggested-banner'));
        }
        
        isLoadingMore = false;
        setTimeout(primeVideoThumbnails, 100);
      } catch (err) { 
        console.error('Load videos error:', err);
        isLoadingMore = false; 
      }
    }

    function getTimeAgo(date) { const seconds = Math.floor((new Date() - date) / 1000), minutes = Math.floor(seconds / 60), hours = Math.floor(minutes / 60), days = Math.floor(hours / 24); if (seconds < 60) return 'just now'; if (minutes < 60) return `${minutes}m ago`; if (hours < 24) return `${hours}h ago`; if (days < 7) return `${days}d ago`; return date.toLocaleDateString(); }

    async function isVideoLiked(reelId) { if (!MY_USER_ID) return false; try { const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [ Query.equal('userId', MY_USER_ID), Query.equal('reelId', reelId), Query.limit(1) ]); return response.total > 0; } catch (err) { return false; } }

    async function isPostLiked(postId) { if (!MY_USER_ID) return false; try { const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [ Query.equal('userId', MY_USER_ID), Query.equal('postId', postId), Query.limit(1) ]); return response.total > 0; } catch (err) { return false; } }

    async function toggleLike(contentId, btn, type) {
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      try {
        let query = [ Query.equal('userId', MY_USER_ID), Query.limit(1) ];
        if (type === 'reel') { query.push(Query.equal('reelId', contentId)); } else { query.push(Query.equal('postId', contentId)); }
        const response = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, query);
        const liked = response.total > 0;
        if (liked) { await db.remove(APPWRITE_CONFIG.COLLECTIONS.LIKES, response.documents[0].$id); btn.textContent = '🤍'; btn.classList.remove('liked'); } else { const likeData = { userId: MY_USER_ID, createdAt: new Date().toISOString() }; if (type === 'reel') { likeData.reelId = contentId; } else { likeData.postId = contentId; } await db.create(APPWRITE_CONFIG.COLLECTIONS.LIKES, ID.unique(), likeData); btn.textContent = '❤️'; btn.classList.add('liked'); }
        if (type === 'reel') { const reel = await db.get(APPWRITE_CONFIG.COLLECTIONS.REELS, contentId); document.getElementById('likes-' + contentId).textContent = (reel.likes || 0) + ' likes'; } else { const post = await db.get('posts', contentId); document.getElementById('likes-' + contentId).textContent = (post.likes || 0) + ' likes'; }
      } catch (err) { console.error('Like error:', err); }
    }

    function shareContent(contentId, type) { const path = type === 'reel' ? 'video-modal.html?reelId=' : 'posts/'; const url = `${window.location.origin}/${path}${contentId}`; navigator.share?.({ url, title: 'Check this out on GorkhaReels!' }); }

    function showMoreOptions(contentId, type) {
      const sheet = document.getElementById('options-sheet');
      sheet.dataset.contentId = contentId;
      sheet.dataset.contentType = type || 'reel';
      sheet.classList.add('open');
      document.getElementById('options-backdrop').classList.add('open');
    }

    function closeOptionsSheet() {
      document.getElementById('options-sheet').classList.remove('open');
      document.getElementById('options-backdrop').classList.remove('open');
    }

    function buildContentUrl(contentId, type) {
      const path = type === 'reel' ? 'video-modal.html?reelId=' : 'video-modal.html?postId=';
      return `${window.location.origin}/${path}${contentId}`;
    }

    async function optShare() {
      const sheet = document.getElementById('options-sheet');
      const url = buildContentUrl(sheet.dataset.contentId, sheet.dataset.contentType);
      closeOptionsSheet();
      if (navigator.share) {
        try { await navigator.share({ url, title: 'Check this out on GorkhaReels!' }); } catch (e) {}
      } else {
        try { await navigator.clipboard.writeText(url); alert('Link copied!'); } catch (e) {}
      }
    }

    async function optCopyLink() {
      const sheet = document.getElementById('options-sheet');
      const url = buildContentUrl(sheet.dataset.contentId, sheet.dataset.contentType);
      closeOptionsSheet();
      try {
        await navigator.clipboard.writeText(url);
        alert('Link copied!');
      } catch (e) {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); alert('Link copied!'); } catch (err) { alert('Could not copy'); }
        document.body.removeChild(ta);
      }
    }

    async function optReport() {
      const sheet = document.getElementById('options-sheet');
      const contentId = sheet.dataset.contentId;
      const type = sheet.dataset.contentType;
      closeOptionsSheet();
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      const reason = prompt('Why are you reporting this?');
      if (reason === null) return; // user cancelled
      try {
        // Get the creator of this content (to fill reportedCreatorId)
        let creatorId = null;
        if (type === 'reel') {
          const reel = await db.get(APPWRITE_CONFIG.COLLECTIONS.REELS, contentId);
          creatorId = reel.creatorId;
        } else if (type === 'post') {
          const post = await db.get('posts', contentId);
          creatorId = post.creatorId;
        }
        
        // Build report document matching schema
        const reportData = {
          reportId: ID.unique(),
          reportedBy: MY_USER_ID,
          reportedCreatorId: creatorId,
          reason: reason || 'User did not provide reason',
          description: '',
          status: 'pending',
          createdAt: new Date().toISOString()
        };
        
        // Add content-specific field
        if (type === 'reel') { reportData.reelId = contentId; }
        else if (type === 'post') { reportData.commentId = contentId; }
        
        await db.create(APPWRITE_CONFIG.COLLECTIONS.REPORTS, ID.unique(), reportData);
        alert('Thank you. This content has been reported.');
      } catch (err) {
        console.error('Report error:', err);
        alert('Could not submit report. Please try again.');
      }
    }

    function filterByCategory(category, evt) { 
      currentFilter = category; 
      document.querySelectorAll('.category-tab').forEach(tab => { 
        tab.classList.remove('active'); 
      }); 
      if (evt && evt.target) { 
        evt.target.classList.add('active'); 
      } 
      lastOffset = 0; 
      isLoadingMore = false; 
      
      if (category === 'trending') {
        loadTrendingFeed();
      } else {
        loadVideos();
      }
    }

    function setupInfiniteScroll() { window.addEventListener('scroll', () => { if ((window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 500) && !isLoadingMore) { isLoadingMore = true; if (currentFilter === 'trending') { loadTrendingFeed(); } else { loadVideos(); } } }); }

    async function init() {
      try {

        await session.refresh();
        if (session.isLoggedIn()) { MY_USER_ID = session.getUserId(); try { if (typeof lastSeenTracker !== 'undefined' && lastSeenTracker.init) { lastSeenTracker.init(MY_USER_ID); } } catch (e) {} await new Promise(resolve => setTimeout(resolve, 100)); }
        setupDrawer();
        setupNotifications();
        await Promise.allSettled([ loadZoneHighlights("Darjeeling"), loadSuggestedCreators(), loadVideos(), loadStoryCarousel() ]);
        setupInfiniteScroll();
      } catch (err) { setupDrawer(); await loadVideos(); }
    }

    async function loadStoryCarousel() {
      try {
        const scroll = document.getElementById('story-carousel-scroll');
        const now = new Date().toISOString();

        // Active (unexpired) stories, newest first
        const res = await db.list('status', [
          Query.greaterThan('expiresAt', now),
          Query.orderDesc('createdAt'),
          Query.limit(100)
        ]);

        const stories = res.documents || [];
        if (stories.length === 0) return; // keep just the "Your Story" button

        // One entry per creator (dedupe), preserving newest-first order
        const seen = new Set();
        const uniqueCreatorIds = [];
        for (const s of stories) {
          if (!seen.has(s.creatorId)) {
            seen.add(s.creatorId);
            uniqueCreatorIds.push(s.creatorId);
          }
        }

        // Fetch each creator's profile (skip failures)
        const creators = await Promise.all(
          uniqueCreatorIds.map(id => db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, id).catch(() => null))
        );

        const html = creators
          .filter(c => c)
          .map(c => `
            <a href="story.html?creator=${c.$id}" class="story-item">
              <img class="story-avatar has-unseen"
                   src="${c.profilePic || '/favicon/logo-khukuri-512x512.png'}"
                   onerror="this.src='/favicon/logo-khukuri-512x512.png'"
                   alt="${escapeHtml(c.name || 'User')}">
              <div class="story-name">${escapeHtml(c.name || 'User')}</div>
            </a>
          `).join('');

        // Append after the "Your Story" button (never wipe it)
        scroll.insertAdjacentHTML('beforeend', html);
      } catch (err) {
        console.error('Story carousel error:', err);
        // On failure the "Your Story" button stays — no broken UI
      }
    }

    let currentHighlightZone = 'Darjeeling';

    async function loadZoneHighlights(zone) {
      try {
        const feed = document.getElementById('zone-highlights-feed');
        feed.innerHTML = '<div class="loading">Loading...</div>';
        
        // Get top 10 reels from this zone
        const res = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
          Query.equal('isDeleted', false),
          Query.equal('zone', zone),
          Query.orderDesc('uploadedAt'),
          Query.limit(10)
        ]);
        
        const reels = res.documents || [];
        
        if (reels.length === 0) {
          feed.innerHTML = '<div class="loading">No reels from this zone yet</div>';
          return;
        }
        
        // Score by popularity: views(0.4) + likes(0.3) + shares(0.3)
        const scored = reels.map(r => ({
          ...r,
          popularityScore: (r.views || 0) * 0.4 + (r.likes || 0) * 0.3 + (r.shares || 0) * 0.3
        })).sort((a, b) => b.popularityScore - a.popularityScore);
        
        // Show top 2
        const top2 = scored.slice(0, 2);
        feed.innerHTML = top2.map(reel => `
          <div class="zone-reel-card" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'">
            <video src="${reel.videoUrl}" muted playsinline preload="metadata" webkit-playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
            <div class="zone-reel-card-overlay">
              <div class="zone-reel-stats">❤️ ${reel.likes || 0} • 👁️ ${reel.views || 0}</div>
            </div>
          </div>
        `).join('');
        setTimeout(primeVideoThumbnails, 100);
      } catch (err) {
        console.error('Zone highlights error:', err);
        document.getElementById('zone-highlights-feed').innerHTML = '<div class="loading">Error loading</div>';
      }
    }

    function switchZoneHighlight(zone, evt) {
      currentHighlightZone = zone;
      document.querySelectorAll('.zone-highlight-tab').forEach(t => t.classList.remove('active'));
      if (evt && evt.target) evt.target.classList.add('active');
      loadZoneHighlights(zone);
    }

    function seeMoreZone() {
      filterByZone(currentHighlightZone, null);
    }

    async function filterByZone(zone, evt) {
      currentZone = zone;
      document.querySelectorAll('.zone-tab').forEach(tab => tab.classList.remove('active'));
      if (evt && evt.target) evt.target.classList.add('active');
      lastOffset = 0;
      isLoadingMore = false;
      
      if (currentFilter === 'trending') {
        loadTrendingFeed();
      } else {
        loadVideos();
      }
    }

    // iOS fix: force video to show first frame as thumbnail
    function primeVideoThumbnails() {
      document.querySelectorAll('.feed-video video, .zone-reel-card video').forEach(v => {
        if (v.dataset.primed) return;
        v.dataset.primed = '1';
        const seek = () => {
          try { if (v.currentTime < 0.1 && v.duration) v.currentTime = 0.1; } catch (e) {}
        };
        v.addEventListener('loadeddata', seek, { once: true });
        v.addEventListener('loadedmetadata', () => { try { v.currentTime = 0.1; } catch(e){} }, { once: true });
        // Kick the load (iOS sometimes needs an explicit nudge)
        try { v.load(); } catch (e) {}
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
  </script>
</body>
</html>
