<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaReels - Gorkha Stories, Global Reach</title>
  
  <!-- ✅ FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon/logo-3-minimalist-icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon/logo-3-minimalist-icon-16x16.png">
  <link rel="apple-touch-icon" href="/icons/favicon/logo-3-minimalist-icon-64x64.png">
  
  <!-- ✅ SOCIAL PREVIEW -->
  <meta property="og:title" content="GorkhaReels - Gorkha Stories, Global Reach">
  <meta property="og:description" content="Watch short videos from the Gorkha community. Upload, share, and earn money.">
  <meta property="og:image" content="/icons/hero/splash-screen-1200x1200.png">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0B5E6B">
  
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- 🚨 ERUDA BLOCKER - MUST BE FIRST -->
  <script>
    if (typeof window !== 'undefined') {
      window.eruda = null;
      window.Eruda = null;
      const origFetch = window.fetch;
      window.fetch = function(...args) {
        if (args[0] && args[0].includes && args[0].includes('eruda')) {
          return Promise.reject(new Error('Eruda blocked'));
        }
        return origFetch.apply(this, args);
      };
    }
  </script>
</head>
<body>
  <!-- 🚨 GLOBAL ERROR HANDLER -->
  <script>
    window.addEventListener('error', (e) => {
      console.error('❌ GLOBAL ERROR:', e.error || e.message);
      if (document.getElementById('feed')) {
        document.getElementById('feed').innerHTML = `
          <div style="padding:20px;color:#888;text-align:center;">
            <p>❌ Error loading feed: ${(e.error || e.message || 'Unknown error').substring(0, 100)}</p>
            <button onclick="location.reload()" style="padding:8px 16px;background:#0B5E6B;color:#fff;border:none;border-radius:6px;margin-top:10px;cursor:pointer;">Retry</button>
          </div>
        `;
      }
    });

    window.addEventListener('unhandledrejection', (e) => {
      console.error('❌ UNHANDLED PROMISE:', e.reason);
    });
  </script>

  <!-- ===== TEAL HEADER WITH WORDMARK ===== -->
  <header>
    <div class="header-logo">
      <!-- ✅ WORDMARK LOGO -->
      <img src="/icons/wordmark/logo-2-wordmark-300x300.png" alt="GorkhaReels">
      <div>
        <div class="header-logo-text">GorkhaReels</div>
        <div class="header-tagline">Gorkha Stories, Global Reach</div>
      </div>
    </div>

    <div class="header-actions">
      <button class="header-btn" onclick="window.location='search.html'" aria-label="Search">🔍</button>
      <button class="header-btn" id="open-drawer" aria-label="Menu">☰</button>
    </div>
  </header>

  <!-- ===== FEED ===== -->
  <div class="feed-container" id="feed">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="window.location='index.html'">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item nav-create">
      <div class="nav-create-btn" onclick="window.location='upload.html'">+</div>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item" onclick="window.location='creator-dashboard.html'">
      <span>👤</span>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- ===== APP DRAWER ===== -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <!-- ✅ WORDMARK LOGO -->
      <img src="/icons/wordmark/logo-2-wordmark-300x300.png" alt="GorkhaReels" style="height:36px;width:auto;">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html#edit'"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <!-- ===== POST MENU ===== -->
  <div class="post-menu-backdrop" id="post-menu-backdrop"></div>
  <div class="post-menu" id="post-menu">
    <div class="post-menu-items" id="post-menu-items"></div>
    <button class="post-menu-cancel" id="post-menu-cancel">Cancel</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    // ===== DRAWER CONTROLS =====
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-backdrop').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-backdrop').classList.remove('open');
    }

    document.getElementById('open-drawer').addEventListener('click', openDrawer);
    document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
    document.querySelectorAll('.drawer-item').forEach(item => {
      item.addEventListener('click', closeDrawer);
    });

    document.getElementById('drawer-logout').addEventListener('click', async () => {
      try {
        await session.logout();
      } catch (e) {}
      window.location = 'login.html';
    });

    // ===== FEED LOADING =====
    async function loadFeed() {
      const feed = document.getElementById('feed');
      try {
        console.log('📺 Loading feed...');
        feed.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

        if (!db) {
          throw new Error('Database not initialized');
        }

        const reels = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
          Query.equal('isDeleted', false),
          Query.orderDesc('uploadedAt'),
          Query.limit(20)
        ]);

        console.log('✅ Fetched', reels.documents.length, 'reels');
        feed.innerHTML = '';

        if (!reels.documents.length) {
          feed.innerHTML = '<div style="text-align:center;padding:40px;color:#888">📹 No reels yet. Be the first to upload!</div>';
          return;
        }

        for (const reel of reels.documents) {
          try {
            const creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, reel.creatorId);
            const likes = await db.list(APPWRITE_CONFIG.COLLECTIONS.LIKES, [
              Query.equal('reelId', reel.$id)
            ]);

            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
              <div class="post-header">
                <div class="creator-avatar">
                  <img src="${creator.profilePic || '/icons/primary/logo-1-app-icon-180x180.png'}" alt="${creator.name}" onerror="this.src='/icons/primary/logo-1-app-icon-180x180.png'">
                </div>
                <div class="creator-name">
                  ${escapeHtml(creator.name || 'Creator')}
                  ${creator.isVerified ? '<span class="verified-badge">✓</span>' : ''}
                </div>
                <button class="post-more" onclick="openPostMenu(event, '${reel.$id}')">⋯</button>
              </div>
              <div class="post-thumbnail" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'">
                <img src="${reel.thumbnail || '/icons/primary/logo-1-app-icon-180x180.png'}" alt="${reel.title}" onerror="this.src='/icons/primary/logo-1-app-icon-180x180.png'">
                <div class="play-icon">▶️</div>
              </div>
              <div class="post-title">${escapeHtml(reel.title || 'Untitled')}</div>
              <div class="post-actions">
                <button class="action-btn"><span class="action-icon">❤️</span> ${likes.total} Likes</button>
                <button class="action-btn" onclick="window.location.href='./video-modal.html?reelId=${reel.$id}'"><span class="action-icon">💬</span> Comments</button>
                <button class="action-btn"><span class="action-icon">👁️</span> ${reel.views || 0} Views</button>
              </div>
            `;
            feed.appendChild(post);
          } catch (err) {
            console.error('Error rendering reel:', reel.$id, err);
          }
        }
        console.log('✅ Feed loaded successfully');
      } catch (error) {
        console.error('❌ Feed load failed:', error);
        feed.innerHTML = `
          <div style="text-align:center;padding:40px;color:#888;">
            <p>❌ Failed to load feed</p>
            <p style="font-size:12px;margin-top:8px;color:#666;">${error.message || 'Unknown error'}</p>
            <button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#0B5E6B;color:#fff;border:none;border-radius:6px;cursor:pointer;">Retry</button>
          </div>
        `;
      }
    }

    function openPostMenu(e, reelId) {
      e.stopPropagation();
      const items = document.getElementById('post-menu-items');
      items.innerHTML = `
        <button class="post-menu-item" onclick="window.location='./video-modal.html?reelId=${reelId}'">▶️ Watch</button>
        <button class="post-menu-item" onclick="window.location='./creator-profile.html?userId=${reelId}'">👤 Creator</button>
        <button class="post-menu-item">🔗 Share</button>
      `;
      document.getElementById('post-menu-backdrop').classList.add('open');
      document.getElementById('post-menu').classList.add('open');
    }

    document.getElementById('post-menu-backdrop').addEventListener('click', () => {
      document.getElementById('post-menu-backdrop').classList.remove('open');
      document.getElementById('post-menu').classList.remove('open');
    });

    document.getElementById('post-menu-cancel').addEventListener('click', () => {
      document.getElementById('post-menu-backdrop').classList.remove('open');
      document.getElementById('post-menu').classList.remove('open');
    });

    document.addEventListener('DOMContentLoaded', async () => {
      console.log('🚀 Page loaded, initializing...');
      try {
        console.log('✅ Appwrite config loaded');
        console.log('✅ Session initialized');
        await loadFeed();
        console.log('✅ Feed initialization complete');
      } catch (err) {
        console.error('❌ Init error:', err);
      }
    });
  </script>
</body>
</html>
