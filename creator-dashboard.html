<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Dashboard - GorkhaReels</title>
  <meta name="description" content="Manage your GorkhaReels profile, track earnings, and grow your audience">
  <meta name="theme-color" content="#121212">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="shortcut icon" href="assets/logo.png">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Creator Dashboard - GorkhaReels">
  <meta property="og:description" content="Manage your creator profile and earnings">
  <meta property="og:image" content="assets/logo.png">
  <meta property="og:type" content="website">
  
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    .dashboard-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ===== PROFILE HEADER (Instagram-style) ===== */
    .profile-top {
      display: flex;
      align-items: center;
      gap: 24px;
      margin: 8px 0 16px;
    }

    .profile-avatar-lg {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-light);
      flex-shrink: 0;
    }

    .profile-stats-row {
      display: flex;
      flex: 1;
      justify-content: space-around;
    }

    .stat-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-lbl {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Name + Bio */
    .profile-identity {
      margin-bottom: 16px;
    }

    .profile-name-lg {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .profile-bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Action buttons */
    .profile-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .action-btn-secondary, .action-btn-primary {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .action-btn-secondary {
      background: var(--dark-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .action-btn-primary {
      background: var(--primary-red);
      color: #fff;
    }

    .action-btn-secondary:active, .action-btn-primary:active {
      opacity: 0.7;
    }

    /* ===== EARNINGS STRIP (compact) ===== */
    .earnings-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #1a1a1a 0%, #241a08 100%);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .earnings-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .earnings-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .earnings-amount {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-gold);
    }

    .withdraw-btn {
      background: var(--accent-gold);
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .withdraw-btn:active { opacity: 0.8; }

    /* ===== VIDEOS GRID ===== */
    .videos-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .videos-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    #my-reels-container {
      margin-bottom: 28px;
    }

    /* ===== SETTINGS LIST ===== */
    .settings-section {
      margin-bottom: 24px;
    }

    .settings-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .settings-list {
      background: var(--dark-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 16px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      text-align: left;
    }

    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: var(--dark-secondary); }

    .settings-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .settings-text {
      flex: 1;
      font-size: 15px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .settings-arrow {
      font-size: 22px;
      color: var(--text-tertiary);
      line-height: 1;
    }

    .settings-row-danger .settings-text { color: #ef4444; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <a href="/" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
      <img src="assets/logo.png" alt="GorkhaReels" style="height: 32px; width: auto;">
      <span class="header-logo">GorkhaReels</span>
    </a>
    <div style="flex: 1;"></div>
  </header>

  <!-- Dashboard Container -->
  <div class="dashboard-container">

    <!-- ===== PROFILE HEADER (Instagram-style) ===== -->
    <div class="profile-top">
      <img id="creator-avatar" src="assets/logo.png" alt="Profile" class="profile-avatar-lg">
      <div class="profile-stats-row">
        <div class="stat-cell">
          <span class="stat-num" id="total-reels">0</span>
          <span class="stat-lbl">Videos</span>
        </div>
        <div class="stat-cell">
          <span class="stat-num" id="followers-count">0</span>
          <span class="stat-lbl">Followers</span>
        </div>
        <div class="stat-cell">
          <span class="stat-num" id="total-views">0</span>
          <span class="stat-lbl">Views</span>
        </div>
      </div>
    </div>

    <!-- Name + Bio -->
    <div class="profile-identity">
      <div class="profile-name-lg" id="creator-name">Loading...</div>
      <div class="profile-bio" id="creator-bio">No bio yet</div>
    </div>

    <!-- Action Buttons -->
    <div class="profile-actions">
      <button class="action-btn-secondary" id="edit-profile-btn">Edit Profile</button>
      <button class="action-btn-primary" id="upload-btn">+ Upload</button>
    </div>

    <!-- ===== EARNINGS STRIP (compact) ===== -->
    <div class="earnings-strip">
      <div class="earnings-left">
        <span class="earnings-label">Total Earnings</span>
        <span class="earnings-amount" id="total-earnings">₹ 0.00</span>
      </div>
      <button class="withdraw-btn" id="withdraw-btn">Withdraw</button>
    </div>

    <!-- Hidden elements kept for dashboard.js compatibility -->
    <span id="ad-revenue" style="display:none;">₹ 0.00</span>
    <span id="tips-earnings" style="display:none;">₹ 0.00</span>
    <span id="sponsor-earnings" style="display:none;">₹ 0.00</span>
    <span id="total-views-perf" style="display:none;">0</span>

    <!-- ===== MY VIDEOS (grid - main content) ===== -->
    <div class="videos-header">
      <span class="videos-title">📹 My Videos</span>
    </div>
    <div id="my-reels-container">
      <div class="loading">
        <div class="spinner"></div>
        <p style="margin-left: 12px;">Loading your videos...</p>
      </div>
    </div>

    <!-- ===== ACCOUNT (tight settings list) ===== -->
    <div class="settings-section">
      <div class="settings-header">Account</div>
      <div class="settings-list">
        <button class="settings-row" id="change-password-btn">
          <span class="settings-icon">🔐</span>
          <span class="settings-text">Change Password</span>
          <span class="settings-arrow">›</span>
        </button>
        <button class="settings-row" id="bank-details-btn">
          <span class="settings-icon">🏦</span>
          <span class="settings-text">Bank Details</span>
          <span class="settings-arrow">›</span>
        </button>
        <button class="settings-row" id="guidelines-btn">
          <span class="settings-icon">📋</span>
          <span class="settings-text">Content Guidelines</span>
          <span class="settings-arrow">›</span>
        </button>
        <button class="settings-row" id="support-btn">
          <span class="settings-icon">📞</span>
          <span class="settings-text">Support</span>
          <span class="settings-arrow">›</span>
        </button>
        <button class="settings-row settings-row-danger" id="logout-btn">
          <span class="settings-icon">🚪</span>
          <span class="settings-text">Logout</span>
          <span class="settings-arrow">›</span>
        </button>
      </div>
    </div>

    <!-- Spacing for bottom nav -->
    <div style="height: 80px;"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='./index.html'">
      <span>🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="window.location.href='./index.html?trending'">
      <span>🔥</span>
      <span class="nav-label">Trending</span>
    </button>
    <button class="nav-item nav-create" onclick="window.location.href='./upload.html'">
      <span class="nav-create-btn">+</span>
      <span class="nav-label">Create</span>
    </button>
    <button class="nav-item active">
      <span>👤</span>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
