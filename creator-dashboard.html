<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Creator Dashboard - GorkhaReels</title>
  <meta name="theme-color" content="#0B5E6B">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    :root {
      --dark-bg: #0f0f0f;
      --dark-card: #1a1a1a;
      --dark-secondary: #2d2d2d;
      --border-color: #2d2d2d;
      --text-primary: #fff;
      --text-secondary: #888;
      --primary-teal: #0B5E6B;
      --primary-red: #dc2626;
    }

    .container { max-width: 600px; margin: 0 auto; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 16px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); object-fit: cover; }
    .header-title { font-size: 20px; font-weight: 900; font-family: 'Space Grotesk', sans-serif; }
    .back-btn { background: rgba(255,255,255,0.18); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .back-btn:active { background: rgba(255,255,255,0.28); }

    /* Content */
    .content { padding: 16px; margin-bottom: 80px; }

    /* Profile Header */
    .profile-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 60px;
      background: #0B5E6B;
      object-fit: cover;
      margin: 0 auto 16px;
      border: 4px solid #0D7377;
    }
    .profile-name {
      font-size: 24px;
      font-weight: 900;
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 4px;
    }
    .profile-bio {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 16px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-item {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 700; color: #0B5E6B; margin-bottom: 6px; }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Action Buttons Grid */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      border: none;
      color: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-height: 80px;
      justify-content: center;
    }
    .btn:active { transform: scale(0.94); }
    .btn.secondary {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
    }
    .btn-icon { font-size: 24px; }
    .btn-text { font-size: 12px; font-weight: 600; }

    /* Section Title */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      margin: 24px 0 12px 0;
      color: #fff;
    }

    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-bottom: 24px;
    }
    .video-card {
      position: relative;
      aspect-ratio: 9/16;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
    }
    .video-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #2d2d2d;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
    }
    .video-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 11px;
      color: #fff;
      font-weight: 600;
    }
    .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .delete-btn:hover { background: rgba(220,38,38,0.8); }

    /* Loading */
    .loading { text-align: center; padding: 40px 20px; color: #888; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d2d2d; border-top-color: #0B5E6B; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      flex: 1;
      padding: 10px;
      font-size: 18px;
    }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* Footer Section */
    .footer-section {
      margin-top: 48px;
      padding-top: 24px;
      padding-bottom: 24px;
      border-top: 1px solid #2d2d2d;
    }
    .footer-divider {
      height: 1px;
      background: #2d2d2d;
      margin-bottom: 16px;
    }
    .footer-content {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logout-btn {
      background: none;
      border: 1px solid #2d2d2d;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:active {
      background: rgba(220,38,38,0.1);
      border-color: #dc2626;
      color: #dc2626;
    }
    .footer-link {
      font-size: 12px;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    .footer-link:hover {
      color: #0B5E6B;
    }
    .footer-link::after {
      content: ' •';
      margin-left: 12px;
      color: #2d2d2d;
    }
    .footer-link:last-of-type::after {
      content: '';
      margin-left: 0;
    }
    .footer-copyright {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 12px;
    }
    .footer-copyright p {
      margin: 0;
    }

    /* Options Sheet Styles */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 40;
      display: none;
      animation: fadeIn 0.25s ease;
    }
    .sheet-backdrop.open {
      display: block;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      z-index: 50;
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }
    .sheet.open {
      transform: translateY(0);
    }

    .sheet-head {
      padding: 16px;
      border-bottom: 1px solid #2d2d2d;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      color: #fff;
    }

    .sheet-buttons {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sheet-btn {
      padding: 14px;
      background: #0B5E6B;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .sheet-btn:active {
      transform: scale(0.95);
    }

    .sheet-btn.delete {
      background: #dc2626;
    }

    .sheet-btn.cancel {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="">
      <div class="header-title">Profile</div>
    </div>
    <button class="back-btn" onclick="window.location='index.html'">✕</button>
  </div>

  <div class="container">
    <div class="content">
      <!-- Profile Header -->
      <div class="profile-header">
        <img class="profile-pic" id="creator-avatar" src="" alt="Profile" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'">
        <div class="profile-name" id="creator-name">Loading...</div>
        <div class="profile-bio" id="creator-bio"></div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="total-reels">0</div>
          <div class="stat-label">Videos</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="followers-count">0</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="total-views">0</div>
          <div class="stat-label">Views</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn" id="upload-btn" onclick="window.location='upload.html'">
          <div class="btn-icon">➕</div>
          <div class="btn-text">Upload</div>
        </button>
        <button class="btn" id="edit-profile-btn">
          <div class="btn-icon">✏️</div>
          <div class="btn-text">Edit</div>
        </button>
        <button class="btn" onclick="window.location='creator-hub.html'">
          <div class="btn-icon">🏦</div>
          <div class="btn-text">Creator Hub</div>
        </button>
        <button class="btn" onclick="window.location='creator-analytics.html'">
          <div class="btn-icon">📊</div>
          <div class="btn-text">Analytics</div>
        </button>
      </div>

      <!-- My Videos -->
      <div class="section-title">🎬 My Videos</div>
      <div id="my-reels-container">
        <div class="loading"><div class="spinner"></div></div>
      </div>

      <!-- Footer Section -->
      <div class="footer-section">
        <div class="footer-divider"></div>
        <div class="footer-content">
          <button id="logout-btn" class="footer-btn logout-btn">🚪 Logout</button>
          <a href="#" class="footer-link">Terms & Conditions</a>
          <a href="#" class="footer-link">About Us</a>
          <a href="#" class="footer-link">Contact Us</a>
        </div>
        <div class="footer-copyright">
          <p>&copy; 2024 GorkhaReels. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Options Sheet -->
  <div class="sheet-backdrop" id="reel-options-backdrop"></div>
  <div class="sheet" id="reel-options-sheet">
    <div class="sheet-head">🎬 Video Options</div>
    <div class="sheet-buttons">
      <button id="opt-edit" class="sheet-btn">✏️ Edit Video</button>
      <button id="opt-reshare" class="sheet-btn">🔄 Reshare</button>
      <button id="opt-delete" class="sheet-btn delete">🤮 Delete</button>
      <button id="opt-cancel" class="sheet-btn cancel">Cancel</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='upload.html'"><span>➕</span><span class="nav-label">Create</span></button>
    <button class="nav-btn" onclick="window.location='messages.html'"><span>💬</span><span class="nav-label">Chat</span></button>
    <button class="nav-btn active"><span>👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
