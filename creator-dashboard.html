<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Creator Dashboard - GorkhaReels</title>
  <meta name="theme-color" content="#0B5E6B">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    .container { max-width: 600px; margin: 0 auto; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 16px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); object-fit: cover; }
    .header-title { font-size: 20px; font-weight: 900; font-family: 'Space Grotesk', sans-serif; }
    .back-btn { background: rgba(255,255,255,0.18); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .back-btn:active { background: rgba(255,255,255,0.28); }

    /* Content */
    .content { padding: 16px; margin-bottom: 80px; }

    /* Card */
    .card {
      background: linear-gradient(135deg, #1a1a1a, #0d2d3a);
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card-title { font-size: 14px; font-weight: 700; color: #0B5E6B; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-item {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #0B5E6B; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Profile Header */
    .profile-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 60px;
      background: #0B5E6B;
      object-fit: cover;
      margin: 0 auto 16px;
      border: 4px solid #0D7377;
    }
    .profile-name {
      font-size: 24px;
      font-weight: 900;
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 4px;
    }
    .profile-category {
      display: inline-block;
      background: #0B5E6B;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .profile-bio {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 16px;
    }

    /* Action Buttons Grid */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      border: none;
      color: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-height: 80px;
      justify-content: center;
    }
    .btn:active { transform: scale(0.94); }
    .btn.secondary {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
    }
    .btn-icon { font-size: 24px; }
    .btn-text { font-size: 12px; font-weight: 600; }

    /* Section Title */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      margin: 24px 0 12px 0;
      color: #fff;
    }

    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .video-card {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    .video-thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background: #2d2d2d;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
    }
    .video-info {
      padding: 8px;
      font-size: 11px;
      color: #888;
    }

    /* Loading */
    .loading { text-align: center; padding: 40px 20px; color: #888; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d2d2d; border-top-color: #0B5E6B; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      flex: 1;
      padding: 10px;
      font-size: 18px;
    }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="header-logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="">
      <div class="header-title">Profile</div>
    </div>
    <button class="back-btn" onclick="window.location='index.html'">✕</button>
  </div>

  <div class="container">
    <div class="content">
      <!-- Profile Header -->
      <div class="profile-header" id="profile-header">
        <img class="profile-pic" id="profile-pic" src="" alt="Profile" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'">
        <div class="profile-name" id="profile-name">Loading...</div>
        <div class="profile-category" id="profile-category"></div>
        <div class="profile-bio" id="profile-bio"></div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="video-count">0</div>
          <div class="stat-label">Videos</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="follower-count">0</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="view-count">0</div>
          <div class="stat-label">Views</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn" onclick="window.location='upload.html'" title="Upload a new video">
          <div class="btn-icon">➕</div>
          <div class="btn-text">Upload</div>
        </button>
        <button class="btn" onclick="editProfile()" title="Edit your profile">
          <div class="btn-icon">✏️</div>
          <div class="btn-text">Edit</div>
        </button>
        <button class="btn" onclick="window.location='creator-hub.html'" title="Manage earnings and settings">
          <div class="btn-icon">🎛️</div>
          <div class="btn-text">Creator Hub</div>
        </button>
        <button class="btn" onclick="window.location='creator-analytics.html'" title="View analytics and performance">
          <div class="btn-icon">📊</div>
          <div class="btn-text">Analytics</div>
        </button>
      </div>

      <!-- My Videos -->
      <div class="section-title">🎬 My Videos</div>
      <div id="videos-container">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'"><span>🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="window.location='upload.html'"><span>➕</span><span class="nav-label">Create</span></button>
    <button class="nav-btn" onclick="window.location='messages.html'"><span>💬</span><span class="nav-label">Chat</span></button>
    <button class="nav-btn active"><span>👤</span><span class="nav-label">Profile</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    const C = APPWRITE_CONFIG.COLLECTIONS;

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function init() {
      await session.refresh();
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      await loadProfile();
    }

    async function loadProfile() {
      try {
        const uid = session.getUserId();
        const creator = await db.get(C.CREATORS, uid);

        // Profile info
        document.getElementById('profile-pic').src = creator.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png';
        document.getElementById('profile-name').textContent = creator.name || 'Creator';
        document.getElementById('profile-category').textContent = creator.category || 'No category';
        document.getElementById('profile-bio').textContent = creator.bio || '';

        // Stats
        document.getElementById('video-count').textContent = (creator.videos || 0).toLocaleString();
        document.getElementById('follower-count').textContent = (creator.followers || 0).toLocaleString();
        document.getElementById('view-count').textContent = (creator.totalViews || 0).toLocaleString();

        // Load videos
        await loadVideos();

      } catch (e) {
        console.error('Profile load error:', e);
        document.getElementById('profile-header').innerHTML = '<p style="color: #888;">Error loading profile</p>';
      }
    }

    async function loadVideos() {
      try {
        const uid = session.getUserId();
        const reelsRes = await db.list(C.REELS, [
          Query.equal('creatorId', uid),
          Query.equal('isDeleted', false),
          Query.limit(20)
        ]);

        const reels = reelsRes.documents || [];

        if (reels.length === 0) {
          document.getElementById('videos-container').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🎬</div>
              <p>No videos yet</p>
              <p style="font-size: 12px; margin-top: 8px;">Upload your first video to get started</p>
            </div>
          `;
          return;
        }

        const videosHtml = reels.map(reel => `
          <div class="video-card" onclick="window.location='video-modal.html?id=${reel.$id}'">
            <div style="position: relative;">
              <img class="video-thumb" src="${reel.thumbnail || '/logo-suite/primary/logo-khukuri-256x256.png'}" alt="" onerror="this.src='/logo-suite/primary/logo-khukuri-256x256.png'">
              <div class="video-overlay">▶️</div>
            </div>
            <div class="video-info">
              <div style="margin-bottom: 4px;">👁️ ${(reel.views || 0).toLocaleString()}</div>
              <div>❤️ ${(reel.likes || 0).toLocaleString()}</div>
            </div>
          </div>
        `).join('');

        document.getElementById('videos-container').innerHTML = `<div class="video-grid">${videosHtml}</div>`;

      } catch (e) {
        console.error('Videos load error:', e);
        document.getElementById('videos-container').innerHTML = '<p style="color: #888; text-align: center;">Error loading videos</p>';
      }
    }

    function editProfile() {
      alert('Edit profile feature coming soon!');
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
