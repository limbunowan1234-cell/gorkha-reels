<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Dashboard - GorkhaReels</title>
  <meta name="description" content="Manage your GorkhaReels profile, track earnings, and grow your audience">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="icon" type="image/png" href="/logo-suite/favicon/logo-khukuri-32x32.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }

    /* ===== BRAND BANNER (pinned) ===== */
    .banner {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    .banner-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .banner-logo { width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0; background: rgba(255,255,255,0.15); object-fit: cover; }
    .banner-text { min-width: 0; }
    .banner-title { font-size: 19px; font-weight: 800; letter-spacing: 0.3px; line-height: 1.1; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.25); }
    .banner-tagline { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.9); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .banner-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .banner-btn {
      width: 38px; height: 38px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.18); color: #fff; font-size: 19px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .banner-btn:active { background: rgba(255,255,255,0.3); }

    .dashboard-container { max-width: 600px; margin: 0 auto; padding: 16px; margin-bottom: 90px; }

    .profile-top {
      display: flex; align-items: center; gap: 24px; margin: 8px 0 16px;
    }
    .profile-avatar-lg {
      width: 86px; height: 86px; border-radius: 50%; object-fit: cover;
      border: 2px solid #2d2d2d; flex-shrink: 0;
    }
    .profile-stats-row {
      display: flex; flex: 1; justify-content: space-around;
    }
    .stat-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-num { font-size: 20px; font-weight: 700; }
    .stat-lbl { font-size: 13px; color: #888; }

    .profile-identity { margin-bottom: 16px; }
    .profile-name-lg { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .verified-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; background: #0284c7; border-radius: 50%;
      color: #fff; font-size: 10px; margin-left: 4px; vertical-align: middle;
    }
    .profile-bio { font-size: 14px; color: #888; line-height: 1.4; }

    .profile-actions { display: flex; gap: 8px; margin-bottom: 24px; }
    .action-btn-secondary, .action-btn-primary {
      flex: 1; padding: 9px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .action-btn-secondary {
      background: #1a1a1a; color: #fff; border: 1px solid #2d2d2d;
    }
    .action-btn-primary {
      background: #0B5E6B; color: #fff;
    }
    .action-btn-secondary:active, .action-btn-primary:active { opacity: 0.7; }

    .earnings-strip {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, #1a1a1a, #20190c);
      border: 1px solid #2d2d2d; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 24px;
    }
    .earnings-left { display: flex; flex-direction: column; gap: 2px; }
    .earnings-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .earnings-amount { font-size: 22px; font-weight: 700; color: #D4A574; }
    .withdraw-btn {
      background: #D4A574; color: #0f0f0f; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .withdraw-btn:active { opacity: 0.8; }

    .videos-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .videos-title { font-size: 16px; font-weight: 700; }

    .videos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; }
    .video-thumb {
      position: relative; aspect-ratio: 9/16; background: #1a1a1a;
      cursor: pointer; overflow: hidden;
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-more {
      position: absolute; top: 6px; right: 6px; width: 32px; height: 32px;
      background: rgba(0,0,0,0.6); border: none; color: #fff; border-radius: 50%;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .video-more:active { background: rgba(0,0,0,0.8); }
    .video-views {
      position: absolute; bottom: 6px; left: 6px; font-size: 12px; color: white;
      background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px;
    }

    .empty-state { text-align: center; padding: 40px 20px; color: #888; }

    /* ===== Video menu ===== */
    .video-menu-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: none; }
    .video-menu-backdrop.open { display: block; }
    .video-menu {
      position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 310;
      max-width: 476px; margin: 0 auto; transform: translateY(140%);
      transition: transform 0.25s ease;
    }
    .video-menu.open { transform: translateY(0); }
    .video-menu-items { background: #1c1c1e; border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
    .video-menu-item {
      width: 100%; padding: 16px; background: none; border: none; color: #fff;
      font-size: 15px; cursor: pointer; text-align: left; border-bottom: 1px solid #2c2c2e;
    }
    .video-menu-item:last-child { border-bottom: none; }
    .video-menu-item.danger { color: #ff453a; }
    .video-menu-cancel {
      width: 100%; padding: 16px; background: #1c1c1e; border: none; border-radius: 14px;
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ===== BOTTOM BAR: 3 main buttons ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; border-top: 1px solid #2d2d2d;
      display: flex; justify-content: space-around; align-items: center;
      padding: 8px 0; z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: #666; cursor: pointer;
      flex: 1; padding: 10px; font-size: 18px;
    }
    .nav-btn.active { color: #0B5E6B; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* ===== App drawer ===== */
    .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .drawer-backdrop.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 80%; max-width: 320px;
      background: #161616; z-index: 160; transform: translateX(100%);
      transition: transform 0.25s ease; display: flex; flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      background: linear-gradient(135deg, #0B5E6B, #0D7377);
      padding: 20px 16px; display: flex; align-items: center; gap: 12px;
    }
    .drawer-head img { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); }
    .drawer-head .dh-title { font-size: 16px; font-weight: 800; }
    .drawer-head .dh-sub { font-size: 11px; color: rgba(255,255,255,0.9); }
    .drawer-items { flex: 1; overflow-y: auto; padding: 8px 0; }
    .drawer-item {
      width: 100%; display: flex; align-items: center; gap: 14px;
      padding: 15px 18px; background: none; border: none; color: #fff;
      font-size: 15px; cursor: pointer; text-align: left;
    }
    .drawer-item:active { background: #222; }
    .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
    .drawer-sep { height: 1px; background: #262626; margin: 6px 18px; }
    .drawer-item-danger { color: #ef4444; }

    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 200px; gap: 12px;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #2d2d2d;
      border-top-color: #0B5E6B; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- ===== BRAND BANNER ===== -->
  <header class="banner">
    <div class="banner-left">
      <img class="banner-logo" src="/logo-suite/primary/logo-khukuri-256x256.png" alt="GorkhaReels">
      <div class="banner-text">
        <div class="banner-title">GorkhaReels</div>
        <div class="banner-tagline">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="banner-right">
      <button class="banner-btn" onclick="window.location='search.html'" aria-label="Search">🔍</button>
      <button class="banner-btn" id="open-drawer" aria-label="Menu">☰</button>
    </div>
  </header>

  <div class="dashboard-container">
    <!-- Profile Header -->
    <div class="profile-top">
      <img id="creator-avatar" src="/logo-suite/primary/logo-khukuri-512x512.png" alt="Profile" class="profile-avatar-lg">
      <div class="profile-stats-row">
        <div class="stat-cell">
          <span class="stat-num" id="total-reels">0</span>
          <span class="stat-lbl">Videos</span>
        </div>
        <div class="stat-cell">
          <span class="stat-num" id="followers-count">0</span>
          <span class="stat-lbl">Followers</span>
        </div>
        <div class="stat-cell">
          <span class="stat-num" id="total-views">0</span>
          <span class="stat-lbl">Views</span>
        </div>
      </div>
    </div>

    <!-- Name + Bio -->
    <div class="profile-identity">
      <div class="profile-name-lg" id="creator-name">Loading...</div>
      <div class="profile-bio" id="creator-bio">No bio yet</div>
    </div>

    <!-- Action Buttons -->
    <div class="profile-actions">
      <button class="action-btn-secondary" id="edit-profile-btn">Edit Profile</button>
      <button class="action-btn-primary" id="upload-btn">+ Upload</button>
    </div>

    <!-- Earnings -->
    <div class="earnings-strip">
      <div class="earnings-left">
        <span class="earnings-label">Total Earnings</span>
        <span class="earnings-amount" id="total-earnings">₹ 0.00</span>
      </div>
      <button class="withdraw-btn" id="withdraw-btn">Withdraw</button>
    </div>

    <!-- My Videos -->
    <div class="videos-header">
      <span class="videos-title">📹 My Videos</span>
    </div>
    <div id="my-reels-container">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Video menu -->
  <div class="video-menu-backdrop" id="video-menu-backdrop"></div>
  <div class="video-menu" id="video-menu">
    <div class="video-menu-items" id="video-menu-items"></div>
    <button class="video-menu-cancel" id="video-menu-cancel">Cancel</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location='index.html'">
      <span>🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="window.location='upload.html'">
      <span>＋</span><span class="nav-label">Create</span>
    </button>
    <button class="nav-btn active">
      <span>👤</span><span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- App drawer -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <img src="/logo-suite/primary/logo-khukuri-256x256.png" alt="">
      <div>
        <div class="dh-title">GorkhaReels</div>
        <div class="dh-sub">Gorkha Stories, Global Reach</div>
      </div>
    </div>
    <div class="drawer-items">
      <button class="drawer-item" onclick="window.location='index.html'"><span class="di-icon">🏠</span> Home</button>
      <button class="drawer-item" onclick="window.location='trending.html'"><span class="di-icon">🔥</span> Trending</button>
      <button class="drawer-item" onclick="window.location='creator-dashboard.html'"><span class="di-icon">👤</span> My Profile</button>
      <button class="drawer-item" id="edit-profile-drawer"><span class="di-icon">✏️</span> Edit Profile</button>
      <div class="drawer-sep"></div>
      <button class="drawer-item drawer-item-danger" id="drawer-logout"><span class="di-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script>
    let REELS = [];
    let CURRENT_REEL = null;

    // Returns a safe <img> src for a reel thumbnail. If extraction failed
    // and `thumbnail` ended up being the raw video file (a known fallback
    // in upload.js), this avoids handing a video URL to an <img> tag.
    function getThumbSrc(reel) {
      const t = reel && reel.thumbnail;
      const fallback = '/logo-suite/primary/logo-khukuri-512x512.png';
      if (!t) return fallback;
      if (/\.(mp4|mov|webm|m4v)(\?|$)/i.test(t)) return fallback;
      return t;
    }

    async function init() {
      await session.refresh();
      if (!session.isLoggedIn()) { window.location = 'login.html'; return; }
      setupUI();
      await loadDashboard();
    }

    function setupUI() {
      const open = () => { document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-backdrop').classList.add('open'); };
      const close = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-backdrop').classList.remove('open'); };
      document.getElementById('open-drawer').onclick = open;
      document.getElementById('drawer-backdrop').onclick = close;
      document.querySelectorAll('.drawer-item').forEach(btn => btn.addEventListener('click', close));
      document.getElementById('drawer-logout').onclick = async () => {
        try { await session.logout(); } catch (e) {}
        window.location = 'login.html';
      };
      document.getElementById('edit-profile-btn').onclick = () => alert('Edit profile coming soon');
      document.getElementById('upload-btn').onclick = () => window.location = 'upload.html';
      document.getElementById('withdraw-btn').onclick = () => alert('Withdraw coming soon');
      document.getElementById('edit-profile-drawer').onclick = () => alert('Edit profile coming soon');
      document.getElementById('video-menu-cancel').onclick = closeVideoMenu;
      document.getElementById('video-menu-backdrop').onclick = closeVideoMenu;
    }

    async function loadDashboard() {
      try {
        const uid = session.getUserId();
        const creator = await db.get(APPWRITE_CONFIG.COLLECTIONS.CREATORS, uid);
        document.getElementById('creator-name').innerHTML = escapeHtml(creator.name || 'Creator') +
          (creator.isVerified ? ' <span class="verified-badge">✓</span>' : '');
        document.getElementById('creator-bio').textContent = creator.bio || 'No bio yet';
        document.getElementById('creator-avatar').src = creator.profilePic || '/logo-suite/primary/logo-khukuri-512x512.png';

        const followers = await db.list(APPWRITE_CONFIG.COLLECTIONS.FOLLOWERS, [Query.equal('followingId', uid)]);
        document.getElementById('followers-count').textContent = followers.total;

        const reels = await db.list(APPWRITE_CONFIG.COLLECTIONS.REELS, [
          Query.equal('creatorId', uid),
          Query.equal('isDeleted', false),
          Query.orderDesc('uploadedAt'),
          Query.limit(50)
        ]);
        REELS = reels.documents;
        document.getElementById('total-reels').textContent = reels.documents.length;

        const totalViews = reels.documents.reduce((s, r) => s + (r.views || 0), 0);
        document.getElementById('total-views').textContent = totalViews;
        document.getElementById('total-earnings').textContent = '₹ 0.00';

        if (!reels.documents.length) {
          document.getElementById('my-reels-container').innerHTML = '<div class="empty-state">No videos yet. Start uploading!</div>';
          return;
        }

        const grid = document.createElement('div');
        grid.className = 'videos-grid';
        reels.documents.forEach(reel => {
          const thumb = document.createElement('div');
          thumb.className = 'video-thumb';
          thumb.innerHTML = `
            <img src="${getThumbSrc(reel)}" onerror="this.src='/logo-suite/primary/logo-khukuri-512x512.png'">
            <button class="video-more" onclick="openVideoMenu(event, '${reel.$id}')">⋯</button>
            <div class="video-views">👁️ ${reel.views || 0}</div>
          `;
          thumb.onclick = (e) => { if (e.target.classList.contains('video-more')) return; window.location = `video-modal.html?reelId=${reel.$id}`; };
          grid.appendChild(thumb);
        });
        document.getElementById('my-reels-container').innerHTML = '';
        document.getElementById('my-reels-container').appendChild(grid);
      } catch (err) {
        console.error('Dashboard load failed:', err);
        document.getElementById('my-reels-container').innerHTML = '<div class="empty-state">Error loading dashboard</div>';
      }
    }

    function openVideoMenu(e, reelId) {
      e.stopPropagation();
      CURRENT_REEL = REELS.find(r => r.$id === reelId);
      if (!CURRENT_REEL) return;

      const items = document.getElementById('video-menu-items');
      items.innerHTML = '';

      const add = (label, handler, danger) => {
        const b = document.createElement('button');
        b.className = 'video-menu-item' + (danger ? ' danger' : '');
        b.textContent = label;
        b.onclick = () => { closeVideoMenu(); handler(); };
        items.appendChild(b);
      };

      add('✏️ Edit', () => window.location = `video-modal.html?reelId=${CURRENT_REEL.$id}`);
      add('🗑️ Delete', () => deleteVideo(CURRENT_REEL), true);

      document.getElementById('video-menu-backdrop').classList.add('open');
      document.getElementById('video-menu').classList.add('open');
    }

    function closeVideoMenu() {
      document.getElementById('video-menu-backdrop').classList.remove('open');
      document.getElementById('video-menu').classList.remove('open');
    }

    async function deleteVideo(reel) {
      if (!confirm('Delete this reel? This cannot be undone easily.')) return;
      try {
        await db.update(APPWRITE_CONFIG.COLLECTIONS.REELS, reel.$id, { isDeleted: true });
        REELS = REELS.filter(r => r.$id !== reel.$id);
        await loadDashboard();
      } catch (e) {
        console.error('Delete failed:', e);
        alert('Could not delete');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
