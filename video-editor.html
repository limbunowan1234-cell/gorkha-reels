<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Video - GorkhaReels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; }
    
    .header {
      background: #1a1a1a;
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 120px;
    }
    
    .video-box {
      width: 100%;
      aspect-ratio: 9/16;
      background: #000;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      border: 2px solid #dc2626;
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    
    .tools {
      background: #1a1a1a;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    
    .tabs {
      display: flex;
      border-bottom: 1px solid #333;
      overflow-x: auto;
      background: #111;
    }
    
    .tab {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      min-width: 70px;
    }
    
    .tab.active {
      color: #dc2626;
      border-bottom-color: #dc2626;
    }
    
    .tab:hover {
      color: #fff;
    }
    
    .tool-pane {
      display: none;
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .tool-pane.active {
      display: block;
    }
    
    .slider-group {
      margin-bottom: 16px;
    }
    
    .slider-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
    }
    
    .slider-label-name {
      font-weight: 600;
    }
    
    .slider-label-value {
      color: #fbbf24;
      font-weight: 600;
      background: rgba(251, 191, 36, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }
    
    input[type="range"] {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #dc2626;
      border-radius: 50%;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #dc2626;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .btn-preset {
      padding: 10px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: #fbbf24;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    
    .btn-preset:active {
      background: rgba(251, 191, 36, 0.2);
    }
    
    .actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 12px 16px;
      border-top: 1px solid #333;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    
    .btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      text-transform: uppercase;
    }
    
    .btn-secondary {
      background: #333;
      color: #fff;
    }
    
    .btn-secondary:active {
      background: #444;
    }
    
    .btn-primary {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      color: white;
    }
    
    .btn-primary:active {
      opacity: 0.8;
    }
    
    .info {
      font-size: 11px;
      color: #999;
      margin: 12px 0;
      line-height: 1.6;
    }
    
    @media (max-width: 480px) {
      .container { padding: 12px; }
      .tab { font-size: 10px; padding: 10px 6px; }
      .tool-pane { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>✨ Edit Video</h1>
  </div>
  
  <div class="container">
    <div class="video-box">
      <video id="video" playsinline controls style="display:block;"></video>
    </div>
    
    <div class="tools">
      <div class="tabs">
        <button class="tab active" data-tab="trim">✂️ Trim</button>
        <button class="tab" data-tab="filters">🎨 Filters</button>
        <button class="tab" data-tab="text">📝 Text</button>
        <button class="tab" data-tab="speed">⚡ Speed</button>
        <button class="tab" data-tab="rotate">🔄 Rotate</button>
      </div>
      
      <!-- TRIM -->
      <div class="tool-pane active" data-pane="trim">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Timeline</span>
            <span class="slider-label-value" id="trim-time">0:00 - 0:20</span>
          </div>
          <input type="range" id="trim-slider" min="0" max="100" value="0">
        </div>
        <div class="info">💡 Drag slider or click presets below</div>
        <div class="btn-group">
          <button class="btn-preset" onclick="window.editor.quickTrim(5)">5s</button>
          <button class="btn-preset" onclick="window.editor.quickTrim(15)">15s</button>
          <button class="btn-preset" onclick="window.editor.quickTrim(30)">30s</button>
          <button class="btn-preset" onclick="window.editor.quickTrim(60)">1:00</button>
        </div>
      </div>
      
      <!-- FILTERS -->
      <div class="tool-pane" data-pane="filters">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Brightness</span>
            <span class="slider-label-value" id="brightness-val">100%</span>
          </div>
          <input type="range" id="brightness" min="50" max="150" value="100">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Contrast</span>
            <span class="slider-label-value" id="contrast-val">100%</span>
          </div>
          <input type="range" id="contrast" min="50" max="150" value="100">
        </div>
        <div class="info">🎨 Adjust image properties</div>
      </div>
      
      <!-- TEXT -->
      <div class="tool-pane" data-pane="text">
        <input type="text" id="text-input" placeholder="Add text..." style="width:100%;padding:8px;margin-bottom:8px;background:#333;border:none;color:#fff;border-radius:6px;">
        <button class="btn-preset" style="width:100%;background:#dc2626;color:#fff;border:none;" onclick="window.editor.addText()">+ Add Text</button>
        <div class="info" style="margin-top:12px;">📝 Type and click to add</div>
      </div>
      
      <!-- SPEED -->
      <div class="tool-pane" data-pane="speed">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Speed</span>
            <span class="slider-label-value" id="speed-val">1.0x</span>
          </div>
          <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="btn-group">
          <button class="btn-preset" onclick="document.getElementById('speed').value=0.5;window.editor.updateSpeed()">0.5x</button>
          <button class="btn-preset" onclick="document.getElementById('speed').value=1;window.editor.updateSpeed()">1x</button>
          <button class="btn-preset" onclick="document.getElementById('speed').value=1.5;window.editor.updateSpeed()">1.5x</button>
          <button class="btn-preset" onclick="document.getElementById('speed').value=2;window.editor.updateSpeed()">2x</button>
        </div>
      </div>
      
      <!-- ROTATE -->
      <div class="tool-pane" data-pane="rotate">
        <div class="btn-group">
          <button class="btn-preset" onclick="alert('Rotate 90°')">🔄 Rotate</button>
          <button class="btn-preset" onclick="alert('Flip Horizontal')">↔️ Flip H</button>
          <button class="btn-preset" onclick="alert('Flip Vertical')">↕️ Flip V</button>
          <button class="btn-preset" onclick="alert('Reset')">↩️ Reset</button>
        </div>
        <div class="info">🔄 Transform video</div>
      </div>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-secondary" onclick="window.editor.skip()">Skip Editing</button>
    <button class="btn btn-primary" onclick="window.editor.continue()">✓ Continue</button>
  </div>

  <script>
    class Editor {
      constructor() {
        this.duration = 0;
        this.trimStart = 0;
        this.trimEnd = 0;
        this.load();
        this.bindTabs();
        this.bindInputs();
      }
      
      load() {
        const data = localStorage.getItem('editorVideoData');
        if (!data) {
          window.location.href = './upload.html';
          return;
        }
        
        const binary = atob(data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        
        const blob = new Blob([bytes], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        
        const video = document.getElementById('video');
        video.src = url;
        
        video.addEventListener('loadedmetadata', () => {
          this.duration = Math.floor(video.duration);
          this.trimEnd = this.duration;
          document.getElementById('trim-time').textContent = `0:00 - ${this.formatTime(this.duration)}`;
        });
      }
      
      bindTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tool-pane').forEach(p => p.classList.remove('active'));
            
            tab.classList.add('active');
            const pane = document.querySelector(`[data-pane="${tab.dataset.tab}"]`);
            if (pane) pane.classList.add('active');
          });
        });
      }
      
      bindInputs() {
        document.getElementById('trim-slider').addEventListener('input', () => this.updateTrim());
        document.getElementById('brightness').addEventListener('input', (e) => {
          document.getElementById('brightness-val').textContent = e.target.value + '%';
        });
        document.getElementById('contrast').addEventListener('input', (e) => {
          document.getElementById('contrast-val').textContent = e.target.value + '%';
        });
        document.getElementById('speed').addEventListener('input', () => this.updateSpeed());
      }
      
      updateTrim() {
        const slider = document.getElementById('trim-slider');
        const pct = slider.value / 100;
        const time = pct * this.duration;
        document.getElementById('video').currentTime = time;
      }
      
      quickTrim(seconds) {
        this.trimEnd = Math.min(seconds, this.duration);
        document.getElementById('trim-time').textContent = `0:00 - ${this.formatTime(this.trimEnd)}`;
      }
      
      updateSpeed() {
        const speed = document.getElementById('speed').value;
        document.getElementById('speed-val').textContent = speed + 'x';
        document.getElementById('video').playbackRate = speed;
      }
      
      addText() {
        const text = document.getElementById('text-input').value;
        if (text) {
          alert('Text added: ' + text);
          document.getElementById('text-input').value = '';
        }
      }
      
      formatTime(s) {
        const m = Math.floor(s / 60);
        const ss = Math.floor(s % 60);
        return `${m}:${ss.toString().padStart(2, '0')}`;
      }
      
      skip() {
        localStorage.removeItem('editorVideoData');
        window.location.href = './upload.html';
      }
      
      continue() {
        localStorage.setItem('videoEdits', JSON.stringify({
          trim: { start: this.trimStart, end: this.trimEnd },
          filters: {
            brightness: document.getElementById('brightness').value,
            contrast: document.getElementById('contrast').value
          }
        }));
        localStorage.removeItem('editorVideoData');
        window.location.href = './upload.html?edited=true';
      }
    }
    
    window.editor = new Editor();
  </script>
</body>
</html>
