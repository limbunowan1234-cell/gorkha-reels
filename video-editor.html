<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Video - GorkhaReels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui; overflow: hidden; }
    
    .header {
      background: #1a1a1a;
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #333;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    
    .container {
      position: fixed;
      top: 60px;
      bottom: 100px;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
      padding: 16px;
      overflow-y: auto;
    }
    
    .video-box {
      width: 100%;
      aspect-ratio: 9/16;
      background: #000;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      border: 2px solid #dc2626;
      flex-shrink: 0;
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    
    .tools {
      background: #1a1a1a;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .tabs {
      display: flex;
      border-bottom: 1px solid #333;
      overflow-x: auto;
      background: #111;
    }
    
    .tab {
      flex: 1;
      padding: 10px 8px;
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      min-width: 60px;
      transition: color 0.2s;
    }
    
    .tab.active {
      color: #dc2626;
      border-bottom-color: #dc2626;
    }
    
    .tab:hover {
      color: #fff;
    }
    
    .tool-pane {
      display: none;
      padding: 12px;
      max-height: 250px;
      overflow-y: auto;
    }
    
    .tool-pane.active {
      display: block;
    }
    
    .slider-group {
      margin-bottom: 12px;
    }
    
    .slider-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }
    
    .slider-label-name {
      font-weight: 600;
      color: #fff;
    }
    
    .slider-label-value {
      color: #fbbf24;
      font-weight: 600;
      background: rgba(251, 191, 36, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
    }
    
    input[type="range"] {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #dc2626;
      border-radius: 50%;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #dc2626;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }
    
    .btn-preset {
      padding: 8px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: #fbbf24;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 10px;
      transition: background 0.2s;
    }
    
    .btn-preset:active {
      background: rgba(251, 191, 36, 0.2);
    }
    
    .info {
      font-size: 10px;
      color: #999;
      margin: 8px 0;
      line-height: 1.5;
    }
    
    .text-input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #333;
      border: 1px solid #444;
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
    }
    
    .text-input::placeholder {
      color: #666;
    }
    
    .actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 10px 16px;
      border-top: 1px solid #333;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      z-index: 50;
    }
    
    .btn {
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    
    .btn:active {
      opacity: 0.8;
    }
    
    .btn-secondary {
      background: #333;
      color: #fff;
    }
    
    .btn-primary {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      color: white;
    }
    
    /* Scrollbar styling */
    .container::-webkit-scrollbar {
      width: 4px;
    }
    
    .container::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .container::-webkit-scrollbar-thumb {
      background: #dc2626;
      border-radius: 2px;
    }
    
    .tool-pane::-webkit-scrollbar {
      width: 4px;
    }
    
    .tool-pane::-webkit-scrollbar-thumb {
      background: #dc2626;
      border-radius: 2px;
    }
    
    @media (max-width: 480px) {
      .tab { font-size: 9px; padding: 8px 6px; }
      .tool-pane { padding: 10px; }
      .slider-group { margin-bottom: 10px; }
      .btn { font-size: 9px; padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>✨ Edit Video</h1>
  </div>
  
  <div class="container">
    <div class="video-box">
      <video id="video" playsinline controls style="display:block;"></video>
    </div>
    
    <div class="tools">
      <div class="tabs">
        <button class="tab active" data-tab="trim">✂️ Trim</button>
        <button class="tab" data-tab="filters">🎨 Filters</button>
        <button class="tab" data-tab="text">📝 Text</button>
        <button class="tab" data-tab="speed">⚡ Speed</button>
        <button class="tab" data-tab="rotate">🔄 Rotate</button>
      </div>
      
      <!-- TRIM -->
      <div class="tool-pane active" data-pane="trim">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Timeline</span>
            <span class="slider-label-value" id="trim-time">0:00</span>
          </div>
          <input type="range" id="trim-slider" min="0" max="100" value="0">
        </div>
        <div class="info">💡 Drag slider to trim from start or end</div>
        <div class="btn-group">
          <button class="btn-preset" onclick="window.editor.quickTrim(5)">5s</button>
          <button class="btn-preset" onclick="window.editor.quickTrim(15)">15s</button>
          <button class="btn-preset" onclick="window.editor.quickTrim(30)">30s</button>
          <button class="btn-preset" onclick="window.editor.quickTrim(60)">1:00</button>
        </div>
      </div>
      
      <!-- FILTERS -->
      <div class="tool-pane" data-pane="filters">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Brightness</span>
            <span class="slider-label-value" id="brightness-val">100%</span>
          </div>
          <input type="range" id="brightness" min="50" max="150" value="100">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Contrast</span>
            <span class="slider-label-value" id="contrast-val">100%</span>
          </div>
          <input type="range" id="contrast" min="50" max="150" value="100">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Saturation</span>
            <span class="slider-label-value" id="saturation-val">100%</span>
          </div>
          <input type="range" id="saturation" min="0" max="200" value="100">
        </div>
        <div class="info">🎨 Adjust color & light</div>
      </div>
      
      <!-- TEXT -->
      <div class="tool-pane" data-pane="text">
        <input type="text" id="text-input" class="text-input" placeholder="Add text..." maxlength="100">
        <button class="btn-preset" style="width:100%;background:#dc2626;color:#fff;border:none;" onclick="window.editor.addText()">+ Add Text</button>
        <div class="info" style="margin-top:10px;">📝 Add captions to your video</div>
      </div>
      
      <!-- SPEED -->
      <div class="tool-pane" data-pane="speed">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-label-name">Speed</span>
            <span class="slider-label-value" id="speed-val">1.0x</span>
          </div>
          <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="btn-group">
          <button class="btn-preset" onclick="window.editor.setSpeed(0.5)">0.5x</button>
          <button class="btn-preset" onclick="window.editor.setSpeed(1)">1x</button>
          <button class="btn-preset" onclick="window.editor.setSpeed(1.5)">1.5x</button>
          <button class="btn-preset" onclick="window.editor.setSpeed(2)">2x</button>
        </div>
      </div>
      
      <!-- ROTATE -->
      <div class="tool-pane" data-pane="rotate">
        <div class="btn-group">
          <button class="btn-preset" onclick="window.editor.rotate(90)">🔄 Rotate 90°</button>
          <button class="btn-preset" onclick="window.editor.flipH()">↔️ Flip H</button>
          <button class="btn-preset" onclick="window.editor.flipV()">↕️ Flip V</button>
          <button class="btn-preset" onclick="window.editor.resetTransform()">↩️ Reset</button>
        </div>
        <div class="info">🔄 Transform video (rotate, flip)</div>
      </div>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-secondary" onclick="window.editor.skip()">Skip</button>
    <button class="btn btn-primary" onclick="window.editor.continue()">✓ Continue</button>
  </div>

  <script>
    class Editor {
      constructor() {
        this.duration = 0;
        this.trimStart = 0;
        this.trimEnd = 0;
        this.transforms = { rotate: 0, flipH: false, flipV: false };
        this.load();
        this.bindTabs();
        this.bindInputs();
      }
      
      load() {
        const data = localStorage.getItem('editorVideoData');
        if (!data) {
          window.location.href = './upload.html';
          return;
        }
        
        const binary = atob(data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        
        const blob = new Blob([bytes], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        
        const video = document.getElementById('video');
        video.src = url;
        
        video.addEventListener('loadedmetadata', () => {
          this.duration = Math.floor(video.duration);
          this.trimEnd = this.duration;
          this.updateTrimDisplay();
        });
      }
      
      bindTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tool-pane').forEach(p => p.classList.remove('active'));
            
            tab.classList.add('active');
            const pane = document.querySelector(`[data-pane="${tab.dataset.tab}"]`);
            if (pane) pane.classList.add('active');
          });
        });
      }
      
      bindInputs() {
        document.getElementById('trim-slider').addEventListener('input', () => this.updateTrim());
        
        document.getElementById('brightness').addEventListener('input', (e) => {
          document.getElementById('brightness-val').textContent = e.target.value + '%';
        });
        
        document.getElementById('contrast').addEventListener('input', (e) => {
          document.getElementById('contrast-val').textContent = e.target.value + '%';
        });
        
        document.getElementById('saturation').addEventListener('input', (e) => {
          document.getElementById('saturation-val').textContent = e.target.value + '%';
        });
        
        document.getElementById('speed').addEventListener('input', () => this.updateSpeed());
      }
      
      updateTrim() {
        const slider = document.getElementById('trim-slider');
        const pct = slider.value / 100;
        const time = pct * this.duration;
        document.getElementById('video').currentTime = time;
        this.updateTrimDisplay();
      }
      
      updateTrimDisplay() {
        const slider = document.getElementById('trim-slider');
        const pct = slider.value / 100;
        const time = pct * this.duration;
        document.getElementById('trim-time').textContent = this.formatTime(time);
      }
      
      quickTrim(seconds) {
        this.trimEnd = Math.min(seconds, this.duration);
        document.getElementById('trim-slider').value = (this.trimEnd / this.duration) * 100;
        this.updateTrimDisplay();
      }
      
      updateSpeed() {
        const speed = document.getElementById('speed').value;
        document.getElementById('speed-val').textContent = speed + 'x';
        document.getElementById('video').playbackRate = speed;
      }
      
      setSpeed(speed) {
        document.getElementById('speed').value = speed;
        this.updateSpeed();
      }
      
      rotate(degrees) {
        this.transforms.rotate = (this.transforms.rotate + degrees) % 360;
        this.applyTransform();
      }
      
      flipH() {
        this.transforms.flipH = !this.transforms.flipH;
        this.applyTransform();
      }
      
      flipV() {
        this.transforms.flipV = !this.transforms.flipV;
        this.applyTransform();
      }
      
      resetTransform() {
        this.transforms = { rotate: 0, flipH: false, flipV: false };
        this.applyTransform();
      }
      
      applyTransform() {
        const video = document.getElementById('video');
        let transform = '';
        
        if (this.transforms.rotate) {
          transform += `rotate(${this.transforms.rotate}deg) `;
        }
        if (this.transforms.flipH) {
          transform += 'scaleX(-1) ';
        }
        if (this.transforms.flipV) {
          transform += 'scaleY(-1) ';
        }
        
        video.style.transform = transform || 'none';
      }
      
      addText() {
        const text = document.getElementById('text-input').value;
        if (text) {
          alert('✅ Text added: "' + text + '"');
          document.getElementById('text-input').value = '';
        }
      }
      
      formatTime(s) {
        const m = Math.floor(s / 60);
        const ss = Math.floor(s % 60);
        return `${m}:${ss.toString().padStart(2, '0')}`;
      }
      
      skip() {
        localStorage.removeItem('editorVideoData');
        window.location.href = './upload.html';
      }
      
      continue() {
        localStorage.setItem('videoEdits', JSON.stringify({
          trim: { start: this.trimStart, end: this.trimEnd },
          filters: {
            brightness: document.getElementById('brightness').value,
            contrast: document.getElementById('contrast').value,
            saturation: document.getElementById('saturation').value
          },
          transforms: this.transforms
        }));
        localStorage.removeItem('editorVideoData');
        window.location.href = './upload.html?edited=true';
      }
    }
    
    window.editor = new Editor();
  </script>
</body>
</html>
