<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat - GorkhaReels</title>
  <link rel="icon" type="image/png" href="logo-suite/favicon/logo-khukuri-32x32.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      background: #0f0f0f;
      border-bottom: 1px solid #2d2d2d;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
    }

    .header-status {
      font-size: 12px;
      color: #999;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0B5E6B, #0d2d3a);
      object-fit: cover;
      flex-shrink: 0;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .message-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message-date {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin: 8px 0;
      padding: 4px 0;
    }

    .message {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      animation: messageSlideIn 0.3s ease-out;
    }

    @keyframes messageSlideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message.sent .message-wrapper {
      justify-content: flex-end;
    }

    .message-wrapper {
      position: relative;
      display: flex;
      align-items: flex-end;
      flex: 1;
      max-width: 80%;
    }

    .message.sent .message-wrapper {
      max-width: 85%;
    }

    .message-content {
      position: relative;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      position: relative;
      animation: bubblePop 0.2s ease-out;
    }

    @keyframes bubblePop {
      from {
        transform: scale(0.95);
      }
      to {
        transform: scale(1);
      }
    }

    .message.sent .message-bubble {
      background: #0B5E6B;
      color: #fff;
    }

    .message.received .message-bubble {
      background: #2d2d2d;
      color: #fff;
    }

    .message-image,
    .message-video {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .message-video {
      background: #000;
    }

    .message-timestamp {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .message.sent .message-timestamp {
      text-align: right;
    }

    .message.received .message-timestamp {
      text-align: left;
    }

    .read-receipt {
      font-size: 12px;
      color: #0B5E6B;
      margin-left: 4px;
    }

    .message-delete-btn {
      position: absolute;
      right: -50px;
      top: 50%;
      transform: translateY(-50%);
      background: #dc2626;
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, right 0.2s;
      z-index: 10;
    }

    .message.sent .message-wrapper:active .message-delete-btn {
      opacity: 1;
      right: 0;
    }

    .message.sent .message-wrapper.swiped .message-delete-btn {
      opacity: 1;
      right: 0;
    }

    .input-area {
      background: #0f0f0f;
      border-top: 1px solid #2d2d2d;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background: none;
      border: none;
      color: #0B5E6B;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .action-btn:active {
      transform: scale(0.9);
    }

    .message-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 24px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
    }

    .message-input::placeholder {
      color: #666;
    }

    .message-input:focus {
      outline: none;
      border-color: #0B5E6B;
    }

    .send-btn {
      background: #0B5E6B;
      border: none;
      color: #fff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="file"] {
      display: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d2d2d;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      animation: slideUp 0.3s ease-out;
    }

    .toast.error {
      background: #c33;
    }

    .toast.success {
      background: #10b981;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 600px) {
      .message-wrapper {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <img id="otherUserAvatar" class="header-avatar" src="" alt="">
    <div class="header-info">
      <div class="header-name" id="otherUserName">Loading...</div>
      <div class="header-status" id="lastSeenStatus">Loading...</div>
    </div>
  </div>

  <div class="messages-container" id="messagesContainer"></div>

  <div class="input-area">
    <div class="input-actions">
      <button class="action-btn" onclick="document.getElementById('imageInput').click()" title="Send image">
        📷
      </button>
      <button class="action-btn" onclick="document.getElementById('videoInput').click()" title="Send video">
        🎥
      </button>
    </div>
    
    <textarea 
      id="messageInput" 
      class="message-input" 
      placeholder="Message..." 
      rows="1"
    ></textarea>
    
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
  <input type="file" id="videoInput" accept="video/*" onchange="handleVideoUpload(event)">

  <script src="https://cdn.jsdelivr.net/npm/appwrite@18"></script>
  <script src="js/appwrite-config.js"></script>
  <script src="last-seen-tracker.js"></script>

  <script>
    let currentUserId = null;
    let conversationId = null;
    let otherUserId = null;
    let otherUserLastSeen = null;
    let messages = [];
    let messageUnsubscribe = null;
    let lastSeenRefresh = null;
    let isSending = false;

    async function init() {
      await session.refresh();
      if (!session.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      currentUserId = session.getUserId();

      // Start tracking last seen
      lastSeenTracker.init(currentUserId);

      const params = new URLSearchParams(window.location.search);
      conversationId = params.get('conv');
      otherUserId = params.get('user');

      if (!conversationId || !otherUserId) {
        alert('Invalid conversation');
        window.location.href = 'messages.html';
        return;
      }

      try {
        const creator = await db.get('creators', otherUserId);
        document.getElementById('otherUserName').textContent = creator.name;
        document.getElementById('otherUserAvatar').src = creator.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(creator.name)}&background=0B5E6B&color=fff`;
        
        // Load initial last seen
        otherUserLastSeen = creator.lastSeen;
        updateLastSeenDisplay();
        
        // Refresh last seen every 30 seconds
        lastSeenRefresh = setInterval(async () => {
          try {
            const updated = await db.get('creators', otherUserId);
            otherUserLastSeen = updated.lastSeen;
            updateLastSeenDisplay();
          } catch (err) {
            console.error('Error refreshing last seen:', err);
          }
        }, 30000); // Every 30 seconds
      } catch {
        document.getElementById('otherUserName').textContent = 'User';
        document.getElementById('lastSeenStatus').textContent = 'Last seen unknown';
      }

      await loadMessages();
      subscribeToMessages();

      const textarea = document.getElementById('messageInput');
      textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
      });

      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    function updateLastSeenDisplay() {
      const lastSeen = LastSeenTracker.formatLastSeen(otherUserLastSeen);
      document.getElementById('lastSeenStatus').textContent = lastSeen;
    }

    async function loadMessages() {
      try {
        messages = await ConversationManager.getConversationMessages(conversationId, 50);
        renderMessages();
        scrollToBottom();

        messages.forEach(async (msg) => {
          if (msg.recipientId === currentUserId && !msg.isRead) {
            await ConversationManager.markAsRead(msg.$id);
          }
        });
      } catch (error) {
        console.error('Error loading messages:', error);
        showToast('Failed to load messages', 'error');
      }
    }

    function subscribeToMessages() {
      messageUnsubscribe = realtime.subscribeToConversation(conversationId, (newMessage) => {
        if (!messages.find(m => m.$id === newMessage.$id)) {
          messages.push(newMessage);
          renderMessages();
          scrollToBottom();

          if (newMessage.recipientId === currentUserId && !newMessage.isRead) {
            ConversationManager.markAsRead(newMessage.$id);
          }
        }
      });
    }

    function groupMessagesByDate(msgs) {
      const groups = {};
      msgs.forEach(msg => {
        const date = new Date(msg.createdAt).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
        if (!groups[date]) groups[date] = [];
        groups[date].push(msg);
      });
      return groups;
    }

    function formatDateSeparator(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      if (date.toDateString() === today.toDateString()) return 'Today';
      if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return dateStr;
    }

    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state">No messages yet. Start the conversation!</div>';
        return;
      }

      const groups = groupMessagesByDate(messages);
      let html = '';

      Object.keys(groups).forEach(date => {
        html += `<div class="message-date">${formatDateSeparator(date)}</div>`;
        
        groups[date].forEach(msg => {
          const isSent = msg.senderId === currentUserId;
          const timestamp = new Date(msg.createdAt).toLocaleTimeString('en-US', { 
            hour: 'numeric', 
            minute: '2-digit',
            hour12: true 
          });

          let contentHtml = '';
          if (msg.messageType === 'text') {
            contentHtml = `<div class="message-bubble">${escapeHtml(msg.messageText)}</div>`;
          } else if (msg.messageType === 'image') {
            contentHtml = `
              <div class="message-bubble">
                <img src="${msg.mediaUrl}" alt="Image" class="message-image" onclick="openMediaViewer('${msg.mediaUrl}')">
              </div>
            `;
          } else if (msg.messageType === 'video') {
            contentHtml = `
              <div class="message-bubble">
                <video class="message-video" controls>
                  <source src="${msg.mediaUrl}" type="video/mp4">
                </video>
              </div>
            `;
          }

          const readReceipt = isSent && msg.isRead ? '<span class="read-receipt">✓✓</span>' : '';
          const deleteBtn = isSent ? `<button class="message-delete-btn" onclick="deleteMessage('${msg.$id}')">🗑️</button>` : '';

          html += `
            <div class="message ${isSent ? 'sent' : 'received'}">
              <div class="message-wrapper" data-message-id="${msg.$id}">
                <div class="message-content">
                  ${contentHtml}
                  <div class="message-timestamp">${timestamp}${readReceipt}</div>
                </div>
                ${deleteBtn}
              </div>
            </div>
          `;
        });
      });

      container.innerHTML = html;
      attachMessageHandlers();
    }

    function attachMessageHandlers() {
      messages.forEach(msg => {
        if (msg.senderId !== currentUserId) return;
        
        const wrapper = document.querySelector(`[data-message-id="${msg.$id}"]`);
        if (!wrapper) return;

        let longPressTimer;
        wrapper.addEventListener('touchstart', () => {
          longPressTimer = setTimeout(() => {
            if (confirm('Delete this message?')) {
              deleteMessage(msg.$id);
            }
          }, 350);
        });

        wrapper.addEventListener('touchend', () => {
          clearTimeout(longPressTimer);
        });

        let startX = 0;
        wrapper.addEventListener('touchstart', (e) => {
          startX = e.touches[0].clientX;
        });

        wrapper.addEventListener('touchmove', (e) => {
          const currentX = e.touches[0].clientX;
          const diff = startX - currentX;
          
          if (diff > 30) {
            wrapper.classList.add('swiped');
          } else if (diff < -30) {
            wrapper.classList.remove('swiped');
          }
        });
      });

      document.getElementById('messagesContainer').addEventListener('touchstart', (e) => {
        if (!e.target.closest('.message-delete-btn')) {
          document.querySelectorAll('.message-wrapper.swiped').forEach(w => {
            w.classList.remove('swiped');
          });
        }
      });
    }

    async function sendMessage() {
      const text = document.getElementById('messageInput').value.trim();
      if (!text || isSending) return;

      isSending = true;
      const sendBtn = document.querySelector('.send-btn');
      sendBtn.disabled = true;

      try {
        await ConversationManager.sendMessage(
          currentUserId,
          otherUserId,
          text,
          'text'
        );
        document.getElementById('messageInput').value = '';
        document.getElementById('messageInput').style.height = 'auto';
      } catch (error) {
        showToast('Failed to send message', 'error');
        console.error('Error sending message:', error);
      } finally {
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    async function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        showToast('Uploading image...');
        const result = await mediaUploader.uploadImage(file);
        
        await ConversationManager.sendMessage(
          currentUserId,
          otherUserId,
          '',
          'image',
          result.url
        );
        
        showToast('Image sent!', 'success');
        event.target.value = '';
      } catch (error) {
        showToast(error.message || 'Failed to upload image', 'error');
      }
    }

    async function handleVideoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        showToast('Uploading video (max 30 seconds)...');
        const result = await mediaUploader.uploadVideo(file);
        
        await ConversationManager.sendMessage(
          currentUserId,
          otherUserId,
          '',
          'video',
          result.url,
          result.thumbnail
        );
        
        showToast('Video sent!', 'success');
        event.target.value = '';
      } catch (error) {
        showToast(error.message || 'Failed to upload video', 'error');
      }
    }

    async function deleteMessage(messageId) {
      try {
        await ConversationManager.deleteMessage(messageId);
        messages = messages.filter(m => m.$id !== messageId);
        renderMessages();
        showToast('Message deleted', 'success');
      } catch (error) {
        showToast('Failed to delete message', 'error');
        console.error('Delete error:', error);
      }
    }

    function scrollToBottom() {
      const container = document.getElementById('messagesContainer');
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 0);
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function openMediaViewer(url) {
      const viewer = document.createElement('a');
      viewer.href = url;
      viewer.target = '_blank';
      viewer.click();
    }

    function goBack() {
      if (messageUnsubscribe) messageUnsubscribe();
      if (lastSeenRefresh) clearInterval(lastSeenRefresh);
      lastSeenTracker.stopTracking();
      realtime.unsubscribeAll();
      window.location.href = 'messages.html';
    }

    window.addEventListener('beforeunload', () => {
      if (messageUnsubscribe) messageUnsubscribe();
      if (lastSeenRefresh) clearInterval(lastSeenRefresh);
      lastSeenTracker.stopTracking();
      realtime.unsubscribeAll();
    });

    init();
  </script>
</body>
</html>
