<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>404 - Page Not Found - GorkhaReels</title>
  <meta name="description" content="Page not found on GorkhaReels">
  <meta name="theme-color" content="#0B5E6B">

  <link rel="icon" type="image/png" href="/favicon/logo-khukuri-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: system-ui;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4);
    }
    .header img {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: rgba(255,255,255,0.15);
      object-fit: cover;
    }
    .header-title {
      font-size: 20px;
      font-weight: 900;
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      text-decoration: none;
    }

    /* Main */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .error-icon {
      font-size: 80px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .error-code {
      font-size: 96px;
      font-weight: 900;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #0B5E6B, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .error-description {
      font-size: 14px;
      color: #a3a3a3;
      margin-bottom: 40px;
      max-width: 320px;
      line-height: 1.6;
    }

    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .btn {
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0B5E6B 0%, #0D7377 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(11, 94, 107, 0.3);
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #2d2d2d;
    }
    .btn-secondary:active { border-color: #0B5E6B; color: #0B5E6B; }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
      <img src="/favicon/logo-khukuri-192x192.png" alt="GorkhaReels">
      <span class="header-title">GorkhaReels</span>
    </a>
  </header>

  <div class="error-container">
    <div class="error-icon">🏔️</div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-description">
      Oops! Looks like this page got lost in the Darjeeling fog. Let's get you back on track.
    </p>

    <div class="error-actions">
      <button class="btn btn-primary" onclick="window.location.href='/'">
        🏠 Go to Home Feed
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='/upload.html'">
        📹 Upload a Video
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='/creator-dashboard.html'">
        👤 View Dashboard
      </button>
    </div>
  </div>

  <script>
    console.error('404 Error:', window.location.pathname);
  </script>
</body>
</html>
